function drawBills(){
  const area=$("#stackArea");if(!area)return;
  const cur=S.budgetVotes[S.me]||{bills:0};
  const n=cur.bills||0;
  if(cur.noWish){
    area.style.height="120px";
    area.innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#16305c;font-size:14px">${t("s5.noWishSel")}</div>`;
    $("#moneyTotal").textContent=t("s5.noWish"); return;
  }
  if(n===0){
    area.style.height="120px";
    area.innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#16305c;font-size:13px">${t("s5.zeroBills")}</div>`;
    $("#moneyTotal").textContent="¥0"; return;
  }
  // 束ごとに決定的な擬似乱数(束番号から安定生成)
  const rnd=(seed)=>{const x=Math.sin(seed*97.13+13.7)*43758.5453;return x-Math.floor(x);};
  const fullBundles=Math.floor(n/10);
  const rem=n%10;
  const denseStep=2.3;     // 完成束: 札を密に重ねる
  const looseStep=11;      // 端数: ゆったり積む
  const billW=180;         // 札の表示幅
  const bandW=13;          // 縦帯封の幅(細め)
  let html="", idx=0;

  // 完成束を「山のように」積む: 1束ごとに段を上げつつ、横位置と回転をランダムに散らす
  const risePerBundle=20;  // 1束ごとに山が高くなる量
  let maxTop=0;
  for(let bnd=0;bnd<fullBundles;bnd++){
    const base=10 + bnd*risePerBundle;                 // 束ごとに高く
    const dx=Math.round((rnd(bnd)-0.5)*70);            // 横にランダムずらし(±35px)
    const rot=(rnd(bnd+100)-0.5)*10;                   // ランダム傾き(±5deg)
    for(let j=0;j<10;j++){
      const jit=(j%2===0?-1:1)*0.8;
      const by=base + j*denseStep;
      html+=`<img src="${BILL_IMG}" class="stack-bill" alt="1万円札"
        style="bottom:${by}px;width:${billW}px;
        transform:translateX(calc(-50% + ${dx+jit}px)) rotate(${rot}deg);z-index:${10+bnd*12+j}"
        onclick="addBill(-1)">`;
      idx++;
    }
    // 縦帯封: 束の中央を縦に巻く(札の高さ≒billW*0.466。縦に少しはみ出す)
    const billH=billW*0.466;
    const bandH=billH+9*denseStep+6;
    const bandBottom=base-3;
    html+=`<div class="band" style="bottom:${bandBottom}px;width:${bandW}px;height:${bandH}px;
      transform:translateX(calc(-50% + ${dx}px)) rotate(${rot}deg);z-index:${10+bnd*12+11}"
      onclick="addBill(-1)"></div>`;
    maxTop=Math.max(maxTop, base+9*denseStep);
  }
  // 端数(未完成束)を山の頂上付近にゆったり積む
  const remBase=fullBundles>0? maxTop+14 : 6;
  for(let j=0;j<rem;j++){
    const jitter=(j%2===0?-4:4);
    const by=remBase + j*looseStep;
    html+=`<img src="${BILL_IMG}" class="stack-bill" alt="1万円札"
      style="bottom:${by}px;width:${billW}px;transform:translateX(calc(-50% + ${jitter}px)) rotate(${jitter*0.1}deg);z-index:${500+j}"
      onclick="addBill(-1)">`;
    idx++;
  }
  const topRem = rem>0? (remBase + (rem-1)*looseStep) : maxTop;
  area.style.height=Math.max(140, topRem+90)+"px";
  area.innerHTML=html;
  $("#moneyTotal").textContent="¥"+((n*billUnit())).toLocaleString();
}
function setNoWish(){const v=S.budgetVotes[S.me]||(S.budgetVotes[S.me]={bills:0,opt:null});
  v.noWish=!v.noWish; if(v.noWish){v.bills=0;v.opt=null;} render({noscroll:true});}

    </div>
  </div>`;
}

function setupDragSort(){
  const list=$("#planList");if(!list)return;
  let dragIdx=null;
  list.querySelectorAll(".plan-item").forEach(item=>{
    item.addEventListener("dragstart",e=>{dragIdx=+item.dataset.idx;item.classList.add("dragging");});
    item.addEventListener("dragend",e=>{item.classList.remove("dragging");list.querySelectorAll(".plan-item").forEach(x=>x.classList.remove("over"));});
    item.addEventListener("dragover",e=>{e.preventDefault();item.classList.add("over");});
    item.addEventListener("dragleave",e=>{item.classList.remove("over");});
    item.addEventListener("drop",e=>{
      e.preventDefault();
      const dropIdx=+item.dataset.idx;
      if(dragIdx==null||dragIdx===dropIdx)return;
      const arr=S.spotOrder;
      const [moved]=arr.splice(dragIdx,1);
      arr.splice(dropIdx,0,moved);
      render({noscroll:true});
    });
  });
}

function renderVoices(){
  const groups=[
    {key:'yes', label:t("s7.join"), color:'var(--ok)'},
    {key:'hold', label:t("s7.hold"), color:'#a8851a'},
    {key:'no', label:t("s7.no"), color:'var(--no)'}
  ];
  const card=m=>{
    const c=S.consent[m.id];
    if(c==='yes')return `<div class="named yes"><div class="who">${esc(m.name)}</div><div class="why">${esc(S.comments[m.id])}</div></div>`;
    const o=S.objections[m.id]||{};
    return `<div class="named ${c}"><div class="who">${esc(m.name)}</div>
      ${o.why?`<div class="why">${t("s7.voiceWhy",{v:esc(o.why)})}</div>`:""}
      ${o.cond?`<div class="cond">${t("s7.voiceCond")}<b>${esc(o.cond)}</b></div>`:""}</div>`;
  };
  let out="";
  groups.forEach(g=>{
    const members=S.members.filter(m=>{
      if(S.consent[m.id]!==g.key)return false;
      if(g.key==='yes')return !!(S.comments[m.id]);
      return !!(S.objections[m.id]&&(S.objections[m.id].why||S.objections[m.id].cond));
    });
    if(!members.length)return;
    out+=`<div style="margin-top:14px">
      <div style="font-size:13px;font-weight:800;color:${g.color};margin-bottom:4px">${g.label}（${members.length}）</div>
      ${members.map(card).join("")}</div>`;
  });
  return out;
}

function findPerson(id){ return PEOPLE.find(p=>p.id===id) || null; }

function isMutual(p){ return p && p.iFollow && p.followsMe && !p.blocked; }
/* DMできる条件:ブロックしていない & (相互フォロー or 相手が公開で自分がフォロー中) */
function canDM(p){ return p && !p.blocked && (isMutual(p) || (p.iFollow && !p.private)); }
/* 旧FRIENDS互換:相互フォローの相手を友達として扱う */
function friendsList(){ return PEOPLE.filter(p=>isMutual(p)); }

/* ブロック:相互のフォローを外し、検索・DM・既読を不能に(履歴は残す) */
function blockUser(id){
  const p=findPerson(id); if(!p)return;
  if(!confirm(`${p.name}をブロックしますか？\n・お互いのフォローが外れます\n・検索やメッセージができなくなります\n・これまでのチャット履歴は残ります`))return;
  p.blocked=true; p.iFollow=false; p.followsMe=false; p.reqIncoming=false; p.reqOutgoing=false;
  if(p.friends){ const i=p.friends.indexOf(ME.id); if(i>=0)p.friends.splice(i,1); }
  toast(`${p.name}をブロックしました`);
  renderApp();
}
function unblockUser(id){
  const p=findPerson(id); if(!p)return;
  p.blocked=false;
  toast(`${p.name}のブロックを解除しました`);
  renderApp();
}
/* フォロワーから削除:相手の自分へのフォローだけ外す */
function removeFollower(id){
  const p=findPerson(id); if(!p)return;
  if(!confirm(`${p.name}をフォロワーから削除しますか？\n（相手はあなたをフォローしなくなります）`))return;

function pushNotif(n){ if(n.ts==null)n.ts=Date.now(); NOTIFS.unshift(n); }
function openNotif(i){
  const n=NOTIFS[i]; if(!n)return; n.unread=false;
  const t=n.target||{};
  if(t.type==="dm"){ const p=findPerson(t.fid); if(p&&canDM(p)) openDM(t.fid); else { profileBackView='notify'; if(p)openProfile(t.fid); else goView("chat"); } }
  else if(t.type==="room"){ const g=GROUPS.find(x=>x.id===t.gid&&x.joined); if(g) openRoom(t.gid); else { toast("このグループは見つかりません"); goView("home"); } }
  else if(t.type==="groupchat"){ const g=GROUPS.find(x=>x.id===t.gid&&x.joined); if(g) openGroupChat(t.gid); else { toast("このグループは見つかりません"); goView("chat"); } }
  else if(t.type==="editprofile"){ goView("editprofile"); }
  else if(t.type==="profile"){ if(t.pid){ profileBackView='notify'; openProfile(t.pid); } else { goView("editprofile"); } }
  else if(t.type==="request"){ profileBackView='notify'; openProfile(t.pid); }
  else if(t.type==="badges"){ goView("profile"); }
  else { goView("home"); }
}

/* グループの進捗ラベルと% を roomState から算出(連動) */
function groupProgress(g){
  const s=g.room.step, st=stepStageOf(s);
  const pct = Math.min(100, Math.round((st-1)/7*100));
  let label="作成中", status="plan";
  if(s===0){ label="まだ準備中"; status="plan"; }
  else if(s===2){ label="メンバーを招待中"; status="plan"; }
  else if(s<4){ label="やりたいことを集めています"; status="live"; }
  else if(s<5){ label="日程を調整中"; status="live"; }
  else if(s<5.6){ label="予算を決めています"; status="live"; }
  else if(s<6){ label="スポットを投票中"; status="live"; }
  else if(s<7){ label="最終合意を待っています"; status="live"; }
  else { label="プラン確定済み"; status="done"; }
  return {pct: s>=7?100:pct, label, status};
}
function stepStageOf(s){
  if(s<=2)return s<=0?1:2;
  if(s<4)return 3; if(s<5)return 5; if(s<5.6)return 6; if(s<6)return 7; return 8;
}
function destLabel(g){
  const r=g.room;
  if(r.destination) return r.destination;
  if(r.step<4) return "未定（希望募集中）";
  return "未定（調整中）";
}

function goView(v){ commitRoom(); S.view=v; activeGid=null; activeChatId=null; renderApp(); }
/* グループを開く:そのグループの roomState を S に展開 */
function openRoom(gid){
  commitRoom();
  const g=GROUPS.find(x=>x.id===gid); if(!g)return;
  activeGid=gid;
  Object.assign(S, g.room);
  S.me = S.members.length?S.members[0].id:null;
  S.view="room"; renderApp();
}
/* S の進行内容を現在のグループへ書き戻す */
function commitRoom(){
  if(S.view!=="room") return;   // ルーム画面以外ではSはroomStateでないので書き戻さない
  if(!activeGid)return;
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
  const keys=Object.keys(blankRoom());
  keys.forEach(k=>{ g.room[k]=S[k]; });
  // ⑧旅行日付は計画された旅行日程の初日(ISO)を使う。確定日程文字列からは取らない
  const normIso=(key)=>{
    if(key && /^\d{4}-\d{1,2}-\d{1,2}$/.test(key)){
      const m=key.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      return `${m[1]}-${String(+m[2]).padStart(2,"0")}-${String(+m[3]).padStart(2,"0")}`;
    }
    return null;
  };
  const iso0=normIso(S.tripStartKey), iso1=normIso(S.tripEndKey);
  if(iso0){ g.tripDate=iso0; g.tripDateEnd=(iso1&&iso1!==iso0)?iso1:""; } // ④単日なら終了日は空
}
function toggleTheme(){
  S.theme = S.theme==="dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", S.theme);
  renderApp();
}
/* ①アクセントカラーを選択 */
function setAccent(hex){ applyAccent(hex); renderApp(); }

function topbarHTML(){
  if(S.view==="room") return ""; // ルームは自前ヘッダー
  const bell = `<button class="icon-btn" onclick="openNotify()" aria-label="お知らせ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      ${NOTIFS.some(n=>n.unread)?'<span class="dot"></span>':''}
    </button>`;
  const head = `<div class="sns-head"><div class="sns-head-inner center">
      <div class="sns-head-side left"></div>
      <div class="sns-logo" onclick="goView('home')" title="${t("logo.toHome")}"><img src="${logoSrc()}" alt="TAVI。" class="logo-img"></div>
      <div class="sns-head-side right">${bell}</div>
    </div></div>`;
  return head;
}

function tabbarHTML(){
  if(S.view==="room"||S.view==="groupchat"||S.view==="dm") return "";
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  const tone = dark ? "white" : "black";   // 非選択時の色(ダーク=白, ライト=黒)
  // 画像アイコンのタブ(友達検索・チャット・ホーム)
  const imgTab=(v,base)=>{
    const on = S.view===v;
    const src = on ? TAB_ICONS[base+"_orange"] : TAB_ICONS[base+"_"+tone];
    let dot="";
    if(v==="chat"){
      const unread = friendsList().some(f=>(DM[f.id]||[]).some(m=>m.unread)) || GROUPS.some(g=>g.joined&&(g.chat||[]).some(c=>c.unread));
      if(unread) dot='<span class="tab-dot"></span>';
    }
    return `<button class="tab ${on?'on':''}" onclick="goView('${v}')">
      <span class="tab-ic-wrap"><img class="tab-ic" src="${src}" alt="">${dot}</span></button>`;
  };
  // プロフィールタブ(ユーザー画像を丸く表示。サイズ統一)
  const onP = S.view==="profile";
  const pAv = ME.photo
    ? `<span class="tab-ava img ${onP?'on':''}" style="background-image:url('${ME.photo}')"></span>`
    : `<span class="tab-ava ${onP?'on':''}">${esc(ME.avatar||"🙂")}</span>`;
  const profileTab = `<button class="tab ${onP?'on':''}" onclick="goView('profile')">
      <span class="tab-ic-wrap">${pAv}</span></button>`;
  return `<div class="tabbar"><div class="tabwrap">
    ${imgTab('home','home')}
    ${imgTab('chat','msg')}
    ${imgTab('addfriend','search')}
    ${profileTab}
  </div></div>`;
}

/* ⑤旅の並び順を決めるヘルパー群 */
function tripHasUnread(g){ return (g.chat||[]).some(c=>c.unread); }
// 回答期限(タイムスタンプ)。pollDeadlineが無い/合意済みは期限なし扱い
function tripDeadlineTs(g){
  if(g.pollDeadlineTs!=null) return g.pollDeadlineTs;
  return null;
}
// 作成日時。createdAtが無ければ0(=最も古い扱い)
function tripCreatedTs(g){ return g.createdAt!=null ? g.createdAt : 0; }
function sortHomeTrips(a,b){
  // まずピン留め
  const pin=(b.pinned?1:0)-(a.pinned?1:0); if(pin) return pin;
  // つぎに未読チャットの有無
  const un=(tripHasUnread(b)?1:0)-(tripHasUnread(a)?1:0); if(un) return un;
  // さらに回答期限が近いもの(期限ありが先・近い順)
  const da=tripDeadlineTs(a), db=tripDeadlineTs(b);
  if(da!=null && db!=null){ if(da!==db) return da-db; }
  else if(da!=null){ return -1; }
  else if(db!=null){ return 1; }
  // 最後に作成日時が新しいもの
  return tripCreatedTs(b)-tripCreatedTs(a);
}

/* ---- ホーム:旅グループのフィード ---- */
function screenHome(){
  const all = GROUPS.filter(g=>g.joined);
  if(!all.length){
    return `<div class="feed">
      <div class="feed-h"><h2>${t("home.title")}</h2></div>
      <div class="feed-empty"><div class="ic">🧳</div>${t("home.empty")}<br>${t("home.empty.sub")}</div>
    </div>
    <button class="fab" onclick="startNewTrip()" aria-label="新しい旅をつくる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>`;
  }
  // アクティブ(ピン優先)とアーカイブに分離
  // ⑤並び順:ピン留め最優先 → 未読チャットあり → 回答期限が近い → 作成日時が新しい
  const active = all.filter(g=>!g.archived).sort(sortHomeTrips);
  const archived = all.filter(g=>g.archived);
  const mine = active;
  // ②カード縦幅モード: 0=1倍(全部表示) 1=2/3倍(画像縮小・メンバー省略) 2=1/3倍(画像省略・コンパクト)
  if(S.cardSize==null) S.cardSize=0;
  const sz=S.cardSize;
  const sizeClass=sz===1?"s-mid":sz===2?"s-min":"";
  const cards = mine.map(g=>{
    const pr=groupProgress(g);
    const done = pr.pct>=100;
    const stB = pr.status==="live"?`<span class="st-badge live">${t("card.live")}</span>`
      : pr.status==="done"?`<span class="st-badge done">${t("card.done")}</span>`
      : `<span class="st-badge">${t("card.prep")}</span>`;
    const cover = g.img ? `background-image:url('${g.img}')` : `background-image:${g.cover}`;
    const mem=g.room.members||[];
    const ava = mem.slice(0,5).map(m=>`<span>${esc((m.name||"?").slice(0,1))}</span>`).join("")
      + (mem.length>5?`<span>+${mem.length-5}</span>`:"");
    const unread=(g.chat||[]).some(c=>c.unread);
    const pinBtn=`<button class="card-pin ${g.pinned?'on':''}" onclick="event.stopPropagation();togglePin('${g.id}')" aria-label="${g.pinned?t('pin.remove'):t('pin.add')}" title="${g.pinned?t('pin.remove'):t('pin.add')}"><img src="${UI_IMG.pin_white}" class="pin-ic" alt=""></button>`;
    const newBadge=unread?`<span class="st-badge" style="background:var(--sun);color:#fff">💬 ${t("card.new")}</span>`:'';
    // ②1/3倍: 画像なしのコンパクト行。進捗100%はバーを出さず✓を表示
    if(sz===2){
      return `<div class="gcard s-min" onclick="openRoom('${g.id}')">
        <div class="min-row">
          <div class="min-main">
            <div class="min-title">${esc(g.name)}</div>
            <div class="min-sub">📍 ${esc(destLabel(g))}${tripDateLabel(g)?` ・ ${tripDateLabel(g)}`:''}</div>
          </div>
          ${done?`<span class="min-done">✓ ${pr.pct}%</span>`:`<span class="min-pct">${pr.pct}%</span>`}
          ${pinBtn}
        </div>
        ${done?``:`<div class="min-bar"><i style="width:${pr.pct}%"></i></div>`}
      </div>`;
    }
    // ②2/3倍: 画像は薄め・低めで残しつつメンバーを省略
    // ②1倍: フル表示。ただし進捗100%は「進捗バーを省略して画像を表示」
    return `<div class="gcard ${sizeClass}" onclick="openRoom('${g.id}')">
      <div class="cover" style="${cover}">
        <div class="badge-row">${stB}${newBadge}${pinBtn}</div>
        <div class="ttl"><div class="nm">${esc(g.name)}</div><div class="dest">📍 ${esc(destLabel(g))}${tripDateLabel(g)?` ・ ${tripDateLabel(g)}`:''}</div></div>
      </div>
      ${(done && sz===0)?`` : `<div class="body">
        ${sz===0?`<div class="meta">
          <div class="ava">${ava}</div>
          <span>${t("people.count",{n:mem.length})}</span>
          <span style="flex:1"></span>
          <span>${esc((g.chat&&g.chat.length)?g.chat[g.chat.length-1].ago:"")}</span>
        </div>`:``}
        ${done?``:`<div class="progress">
          <div class="bar"><i style="width:${pr.pct}%"></i></div>
          <div class="cap"><span>${esc(pr.label)}</span><b>${pr.pct}%</b></div>
        </div>`}
      </div>`}
    </div>`;
  }).join("");
  const archCards = archived.map(g=>{
    const pr=groupProgress(g);
    const cover = g.img ? `background-image:url('${g.img}')` : `background-image:${g.cover}`;
    return `<div class="gcard" style="opacity:.85" onclick="openRoom('${g.id}')">
      <div class="cover" style="${cover};height:96px">
        <div class="badge-row"><span class="st-badge">📦 アーカイブ</span></div>
        <div class="ttl"><div class="nm" style="font-size:16px">${esc(g.name)}</div>${tripDateLabel(g)?`<div class="dest">${tripDateLabel(g)}</div>`:''}</div>
      </div>

/* ---- 通知 ---- */
function screenNotify(){
  // 届いているフォローリクエスト(相手→自分)
  const reqs=PEOPLE.filter(p=>p.reqIncoming);
  const reqHtml = reqs.length ? `
    <h3 class="sub" style="margin:6px 4px 8px">フォローリクエスト</h3>
    ${reqs.map(p=>`<div class="listcard">
      <div class="lic" style="${avatarStyle(p)};background:${p.photo?'transparent':'var(--chip)'}" onclick="profileBackView='notify';openProfile('${p.id}')">${avatarInner(p)}</div>
      <div class="lt" onclick="profileBackView='notify';openProfile('${p.id}')" style="cursor:pointer"><div class="a">${esc(p.name)}</div><div class="b">あなたをフォローしたいようです</div></div>
      <div style="display:flex;gap:6px">
        <button class="mini-btn solid" onclick="acceptRequest('${p.id}')">承認</button>
        <button class="mini-btn danger" onclick="declineRequest('${p.id}')">削除</button>
      </div>
    </div>`).join("")}
    <h3 class="sub" style="margin:18px 4px 8px">すべてのお知らせ</h3>` : "";

  // ③時系列で見出しを分ける。境界は今日/昨日/過去7日間/過去30日間/もっと前
  const now=Date.now();
  const startToday=new Date(); startToday.setHours(0,0,0,0); const t0=startToday.getTime();
  const t1=t0-86400000;            // 昨日の0時
  const t7=t0-7*86400000;          // 7日前(=今日含め直近、8日前からは折りたたみ対象)
  const t30=t0-30*86400000;        // 30日前
  const buckets=[
    {key:"today", label:"今日", from:t0, to:Infinity, fold:false},
    {key:"yesterday", label:"昨日", from:t1, to:t0, fold:false},
    {key:"week", label:"過去7日間", from:t7, to:t1, fold:false},
    {key:"month", label:"過去30日間", from:t30, to:t7, fold:true},
    {key:"older", label:"もっと前", from:-Infinity, to:t30, fold:true},
  ];
  const card=(n,i)=>`<div class="listcard" onclick="openNotif(${i})">
      <div class="lic">${n.ic}</div>
      <div class="lt"><div class="a">${esc(n.a)}</div><div class="b">${esc(n.b)}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="when">${esc(n.when)}</div>
        ${n.unread?'<div class="notif-dot"></div>':''}
      </div>
    </div>`;
  // tsの無い古いデータは今日扱い
  const withIdx=NOTIFS.map((n,i)=>({n,i,ts:(n.ts!=null?n.ts:now)}));
  let foldHasItems=false;
  const sections=buckets.map(bk=>{
    const items=withIdx.filter(x=>x.ts>=bk.from && x.ts<bk.to);
    if(!items.length) return "";
    if(bk.fold) foldHasItems=true;
    const hidden = bk.fold && !notifShowMore;
    const body = items.map(x=>card(x.n,x.i)).join("");
    return `<div class="notif-sec ${hidden?'is-hidden':''}">
      <h3 class="sub" style="margin:16px 4px 8px">${bk.label}</h3>${body}</div>`;
  }).join("");
  const moreBtn = (foldHasItems && !notifShowMore)
    ? `<button class="more-notif-btn" onclick="notifShowMore=true;renderApp()">もっと見る</button>` : "";

  return `<div class="page">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="room-back" onclick="goBackFromNotify()"><span class="back-arrow">←</span></button>
      <h2 style="margin:0;font-size:20px;color:var(--ink)">お知らせ</h2>
    </div>
    ${reqHtml}${sections}${moreBtn}</div>`;
}

function lockIcOnAccent(){

/* ①現在地ピンの色:ダークは白アクセントなら白・他は赤、ライトは黒アクセントなら黒・他は赤 */
function pinSrc(){
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const mono=document.documentElement.getAttribute("data-accent")==="mono";
  if(dark) return mono ? UI_IMG.pin_white : UI_IMG.pin_red;

}
/* ③旅行日(YYYY-MM-DD)を yyyy.mm.dd 形式に整形。無ければ空文字 */
function tripDateLabel(g){
  const d=g&&g.tripDate;
  if(!d) return "";
  const m=String(d).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m) return "";
  const y0=m[1], mo0=m[2].padStart(2,"0"), d0=m[3].padStart(2,"0");
  const start=`${y0}.${mo0}.${d0}`;
  // ④範囲(宿泊)のとき:初日-最終日。粒度は重複部分を省く
  const e=g&&g.tripDateEnd;
  if(e && e!==d){
    const me=String(e).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(me){
      const y1=me[1], mo1=me[2].padStart(2,"0"), d1=me[3].padStart(2,"0");
      if(y1!==y0)      return `${start}-${y1}.${mo1}.${d1}`; // 年またぎ:yyyy.mm.dd
      else if(mo1!==mo0) return `${start}-${mo1}.${d1}`;       // 月またぎ:mm.dd
      else              return `${start}-${d1}`;               // 同月:dd
    }
  }
  return start;
}

/* ⑤誕生日:月セレクトの選択肢 */
function bdayMonthOptions(bday){
  const cur = bday ? parseInt(String(bday).split("/")[0],10) : 0;
  let o=`<option value="">月</option>`;
  for(let m=1;m<=12;m++) o+=`<option value="${m}" ${cur===m?"selected":""}>${m}月</option>`;
  return o;
}
/* ⑤誕生日:日セレクトの選択肢。月に応じて存在する日のみ(うるう年は考慮し2月は29日まで許可) */
function daysInMonth(m){ return [0,31,29,31,30,31,30,31,31,30,31,30,31][m]||31; }
function bdayDayOptions(bday){
  const parts = bday?String(bday).split("/"):[];
  const curM = parts[0]?parseInt(parts[0],10):0;
  const curD = parts[1]?parseInt(parts[1],10):0;
  const max = curM?daysInMonth(curM):31;
  let o=`<option value="">日</option>`;
  for(let d=1;d<=max;d++) o+=`<option value="${d}" ${curD===d?"selected":""}>${d}日</option>`;
  return o;
}
/* 月を変えたら日の選択肢を存在する範囲に作り直す */
function syncBdayDays(){
  const ms=document.getElementById("edBMonth"); const ds=document.getElementById("edBDay");
  if(!ms||!ds)return;
  const m=parseInt(ms.value,10)||0; const cur=parseInt(ds.value,10)||0;
  const max=m?daysInMonth(m):31;
  let o=`<option value="">日</option>`;
  for(let d=1;d<=max;d++) o+=`<option value="${d}" ${cur===d&&cur<=max?"selected":""}>${d}日</option>`;
  ds.innerHTML=o;
}
function updateBioCount(){
  const ta=document.getElementById("edBio"); const c=document.getElementById("bioCount"); if(!ta||!c)return;
  c.textContent=`${ta.value.length} / 30`;
  c.classList.toggle("over", ta.value.length>=30);
}
function idHandle(fullId){ return (fullId||"").replace(/^@/,""); }
function idTag(fullId){ return ""; }
/* IDの形式チェック。OKならnull、NGなら理由文字列 */
function validateId(handle){
  if(!handle) return "IDを入力してください";
  if(handle.length>30) return "30文字以内にしてください";
  if(!/^[A-Za-z0-9_.]+$/.test(handle)) return "使えるのは半角英数字・_・. のみです";
  if(handle.endsWith(".")) return "末尾に . は使えません";
  if(handle.includes("..")) return ". を連続して使うことはできません";
  return null;
}
/* 1時間に2回まで */
function idChangeAllowed(){
  const now=Date.now(), hourAgo=now-3600000;
  ID_CHANGE_LOG=ID_CHANGE_LOG.filter(t=>t>hourAgo);
  return ID_CHANGE_LOG.length<2;
}
function updateIdHint(){
  const inp=document.getElementById("edId"); const h=document.getElementById("idHint"); if(!inp||!h)return;
  const v=inp.value.trim();
  if(v===idHandle(ME.id)){ h.textContent="現在のIDです"; h.style.color="var(--ink-soft)"; return; }
  const err=validateId(v);
  if(err){ h.textContent="⚠ "+err; h.style.color="var(--no)"; return; }
  // 重複チェック(他人のハンドルと比較)
  const dup=PEOPLE.some(p=>idHandle(p.id).toLowerCase()===v.toLowerCase());
  if(dup){ h.textContent="⚠ このIDは既に使われています"; h.style.color="var(--no)"; return; }
  h.textContent="✓ 使用できます"; h.style.color="var(--ok)";
}
function saveProfile(){
  const nm=(document.getElementById("edName")||{}).value||"";
  // ID変更の検証
  const idInp=document.getElementById("edId");
  if(idInp){
    const newH=idInp.value.trim();
    const curH=idHandle(ME.id);
    if(newH!==curH){
      const err=validateId(newH);
      if(err){ toast("ID: "+err); return; }
      if(PEOPLE.some(p=>idHandle(p.id).toLowerCase()===newH.toLowerCase())){ toast("そのIDは既に使われています"); return; }
      if(!idChangeAllowed()){ toast("IDの変更は1時間に2回までです"); return; }
      const oldId=ME.id;
      ME.id = newH;
      ID_CHANGE_LOG.push(Date.now());
      // 自分のIDを参照する相手の friends 配列・DMキーも更新
      PEOPLE.forEach(p=>{ if(p.friends){ const i=p.friends.indexOf(oldId); if(i>=0)p.friends[i]=ME.id; } });
    }
  }
  ME.name=nm.trim()||ME.name;
  ME.bio=((document.getElementById("edBio")||{}).value||"").trim().slice(0,30);
  // ⑤誕生日:月・日の両方が選ばれていれば "M/D"、未選択なら空に
  const bm=(document.getElementById("edBMonth")||{}).value||"";
  const bd=(document.getElementById("edBDay")||{}).value||"";
  ME.birthday = (bm&&bd) ? `${bm}/${bd}` : "";
  toast("プロフィールを保存しました");
  goView("profile");
}

/* 一覧対象の人を返す。following=自分がフォロー中、followers=自分をフォロー中 */
function followListPeople(){
  const kind=followListKind;
  let arr = PEOPLE.filter(p=> kind==="following" ? p.iFollow : p.followsMe);
  const dateKey = kind==="following" ? "followedAt" : "followerSince";
  const sorted=[...arr];
  if(followListSort==="name"){
    sorted.sort((a,b)=> (a.name||"").localeCompare(b.name||"", "ja"));
  } else {
    sorted.sort((a,b)=>{
      const da=a[dateKey]||0, db=b[dateKey]||0;
      return followListSort==="new" ? (db-da) : (da-db);
    });
  }
  return sorted;
}

const REACTIONS = ["👍","❤️","😆","😮","😢","😡","🎉","🙏","🔥","💯"];
function groupMsgHTML(m,idx){
  ensureMsgId(m);
  // システムメッセージ:中央寄せ・半透明枠・白字・時刻つき
  if(m.sys){
    return `<div class="sys-msg"><span>${esc(m.t)}${m.ago?` ・ ${esc(m.ago)}`:""}</span></div>`;
  }
  // 送信取り消し済み:中央に淡色表示で残す
  if(m.unsent){
    return `<div class="sys-msg unsent"><span>${m.mine?"メッセージの送信を取り消しました":(esc(m.who||"相手")+"がメッセージの送信を取り消しました")}</span></div>`;
  }
  const press=`oncontextmenu="event.preventDefault();openMsgMenu('group','${m.id}',event.clientX,event.clientY)" ontouchstart="msgTouchStart(event,'group','${m.id}')" ontouchend="msgTouchEnd()" ontouchmove="msgTouchEnd()"`;
  const reply = m.replyTo ? `<div class="reply-quote ${m.mine?'me':'them'}"><span class="rq-name">${esc(m.replyTo.who||"")}</span><span class="rq-text">${m.replyTo.img?"写真":esc((m.replyTo.t||"")).slice(0,50)}</span></div>` : "";
  const body = m.img
    ? `<div class="bub ${m.mine?'me':'them'} img-bub" ${press}><img src="${m.img}" alt="写真"></div>`
    : `<div class="bub ${m.mine?'me':'them'}" ${press}>${decorateMentions(m.t)}</div>`;
  // リアクションの集計表示
  const rx=m.reactions||{};
  const rxHtml=Object.keys(rx).filter(e=>(rx[e]||[]).length).map(e=>{
    const cnt=(rx[e]||[]).length; const mineR=(rx[e]||[]).includes("Tomato");
    return `<span class="rx-chip ${mineR?'mine':''}" onclick="toggleReaction(${idx},'${e}')">${e} ${cnt}</span>`;
  }).join("");
  const rxRow = rxHtml?`<div class="rx-row ${m.mine?'me':'them'}">${rxHtml}</div>`:"";
  // 既読(自分のメッセージのみ小さく表示)
  const readHtml = m.mine&&m.readBy?`<span class="read-mark">既読 ${m.readBy}</span>`:"";
  // リアクション追加ボタン:自分の送信メッセージには出さない
  const addBtn = m.mine ? "" : `<button class="rx-add" onclick="openReactionPicker(${idx})" title="リアクション">☺</button>`;

  if(m.mine) return `<div class="bub-wrap me">${reply}
      <div class="bub-line me">${body}</div>
      <div class="bub-time">${readHtml}<span class="msg-clock">${esc(m.ago||"")}</span></div>${rxRow}</div>`;
  return `<div class="bub-wrap them"><div class="bub-name">${esc(m.who||"")}</div>${reply}
      <div class="bub-line them">${body}${addBtn}</div>
      <div class="bub-time"><span class="msg-clock">${esc(m.ago||"")}</span></div>${rxRow}</div>`;
}
let reactionPickerIdx=null;
function openReactionPicker(idx){ reactionPickerIdx=idx; renderGroupChatBody(false);
  // ピッカーを描画
  const host=document.getElementById("rxPicker");
  if(host){ host.innerHTML=REACTIONS.map(e=>`<button onclick="pickReaction('${e}')">${e}</button>`).join("");
    host.classList.add("show"); }
}
function closeReactionPicker(){ reactionPickerIdx=null; const h=document.getElementById("rxPicker"); if(h){h.classList.remove("show");h.innerHTML="";} }
function pickReaction(e){ if(reactionPickerIdx==null)return; toggleReaction(reactionPickerIdx,e); closeReactionPicker(); }
function toggleReaction(idx,e){
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
  const m=g.chat[idx]; if(!m)return;
  if(m.mine){ toast("自分のメッセージにはリアクションできません"); return; }  // 自分の送信には不可
  if(!m.reactions)m.reactions={};
  // 一人1種類まで:既に押している別の絵文字があれば外す
  const already=Object.keys(m.reactions).find(k=>(m.reactions[k]||[]).includes("Tomato"));
  if(already && already!==e){
    m.reactions[already]=m.reactions[already].filter(n=>n!=="Tomato");
    if(!m.reactions[already].length)delete m.reactions[already];
  }
  if(!m.reactions[e])m.reactions[e]=[];
  const i=m.reactions[e].indexOf("Tomato");
  if(i>=0)m.reactions[e].splice(i,1); else m.reactions[e].push("Tomato");
  if(!m.reactions[e].length)delete m.reactions[e];
  renderGroupChatBody(false);
}
function renderGroupChatBody(scroll){
  const b=document.getElementById("chatBody"); if(!b)return;
  const g=GROUPS.find(x=>x.id===activeGid); const log=g?g.chat:[];
  b.innerHTML = `<div class="daydiv">今日</div>` + log.map((m,i)=>groupMsgHTML(m,i)).join("")
    + (pendingTyping?`<div class="typing"><i></i><i></i><i></i></div>`:"")
    + `<div id="rxPicker" class="rx-picker"></div>`;
  renderReplyBar();
  if(scroll) chatScrollBottom();
}

/* 収支から最小回数の送金リストを作る(貪欲法) */
function settleDebts(bal){
  const debtors=[], creditors=[];
  Object.keys(bal).forEach(name=>{
    if(bal[name]<-0) debtors.push({name, amt:-bal[name]});
    else if(bal[name]>0) creditors.push({name, amt:bal[name]});
  });
  debtors.sort((a,b)=>b.amt-a.amt); creditors.sort((a,b)=>b.amt-a.amt);
  const res=[]; let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const pay=Math.min(debtors[i].amt, creditors[j].amt);
    if(pay>0) res.push({from:debtors[i].name, to:creditors[j].name, amount:Math.round(pay)});
    debtors[i].amt-=pay; creditors[j].amt-=pay;
    if(debtors[i].amt<=0)i++; if(creditors[j].amt<=0)j++;
  }
  return res;
}

/* ID文字列から決定的に簡易QR風の図形を生成(装飾。読み取りは不可) */
function qrSVG(seed){
  let h=0; for(let i=0;i<seed.length;i++){ h=(h*31+seed.charCodeAt(i))>>>0; }
  const N=21, cell=8, size=N*cell;
  function rng(){ h=(h*1103515245+12345)>>>0; return (h>>>16)&0xff; }
  let rects="";
  const finder=(x,y)=>{
    let s="";
    s+=`<rect x="${x*cell}" y="${y*cell}" width="${7*cell}" height="${7*cell}" fill="#111"/>`;
    s+=`<rect x="${(x+1)*cell}" y="${(y+1)*cell}" width="${5*cell}" height="${5*cell}" fill="#fff"/>`;
    s+=`<rect x="${(x+2)*cell}" y="${(y+2)*cell}" width="${3*cell}" height="${3*cell}" fill="#111"/>`;
    return s;
  };
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const inFinder=(x<7&&y<7)||(x>N-8&&y<7)||(x<7&&y>N-8);
    if(inFinder) continue;
    if(rng()>128) rects+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#111"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${size}" height="${size}" fill="#fff"/>${rects}${finder(0,0)}${finder(N-7,0)}${finder(0,N-7)}</svg>`;
}

let LEFT_DONE_TRIPS=[];   // 退会した確定済みの旅の記録(バッジを消さないため)
function leaveGroup(gid){
  const g=GROUPS.find(x=>x.id===gid); if(!g)return;
  if(!confirm(`「${g.name}」から退会しますか？\n（このグループは一覧から消えます。獲得したバッジは残ります）`)) return;

  if(groupProgress(g).status==="done"){
    LEFT_DONE_TRIPS.push({destination:g.room.destination, destKind:g.room.destKind, nights:nightsOf(g.room.chosenDate)});
  }
  g.joined=false;

}

/* 実績バッジ(仕様表に準拠。同じ tier 番号内は達成した最上位のみ表示=前段は更新で消える) */
function doneTrips(){ return GROUPS.filter(g=>g.joined && groupProgress(g).status==="done"); }

/* 確定した旅の行き先リスト(退会済みの実績 LEFT_DONE_TRIPS も含める=退会してもバッジは消えない) */
function doneTripDests(){
  const list=doneTrips().map(g=>({destination:g.room.destination, destKind:g.room.destKind, nights:nightsOf(g.room.chosenDate)}));
  LEFT_DONE_TRIPS.forEach(t=>list.push({destination:t.destination, destKind:t.destKind, nights:t.nights||0}));
  return list;
}
/* chosenDate 文字列("○泊○日"を含む)から宿泊数を取り出す。無ければ0 */
function nightsOf(chosenDate){
  if(!chosenDate) return 0;
  const m=String(chosenDate).match(/(\d+)\s*泊/);
  return m? parseInt(m[1],10) : 0;
}
/* 行き先文字列から複数の実在国を検出。1回の旅で最大10か国、かつ「宿泊数+1」を上限とする */
function countriesInTrip(dest, nights){
  if(!dest) return [];
  const found=[]; const seen=new Set();
  // 区切り文字(・,、/＋&と空白)で分割して各断片を国判定。分割で出ないものは全体も判定
  const parts=String(dest).split(/[・,、\/＋\+&\s]+/).filter(Boolean);
  const tryAdd=(s)=>{ const c=detectCountry(s); if(c && !seen.has(c.code)){ seen.add(c.code); found.push(c); } };
  parts.forEach(tryAdd);
  if(!found.length) tryAdd(dest);
  // 宿泊数が不明(読み取れず0)のときは上限を1か国に固定する。
  // 宿泊数が分かるときは「宿泊数+1」を上限(最大10)とする。
  const cap = (nights && nights>0) ? Math.min(10, nights+1) : 1;
  return found.slice(0, cap);
}
function doneTripCount(){
  // 訪問「か所」=確定した旅の数
  return doneTripDests().length;
}
function visitedPrefSet(){
  const set=new Set();
  doneTripDests().forEach(t=>{ if(t.destKind!=="overseas" && t.destination){
    t.destination.split(/[・,、\/]/).forEach(s=>{ s=s.trim(); if(s)set.add(s.replace(/(都|府|県)$/,"")); }); }});
  return set;
}
function visitedPrefCount(){ return visitedPrefSet().size; }
function visitedCountrySet(){
  const set=new Set();
  doneTripDests().forEach(t=>{ if(t.destKind==="overseas" && t.destination){
    const cs=countriesInTrip(t.destination, t.nights);
    if(cs.length) cs.forEach(c=>set.add(c.code));
    else set.add(t.destination.trim());  // 未判別は文字列のまま1か国として数える
  }});
  return set;
}

/* 行き先文字列から実在する国を判別(正式名称・英語名・略称で照合)。戻り値は国オブジェクト or null */
function detectCountry(dest){
  if(!dest) return null;
  const s=String(dest).trim();
  const low=s.toLowerCase();
  // 完全一致(日本語正式名称・略称・英語名・コード)を優先
  for(const c of COUNTRY_LIST){
    if(s===c.ja || c.al.includes(s)) return c;
    if(low===c.en.toLowerCase() || low===c.code.toLowerCase()) return c;
  }
  // 部分一致(行き先に国名/略称が含まれる)。長い名称を優先して誤検出を抑える
  const cand=[];
  for(const c of COUNTRY_LIST){
    const keys=[c.ja, ...c.al];
    for(const k of keys){ if(k.length>=2 && s.includes(k)){ cand.push({c,len:k.length}); break; } }
  }
  if(cand.length){ cand.sort((a,b)=>b.len-a.len); return cand[0].c; }
  return null;
}

/* 国別バッジ:訪問した国ごとに訪問回数に応じてレベルが上がる */
const COUNTRY_BADGE_LV=[
  {lv:1,n:1,suffix:"Ⅰ",bg:"bronze"},{lv:2,n:2,suffix:"Ⅱ",bg:"silver"},
  {lv:3,n:3,suffix:"Ⅲ",bg:"gold"},{lv:4,n:5,suffix:"Ⅳ",bg:"purple"},
  {lv:5,n:10,suffix:"Ⅴ",bg:"white"},{lv:6,n:100,suffix:"",bg:"crown"},
];
/* 確定した海外旅行の行き先から実在国を判別し、国コード単位で訪問回数を集計 */
function countryVisitCounts(){
  const cnt={};  // code -> {country, ja, visits}
  doneTripDests().forEach(t=>{
    if(t.destKind==="overseas" && t.destination){
      countriesInTrip(t.destination, t.nights).forEach(c=>{
        if(!cnt[c.code]) cnt[c.code]={code:c.code, ja:c.ja, visits:0};
        cnt[c.code].visits++;
      });
    }
  });
  return cnt;
}
/* 国別バッジ用の短い表示名(COUNTRY_LIST の略称があれば最初のものを使う) */
function countryShortName(info){
  const c=COUNTRY_LIST.find(x=>x.code===info.code);
  // 正式名称がすでに短い(4文字以下)なら、それをそのまま表示名にする(例:台湾・インド)
  if(info.ja && info.ja.length<=4) return info.ja;
  if(c && c.al && c.al.length){
    // 最も短い略称(国名らしいもの)を選ぶ
    const al=c.al.filter(a=>a.length>=2).sort((a,b)=>a.length-b.length);
    if(al.length) return al[0];
  }
  return info.ja.replace(/(共和国|王国|連邦|公国|大公国|首長国連邦|民主共和国|人民共和国|社会主義共和国|イスラム共和国|多民族国|連合王国|連合|独立国|市国|民国|国)$/,"")||info.ja;
}
/* 獲得済みの国別バッジ(国ごとに到達した最上位レベルのみ=下位は置き換わる) */
function countryBadges(){
  const cnt=countryVisitCounts(); const out=[];
  Object.values(cnt).forEach(info=>{
    let top=null; COUNTRY_BADGE_LV.forEach(l=>{ if(info.visits>=l.n) top=l; });
    if(top){
      const shortName=countryShortName(info);
      out.push({code:info.code, country:shortName, name:`${shortName}${top.suffix}`, bg:top.bg, visits:info.visits, id:"country_"+info.code});
    }
  });
  return out;
}
/* 各 tier で達成済みの最上位だけを返す(前段は消える) */
function earnedBadges(){
  const byTier={};
  BADGE_DEFS.forEach(b=>{ let ok=false; try{ok=b.need();}catch(e){}
    if(ok){ if(!byTier[b.tier]||b.lv>byTier[b.tier].lv) byTier[b.tier]=b; }});
  return Object.values(byTier).sort((a,b)=>a.tier-b.tier);
}
/* バッジアイコンの中身(EU国旗・年号・絵文字) */
function badgeIconInner(b){
  if(b.flag==="eu") return `<img src="${EU_FLAG}" alt="EU" style="width:78%;height:78%;object-fit:cover;border-radius:7px">`;
  if(b.flag==="y2026") return `<span style="font-size:15px;font-weight:900;color:#1b2330">2026</span>`;
  return b.ic||"🏅";
}
/* 各 tier の「次に表示すべきバッジ」(達成最上位 or 未達成なら最下位)。隠しバッジは未獲得なら除外 */
function displayBadges(){
  const tiers=[...new Set(BADGE_DEFS.map(b=>b.tier))];
  const out=[];
  tiers.forEach(t=>{
    const inTier=BADGE_DEFS.filter(b=>b.tier===t).sort((a,b)=>a.lv-b.lv);
    let earned=null; inTier.forEach(b=>{ let ok=false; try{ok=b.need();}catch(e){} if(ok)earned=b; });
    const hidden=inTier[0].hidden;
    if(hidden && !earned) return;   // 隠しバッジは未獲得なら表示しない
    out.push({badge: earned||inTier[0], got:!!earned});
  });
  return out;
}
function showBadgeInfo(id){
  const b=BADGE_DEFS.find(x=>x.id===id); if(!b)return;
  let got=false; try{got=b.need();}catch(e){}
  if(got){
    // 獲得済み:鍵マークや絵文字は出さず、テーマに応じた読みやすい文字色で表示
    badgeToast(`${esc(b.name)}：${esc(b.tap)}`, 3200, false);
  } else if(b.hidden){
    badgeToast(`？？？（隠しバッジ）`, 3200, true);
  } else {
    // 未獲得:名前と条件の間で改行
    badgeToast(`${esc(b.name)}（未獲得）<br>条件：${esc(b.cond)}`, 3200, true);
  }
}

/* ---- バッジ獲得チェック&通知 ---- */
let BADGE_SEEN = {};   // 既に獲得通知済みのバッジid
function checkBadgeAwards(silent){
  // 通常バッジ:各tierの最上位達成
  BADGE_DEFS.forEach(b=>{
    let ok=false; try{ok=b.need();}catch(e){}
    if(ok && !BADGE_SEEN[b.id]){
      BADGE_SEEN[b.id]=true;
      if(!silent) pushNotif({ic: b.flag==="eu"?"🇪🇺":(b.ic||"🏅"), a:b.msg, b:"プロフィールのバッジを確認しよう", when:"たった今", unread:true, target:{type:"badges"}});
    }
  });
  // 国別バッジ
  countryBadges().forEach(cb=>{
    const key=cb.id;
    if(!BADGE_SEEN[key]){ BADGE_SEEN[key]=true;
      if(!silent) pushNotif({ic:"🌐", a:`バッジ「${cb.name}」を獲得しました！`, b:"プロフィールのバッジを確認しよう", when:"たった今", unread:true, target:{type:"badges"}}); }
  });
}
/* 他人に見せるバッジの表示ON/OFF(最大8つ)。デフォルトは全表示 */
let BADGE_VISIBLE = null;   // null=全部表示、配列=表示するbadge idのリスト
function isBadgeShown(id){ return BADGE_VISIBLE===null ? true : BADGE_VISIBLE.includes(id); }
function shownBadgeCount(){ return BADGE_VISIBLE===null ? earnedBadges().length : BADGE_VISIBLE.length; }
function toggleBadgeVisible(id){
  // 獲得済みのみ対象
  const earned=earnedBadges().map(b=>b.id).concat(countryBadges().map(c=>c.id));
  if(BADGE_VISIBLE===null) BADGE_VISIBLE=earned.slice(); // 初回は全獲得を入れる
  const i=BADGE_VISIBLE.indexOf(id);
  if(i>=0){ BADGE_VISIBLE.splice(i,1); }
  else { if(BADGE_VISIBLE.length>=8){ toast("表示できるバッジは8つまでです"); return; } BADGE_VISIBLE.push(id); }
  renderApp();
}

/* 他人プロフィールに見せる公開バッジ(相手の p.badges を使用。最大8) */
function peopleBadgesHtml(p){
  const ids=(p&&p.badges)||[];
  if(!ids.length) return "";
  const cells=ids.slice(0,8).map(id=>{
    const b=BADGE_DEFS.find(x=>x.id===id);
    if(b) return `<div class="badge-mini" style="background:${BADGE_BG[b.bg]||BADGE_BG.blue}" title="${esc(b.name)}">${badgeIconInner(b)}</div>`;
    return `<div class="badge-mini" style="background:${BADGE_BG.bronze}" title="${esc(id)}">🌐</div>`;
  }).join("");
  return `<h3 class="sub" style="margin:18px 4px 8px">🏅 獲得バッジ</h3>
    <div class="badge-row-prof">${cells}</div>`;
}
function shownBadgesForDisplay(){
  // 他人プロフィール用:獲得済み&表示ONのバッジ(最大8)
  const earned=earnedBadges();
  const countries=countryBadges();

}

          <div style="position:absolute;top:-4px;right:8px;width:18px;height:18px;border-radius:50%;background:${on?'var(--accent)':'var(--line)'};color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center">${on?'✓':''}</div>
        </div>`;}).join("")}
    </div>`:`<p class="muted" style="text-align:center;margin-top:20px">まだ獲得したバッジがありません。<br>旅を確定したり友達を増やすと増えていきます。</p>`}
  </div>`;
}

function toggleFactor(f){
  const i=MYPREFS.indexOf(f);
  if(i>=0)MYPREFS.splice(i,1); else MYPREFS.push(f);
  renderApp();
}
const SLOT_CYCLE = [null,"full","day","night"];   // タップで巡回
const SLOT_LABEL = {full:"終日", day:"昼", night:"夜"};

function cycleMyCal(key){
  const cur=MYCAL[key]||null;
  const idx=SLOT_CYCLE.indexOf(cur);
  const next=SLOT_CYCLE[(idx+1)%SLOT_CYCLE.length];
  if(next) MYCAL[key]=next; else delete MYCAL[key];
  drawMyCal();
}
function myCalMove(d){ myCalMonth+=d; if(myCalMonth>12){myCalMonth=1;myCalYear++;} if(myCalMonth<1){myCalMonth=12;myCalYear--;} drawMyCal(); }
function myCalCount(){ return Object.keys(MYCAL).length; }

function screenCalendar(){
  return `<div class="page">
    <h2 class="ph">マイカレンダー 🗓️</h2>
    <div class="mycal-help">
      あらかじめ<b>自分の空いている日</b>を入れておくと、参加する旅の<b>日程調整に自動で反映</b>されます。<br>
      日付をタップするたびに <b>終日 → 昼のみ → 夜のみ → 空きなし</b> と切り替わります。
    </div>
    <div class="cal-head">
      <button onclick="myCalMove(-1)">‹</button><div class="cal-title" id="myCalTitle"></div><button onclick="myCalMove(1)">›</button>
    </div>
    <div class="cal">
      <div class="dow"><span class="wk">週</span><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
      <div id="myCalBody"></div>
    </div>
    <div class="cal-legend2">
      <span class="lg"><span class="sw full"></span>終日OK</span>
      <span class="lg"><span class="sw day"></span>昼のみ</span>
      <span class="lg"><span class="sw night"></span>夜のみ</span>
      <span class="lg"><span class="sw none"></span>空きなし</span>
      <span class="lg"><b style="color:var(--accent)">▶</b>その週を終日で一括</span>
    </div>
    <p class="hint center" id="myCalCount">登録した空き日：${myCalCount()}日</p>
  </div>`;
}
function drawMyCal(){
  const el=$("#myCalTitle"); if(!el)return;
  const y=myCalYear,m=myCalMonth;
  el.textContent=t("date.full",{y,m,mn:monthName(m)});
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  let html="";
  for(let w=0;w<cells.length/7;w++){
    const wk=cells.slice(w*7,w*7+7);
    const validKeys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
    const allFull=validKeys.length>0&&validKeys.every(k=>MYCAL[k]==="full");
    html+=`<div class="calrow"><button class="weekbtn ${allFull?'on':''}" onclick="toggleMyCalWeek(${w})" title="この週を終日で一括設定／解除">▶</button>`;
    html+=wk.map(d=>{
      if(!d)return `<div class="cell empty"></div>`;
      const key=ymd(y,m,d),dow=new Date(y,m-1,d).getDay(),hol=HOLIDAYS[key];
      const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);const past=dt<today;
      const st=MYCAL[key];
      let cls="cell";
      if(dow===0)cls+=" sun";if(dow===6)cls+=" sat";if(hol)cls+=" hol";if(past)cls+=" past";
      if(dt.getTime()===today.getTime())cls+=" today";
      if(st==="full")cls+=" av-full"; else if(st==="day")cls+=" av-day"; else if(st==="night")cls+=" av-night";
      const slot = st?`<span class="slot">${slotLabel(st)}</span>`:`<span class="slot">&nbsp;</span>`;
      return `<div class="${cls}" ${past?"":`onclick="cycleMyCal('${key}')"`}>
        <span class="d">${d}</span>${slot}</div>`;
    }).join("");
    html+=`</div>`;
    if(w<cells.length/7-1)html+=`<div style="height:5px"></div>`;
  }
  $("#myCalBody").innerHTML=html;
  const cc=$("#myCalCount"); if(cc) cc.textContent=`登録した空き日：${myCalCount()}日`;
}
function toggleMyCalWeek(w){
  const y=myCalYear,m=myCalMonth;
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const wk=cells.slice(w*7,w*7+7);
  const today=new Date();today.setHours(0,0,0,0);
  const keys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
  const allFull=keys.length>0&&keys.every(k=>MYCAL[k]==="full");
  keys.forEach(k=>{ if(allFull)delete MYCAL[k]; else MYCAL[k]="full"; });
  drawMyCal();
}

  sc.innerHTML=html;
  window.scrollTo({top:0,behavior:"auto"});

/* ④フォロー一覧の並び替え用に、各人へ擬似的なフォロー日時を割り当てる(試作データ) */
function initFollowDates(){
  const base=Date.now();
  PEOPLE.forEach((p,i)=>{
    // 自分→相手のフォロー日(iFollow時)。iごとに過去にずらす
    if(p.iFollow && p.followedAt==null) p.followedAt = base - (i+1)*5*86400000 - (i*3600000);
    // 相手→自分のフォロー日(followsMe時)
    if(p.followsMe && p.followerSince==null) p.followerSince = base - (i+2)*4*86400000 - (i*7200000);
  });
}
initFollowDates();
checkBadgeAwards(true);   // 起動時:既に条件を満たすバッジは通知済み扱いにする
renderApp();
