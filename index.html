<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAVIгҖӮ</title>
<style>
  :root{
    --ink:#1b2330; --ink-soft:#5a6678; --line:#e3e7ee; --bg:#faf3ed; --card:#fff;
    --accent:#EC6800; --accent-deep:#c45500; --warm:#f2994a; --sun:#e2574c; --sat:#EC6800;
    --ok:#2e9e6b; --hold:#c9a227; --no:#d9534f;
    --shadow:0 1px 2px rgba(27,35,48,.06),0 8px 24px rgba(27,35,48,.06); --radius:14px;
    --bar:rgba(255,255,255,.92); --bar-line:#e3e7ee; --field:#fcfdff;
    --skel:#eef1f6; --chip:#eef2fb;
    --map1:#fbdcc2; --map2:#f7bd8c; --map3:#f29a55; --map4:#f07f22; --map5:#EC6800;
  }
  [data-theme="dark"]{
    --ink:#ececec; --ink-soft:#9a9a9a; --line:#2a2a2a; --bg:#000000; --card:#141414;
    --accent:#EC6800; --accent-deep:#c45500; --warm:#f2994a; --sun:#e2574c; --sat:#EC6800;
    --ok:#3fb583; --hold:#d4b13b; --no:#e26b66;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.6); --radius:14px;
    --bar:rgba(10,10,10,.92); --bar-line:#2a2a2a; --field:#1a1a1a;
    --skel:#1c1c1c; --chip:#1f1f1f;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 90px}
  header.app{position:sticky;top:0;z-index:30;background:rgba(246,247,251,.86);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line)}
  .head-inner{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{font-weight:800;letter-spacing:.04em;font-size:18px;display:flex;align-items:baseline;gap:1px;cursor:pointer}
  .logo .lg-en{font-family:"Yu Gothic","жёёгӮҙгӮ·гғғгӮҜ",YuGothic,"Yu Gothic Medium",sans-serif;color:var(--accent)}
  .logo .lg-dot{font-family:"HGMinchoB","HGжҳҺжңқB","Yu Mincho","жёёжҳҺжңқ",serif;color:var(--accent)}
  .logo span{font-size:11px;color:var(--ink-soft);font-weight:600;letter-spacing:.12em}
  .head-spacer{flex:1}
  .room-pill{font-size:12px;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
    padding:4px 10px;border-radius:999px;white-space:nowrap}
  .steps{display:flex;gap:6px;max-width:760px;margin:0 auto;padding:10px 16px 0}
  .steps .seg{flex:1;height:4px;border-radius:999px;background:var(--line);transition:.3s}
  .steps .seg.done{background:var(--accent)}
  .steps .seg.now{background:var(--accent)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px;margin-top:18px}
  h1{font-size:24px;margin:.2em 0 .1em;letter-spacing:.01em}
  h2{font-size:19px;margin:.1em 0 .5em}
  h3.sub{font-size:15px;margin:18px 0 6px;display:flex;align-items:center;gap:8px}
  h3.sub .badge{background:var(--accent);color:#fff;border-radius:7px;width:22px;height:22px;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .lead{color:var(--ink-soft);margin:.2em 0 1em;font-size:14px}
  .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase}
  label.fld{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--ink)}
  input[type=text],input[type=number],select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:#fcfdff}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:2px solid #c9d8ff;border-color:var(--accent)}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .row{display:flex;gap:10px;flex-wrap:wrap} .row>*{flex:1;min-width:120px}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;
    padding:12px 18px;border-radius:11px;transition:.15s}
  .btn.primary{background:var(--accent);color:#fff} .btn.primary:hover{background:var(--accent-deep)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)} .btn.ghost:hover{border-color:#c7cedb}
  .btn:disabled{opacity:.45;cursor:not-allowed} .btn.block{width:100%}
  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap} .btn-row .btn{flex:1}
  .seg-toggle{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
  .seg-toggle button{flex:1;border:0;background:#fff;padding:12px;font-weight:700;cursor:pointer;
    font-family:inherit;font-size:14px;color:var(--ink-soft)}
  .seg-toggle button.on{background:var(--accent);color:#fff}
  .roster{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  /* в‘Ўгғ•гӮ©гғӯгғјдёӯгҒ®еҸӢйҒ”гӮ’йҒёгӮ“гҒ§иҝҪеҠ гҒҷгӮӢгғӘгӮ№гғҲ */
  .friend-pick{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .friend-row{display:flex;align-items:center;gap:10px;width:100%;border:1px solid var(--line);
    background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left}
  .friend-row .fp-ava{font-size:22px;line-height:1;flex:0 0 auto}
  .friend-row .fp-name{flex:1;font-weight:700;color:var(--ink);font-size:14px}
  .friend-row .fp-act{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  .friend-row.on{border-color:var(--accent);background:rgba(var(--accent-rgb),.08)}
  .friend-row.on .fp-act{color:var(--accent)}
  [data-theme="dark"] .friend-row{background:var(--field)}
  [data-theme="dark"][data-accent="mono"] .friend-row.on .fp-act{color:var(--ink)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef2fb;color:var(--accent-deep);
    border-radius:999px;padding:5px 11px;font-size:13px;font-weight:600}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .timer{display:inline-flex;align-items:center;gap:8px;background:#fff5ec;color:#b9651b;
    border:1px solid #ffe2c7;border-radius:999px;padding:6px 13px;font-weight:700;font-size:13px}
  .genre{border:1px solid var(--line);border-radius:12px;margin-top:12px;overflow:hidden}
  .genre>.gh{padding:11px 15px;font-weight:700;background:#fbfcff;border:0;width:100%;
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit;
    font-size:14px;color:var(--ink);text-align:left}
  .genre.open>.gh{border-bottom:1px solid var(--line)}
  .genre .gh-right{display:inline-flex;align-items:center;gap:8px}
  .genre .gh-caret{color:var(--ink-soft);font-size:12px}
  .genre .count{font-size:12px;color:var(--ink-soft);font-weight:600}
  [data-theme="dark"] .genre>.gh{background:var(--field);color:var(--ink)}
  /* в‘ гҖҢгӮӮгҒЈгҒЁиҰӢгӮӢ/й–үгҒҳгӮӢгҖҚгғңгӮҝгғі */
  .more-genres{display:block;width:100%;margin-top:12px;padding:11px;border:1px dashed var(--line);
    background:transparent;border-radius:12px;font-weight:700;font-size:14px;color:var(--accent);
    cursor:pointer;font-family:inherit}
  .more-genres:hover{border-color:var(--accent)}
  .opts{display:flex;flex-wrap:wrap;gap:8px;padding:13px 15px}
  .opt{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-size:14px;
    cursor:pointer;transition:.12s;user-select:none}
  .opt:hover{border-color:#c7cedb} .opt.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .place-tabs{display:flex;gap:8px;margin:10px 0}
  .place-tabs button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px;
    font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft)}
  .place-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mapwrap{margin-top:6px;background:#fbfcff;border:1px solid var(--line);border-radius:12px;padding:8px}
  .mapwrap svg{width:100%;height:auto;display:block;touch-action:manipulation}
  .mapwrap svg path{fill:#e9eef7;stroke:#fff;stroke-width:.5;cursor:pointer;transition:.1s}
  .mapwrap svg path:hover{fill:#c3d4f5}
  .mapwrap svg path.sel{fill:var(--accent);stroke:#fff}
  /* 1зҘЁгҒ§гӮӮгҒ—гҒЈгҒӢгӮҠиүІгҒҘгҒҸгӮҲгҒҶе…ЁдҪ“гҒ«дёҖж®өжҝғгҒҸ */
  .mapwrap svg path.m1{fill:var(--map1)}.mapwrap svg path.m2{fill:var(--map2)}.mapwrap svg path.m3{fill:var(--map3)}
  .mapwrap svg path.m4{fill:var(--map4)}.mapwrap svg path.m5{fill:var(--map5)}
  .mapwrap svg .okiframe{fill:none;stroke:#9aa6bb;stroke-width:1.1;stroke-dasharray:5 4}
  .selpref{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:8px}
  .selpref .chip{background:#eef2fb}
  /* жө·еӨ– еӣҪгӮ«гғјгғү(жҷҜиүІиғҢжҷҜ+еӣҪж——) */
  .country-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px}
  .ccard{position:relative;border-radius:11px;overflow:hidden;cursor:pointer;border:2px solid transparent;
    aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.7);transition:.12s}
  .ccard .scene{position:absolute;inset:0;z-index:0}
  .ccard .veil2{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.4))}
  .ccard .cname{position:relative;z-index:2;padding:4px;text-align:center;line-height:1.15;
    display:flex;flex-direction:column;align-items:center;gap:1px}
  .ccard .cname .cn-ja{font-size:11px;font-weight:800;letter-spacing:0;white-space:nowrap}
  .ccard .cname .cn-en{font-size:7px;font-weight:700;letter-spacing:.04em;opacity:.92;white-space:nowrap}
  .ccard.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,110,245,.35)}
  .ccard.sel::after{content:"вң“";position:absolute;top:4px;right:6px;z-index:3;font-size:14px}
  .tally{margin-top:8px}
  .tline{display:flex;align-items:center;gap:10px;margin:7px 0}
  .tline .name{flex:0 0 130px;font-size:14px;display:flex;align-items:center;gap:5px}
  .tbar{flex:1;height:22px;background:#faf3ed;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .tbar>i{display:block;height:100%;background:var(--accent);border-radius:7px}
  .tline .num{flex:0 0 54px;text-align:right;font-size:13px;color:var(--ink-soft);font-weight:700}
  /* в‘ўж—ҘзЁӢиӘҝж•ҙ иЁҳеҗҚгғҒгғғгғ— */
  .avail-names{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px 140px}
  .avail-names .av-chip{font-size:11px;font-weight:700;color:var(--accent);
    background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  /* в‘ўжҳјгҒ®гҒҝ/еӨңгҒ®гҒҝгҒ®жіЁиЁҳгҒҜеҗҚеүҚ(гӮўгӮҜгӮ»гғігғҲиүІ)гҒЁеҲҶгҒ‘гҖҒжң¬ж–ҮиүІгҒ§иЎЁзӨә */
  .avail-names .av-chip .av-slot{color:var(--ink);font-weight:700}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 12px}
  .cal-head button{border:1px solid var(--line);background:#fff;border-radius:9px;width:38px;height:38px;font-size:18px;cursor:pointer}
  .cal-title{font-weight:800;font-size:17px;min-width:128px;text-align:center}
  .cal{max-width:360px;margin:0 auto}
  .calrow{display:grid;grid-template-columns:26px repeat(7,1fr);gap:5px;align-items:center}
  .dow{display:grid;grid-template-columns:26px repeat(7,1fr);gap:5px;text-align:center;font-size:11px;
    color:var(--ink-soft);font-weight:700;margin-bottom:4px}
  .dow .wk{font-size:0}
  .dow span:nth-child(2){color:var(--sun)} .dow span:nth-child(8){color:var(--sat)}
  .weekbtn{width:26px;height:26px;border:1px solid var(--line);background:#fff;border-radius:7px;
    cursor:pointer;font-size:11px;color:var(--accent);font-weight:800;padding:0}
  .weekbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cell{aspect-ratio:1/1.18;border-radius:9px;border:1px solid var(--line);background:#fff;display:flex;
    flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.1s;padding:2px}
  .cell.empty{border:0;background:transparent;cursor:default}
  .cell .d{font-size:13px;font-weight:700} .cell .mini{font-size:9px;color:var(--ink-soft);line-height:1}
  .cell.sun .d{color:var(--sun)} .cell.sat .d{color:var(--sat)}
  .cell.hol{border-color:#f6d3ad} .cell.hol .d{color:var(--warm)}
  .cell.hol::after{content:"зҘқ";position:absolute;top:3px;right:4px;font-size:8px;color:var(--warm);font-weight:700}
  .cell.past{opacity:.32;cursor:not-allowed} .cell.today{box-shadow:0 0 0 2px var(--accent) inset}
  .cell.mine{border-color:var(--accent)}
  .cell.mine::before{content:"";position:absolute;bottom:5px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  /* зҜ„еӣІйҒёжҠһгҒ®йҖ”дёӯгғҸгӮӨгғ©гӮӨгғҲ */
  .cell.rangestart{background:#3b6ef5!important;border-color:#3b6ef5}
  .cell.rangestart .d{color:#fff}
  .cell.inrange{background:#cfe0ff}
  .cell.h1{background:#eaf0ff}.cell.h2{background:#cdddff}.cell.h3{background:#a7c4ff}
  .cell.h4{background:#7ba4ff;border-color:#7ba4ff}.cell.h5{background:#4f86ff;border-color:#4f86ff}
  .cell.h4 .d,.cell.h5 .d,.cell.h4 .mini,.cell.h5 .mini{color:#fff}
  .legend{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:11px;color:var(--ink-soft);flex-wrap:wrap}
  .legend i{width:16px;height:11px;border-radius:3px;display:inline-block}
  .modebar{display:flex;gap:8px;margin:8px 0}
  .modebar button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;
    font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .modebar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .summary-box{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:14px;margin-top:14px}
  .summary-box .big{font-size:15px;font-weight:800;color:#16305c}
  /* в‘ и–„йқ’иғҢжҷҜгҒ®жһ гҒҜгғўгғјгғүгҒ§иүІгҒҢеӨүгӮҸгӮүгҒӘгҒ„гҒҹгӮҒгҖҒжһ еҶ…гҒ®ж–Үеӯ—гҒҜеёёгҒ«жҝғиүІгҒ«еӣәе®ҡгҒҷгӮӢ */
  .summary-box,
  .summary-box .muted,
  .summary-box .big,
  .summary-box .final-line .k,
  .summary-box .final-line .v,
  .summary-box .route-stop span,
  .summary-box .ds-row,
  .summary-box .ds-row span,
  .summary-box p,
  .summary-box .hint{color:#16305c !important}
  .summary-box .muted{color:#5a6a86 !important}
  /* дәҲз®— жңӯжқҹ(з”»еғҸ) */
  .money-stage{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:16px;margin-top:8px;text-align:center}
  .money-total{font-size:26px;font-weight:800;color:#16305c;margin-bottom:4px}
  /* в‘ дәҲз®—гӮ№гғҶгғјгӮёгӮӮи–„йқ’еӣәе®ҡиғҢжҷҜгҒ®гҒҹгӮҒгҖҒж–Үеӯ—гӮ’еёёгҒ«жҝғиүІгҒ«гҒҷгӮӢ */
  .money-stage,.money-stage .muted,.money-stage .money-total{color:#16305c !important}
  .stack-area{position:relative;height:170px;margin:10px auto 4px;max-width:320px}
  .stack-bill{position:absolute;left:50%;width:200px;height:auto;border-radius:4px;
    box-shadow:0 1px 3px rgba(0,0,0,.25);transform:translateX(-50%);transition:.12s;cursor:pointer}
  .band{position:absolute;left:50%;transform:translateX(-50%);
    background:linear-gradient(90deg,#e7d199,#f3e7c8 30%,#fff 50%,#f3e7c8 70%,#e7d199);
    border-left:1px solid #d9c389;border-right:1px solid #d9c389;
    box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer}
  .add-bill-btn{display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--accent);color:var(--accent);
    background:#fff;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-family:inherit;font-size:15px}
  .money-ctrl{display:flex;gap:8px;justify-content:center;margin-top:10px}
  .money-ctrl button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit}
  .opt-budget{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  /* гӮ№гғқгғғгғҲжҠ•зҘЁ */
  .spot-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .spot{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-size:14px;
    cursor:pointer;transition:.12s;user-select:none}
  .spot:hover{border-color:#c7cedb} .spot.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* гӮ№гғқгғғгғҲй Ҷз•Ә(гғүгғ©гғғгӮ°) */
  .plan-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .plan-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
    border-radius:11px;padding:11px 12px;cursor:grab;transition:.12s}
  .plan-item.dragging{opacity:.4;border-style:dashed}
  .plan-item.over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,110,245,.2)}
  .plan-item .ord{flex:0 0 26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .plan-item .pname{flex:1;font-size:15px;font-weight:600}
  .plan-item .votes{font-size:12px;color:var(--ink-soft);font-weight:700}
  .plan-item .grip{color:#b8c0cf;font-size:18px;cursor:grab}
  .spot-del{border:0;background:#f1f3f8;color:#9aa6bb;width:24px;height:24px;border-radius:50%;
    cursor:pointer;font-size:12px;font-weight:800;line-height:1;flex:0 0 24px}
  .spot-del:hover{background:#fde0e0;color:var(--no)}
  .plan-route{display:flex;flex-direction:column;gap:0;margin-top:10px}
  .route-stop{display:flex;align-items:center;gap:10px;padding:4px 0}
  .route-stop .pin{flex:0 0 24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .route-line{width:2px;height:14px;background:#cdd6e6;margin-left:11px}
  /* и©ізҙ°гғ—гғ©гғі(1ж—ҘгҒ”гҒЁ) */
  .day-tabs{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap}
  .day-tabs button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;
    font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .day-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .plan-row{display:flex;gap:8px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:10px;margin-bottom:8px}
  .plan-row .time-col{flex:0 0 64px}
  .plan-row .time-col input{padding:7px 6px;font-size:13px;text-align:center}
  .plan-row .body-col{flex:1;display:flex;flex-direction:column;gap:6px}
  .plan-row .kind-row{display:flex;gap:5px;flex-wrap:wrap}
  .kind-chip{border:1px solid var(--line);background:#fbfcff;border-radius:7px;padding:4px 8px;font-size:12px;
    cursor:pointer;font-weight:700;color:var(--ink-soft);user-select:none}
  .kind-chip.on{color:#fff;border-color:transparent}
  .kind-chip.on.k-spot{background:#3b6ef5}.kind-chip.on.k-food{background:#e0742e}
  .kind-chip.on.k-move{background:#2e9e6b}.kind-chip.on.k-stay{background:#7a5cff}
  .kind-chip.on.k-other{background:#5a6678}
  .plan-row .content-in{padding:8px 10px;font-size:14px}
  .plan-row .del-row{flex:0 0 28px;display:flex;align-items:center}
  .plan-row .del-row button{border:0;background:#f1f3f8;color:#9aa6bb;width:26px;height:26px;border-radius:50%;
    cursor:pointer;font-weight:800;font-size:12px}
  .plan-row .del-row button:hover{background:#fde0e0;color:var(--no)}
  .add-row-btn{width:100%;border:1px dashed var(--accent);color:var(--accent);background:#fff;border-radius:10px;
    padding:11px;font-weight:800;cursor:pointer;font-family:inherit;font-size:14px;margin-top:4px}
  .day-summary{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:12px;margin-top:10px}
  .day-summary .ds-row{display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:14px}
  .day-summary .ds-time{flex:0 0 52px;color:var(--ink-soft);font-weight:700;font-size:13px}
  .day-summary .ds-kind{flex:0 0 20px}
  .consent-grid{display:flex;gap:8px;margin-top:6px}
  .consent-grid button{flex:1;border:1px solid var(--line);background:#fff;border-radius:11px;padding:13px 8px;
    font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink-soft)}
  .consent-grid button.on.yes{background:var(--ok);color:#fff;border-color:var(--ok)}
  .consent-grid button.on.hold{background:var(--hold);color:#fff;border-color:var(--hold)}
  .consent-grid button.on.no{background:var(--no);color:#fff;border-color:var(--no)}
  .consent-stat{display:flex;gap:14px;margin-top:12px;font-size:14px;font-weight:700}
  .consent-stat .s-yes{color:var(--ok)} .consent-stat .s-hold{color:var(--hold)} .consent-stat .s-no{color:var(--no)}
  .named{border-left:3px solid var(--line);background:#fafbfd;border-radius:0 10px 10px 0;padding:10px 13px;margin-top:10px}
  .named.yes{border-left-color:var(--ok);background:#f4faf6}
  .named.hold{border-left-color:var(--hold);background:#fdfaef}
  .named.no{border-left-color:var(--no);background:#fdf6f6}
  .named .who{font-weight:700;font-size:13px}
  .named.yes .who{color:var(--ok)} .named.hold .who{color:#a8851a} .named.no .who{color:var(--no)}
  .named .why{font-size:14px;margin-top:2px} .named .cond{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .named .cond b{color:var(--ink)}
  .anon-note{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);
    background:#f4f6fb;border-radius:9px;padding:9px 12px;margin-top:10px}
  .veil{font-style:italic;color:var(--ink-soft)}
  .person-switch{display:flex;align-items:center;gap:8px;background:#1b2330;color:#fff;border-radius:11px;
    padding:9px 13px;font-size:13px;flex-wrap:wrap}
  .person-switch select{width:auto;background:#2b3547;color:#fff;border:1px solid #3c485e;padding:5px 8px;font-size:13px}
  .person-switch .lbl{opacity:.7}
  .divider{height:1px;background:var(--line);margin:18px 0} .center{text-align:center}
  .muted{color:var(--ink-soft);font-size:13px}
  .pill-stat{display:inline-block;background:#eef2fb;color:var(--accent-deep);border-radius:999px;
    padding:3px 10px;font-size:12px;font-weight:700;margin-right:6px}
  .final-line{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .final-line .k{flex:0 0 96px;color:var(--ink-soft);font-size:13px;font-weight:700}
  .final-line .v{font-size:15px;font-weight:700}
  .freelist{margin-top:8px} .freelist .row{margin-bottom:6px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;
    transition:.25s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* в‘ гғҖгғјгӮҜгҒ§гҒҜгғҲгғјгӮ№гғҲиғҢжҷҜ(--ink)гҒҢзҷҪзі»гҒ«гҒӘгӮӢгҒҹгӮҒгҖҒж–Үеӯ—гӮ’й»’гҒ«гҒ—гҒҰеҸҜиӘӯжҖ§гӮ’зўәдҝқ */
  [data-theme="dark"] .toast{color:#080001}
  .toast.with-icon{display:inline-flex;align-items:center;gap:7px}
  /* в‘ЈиҰӢеҮәгҒ—иЎҢгҒ«еӣһзӯ”жңҹйҷҗгғҒгғғгғ—гӮ’еҸіеҜ„гҒӣгҒ§дёҰгҒ№гӮӢ */
  .head-with-timer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .head-with-timer h2{font-size:20px}
  .head-with-timer .timer{flex:0 0 auto;white-space:nowrap}
  /* в‘ҘгӮ«гғ¬гғігғҖгғјеҸідёҠгҒ®гғҳгғ«гғ—(?)гғңгӮҝгғі */
  .cal-head .cal-help-btn{position:absolute;right:0;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:800;font-size:15px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .cal-head{position:relative}
  [data-theme="dark"] .cal-head .cal-help-btn{background:var(--field);color:#f4ede6}
  /* в‘Ҙгғҳгғ«гғ—иЎЁзӨәжҷӮгҒҜиӨҮж•°иЎҢгғ»е·ҰеҜ„гҒӣгғ»и§’дёёжҺ§гҒҲгӮҒгҒ«гҒҷгӮӢ */
  .toast.help{white-space:pre-line;text-align:left;border-radius:14px;max-width:300px;line-height:1.5;
    padding:14px 16px}
  .toast.with-icon .lock-toast{height:16px;width:auto;vertical-align:middle;flex:0 0 auto}
  .hide{display:none!important}

  /* ===== в‘ўгғўгғҺгӮҜгғӯ(зҷҪгӮўгӮҜгӮ»гғігғҲ)Г—гғҖгғјгӮҜжҷӮгҖҒгӮўгӮҜгӮ»гғігғҲиғҢжҷҜгҒ®дёҠгҒ®зҷҪж–Үеӯ—гӮ’й»’ж–Үеӯ—гҒ«гҒ—гҒҰеҗҢеҢ–гӮ’йҳІгҒҗ ===== */
  [data-theme="dark"][data-accent="mono"] .btn.primary,
  [data-theme="dark"][data-accent="mono"] .seg-toggle button.on,
  [data-theme="dark"][data-accent="mono"] .opt.sel,
  [data-theme="dark"][data-accent="mono"] .weekbtn.on,
  [data-theme="dark"][data-accent="mono"] .modebar button.on,
  [data-theme="dark"][data-accent="mono"] .plan-item .ord,
  [data-theme="dark"][data-accent="mono"] .route-stop .pin,
  [data-theme="dark"][data-accent="mono"] .day-tabs button.on,
  [data-theme="dark"][data-accent="mono"] .fab,
  [data-theme="dark"][data-accent="mono"] .chat-tabs button.on,
  [data-theme="dark"][data-accent="mono"] .bub.me,
  [data-theme="dark"][data-accent="mono"] .chat-input .send,
  [data-theme="dark"][data-accent="mono"] .seg2 button.on,
  [data-theme="dark"][data-accent="mono"] .mini-btn.solid,
  [data-theme="dark"][data-accent="mono"] .mutual .ava-stack span,
  [data-theme="dark"][data-accent="mono"] h3.sub .badge,
  [data-theme="dark"][data-accent="mono"] .st-badge[style*="--accent"],
  [data-theme="dark"][data-accent="mono"] .pava,
  [data-theme="dark"][data-accent="mono"] .pcmp-submit,
  [data-theme="dark"][data-accent="mono"] .tab-count{color:#080001 !important}
  [data-theme="dark"][data-accent="mono"] .fab svg{color:#080001}

  /* ===== гғҖгғјгӮҜгғўгғјгғүгҒ§гҒ®зҷҪиғҢжҷҜгҒ®жү“гҒЎж¶ҲгҒ— ===== */
  [data-theme="dark"] header.app{background:rgba(0,0,0,.86)}
  [data-theme="dark"] .room-pill,
  [data-theme="dark"] .btn.ghost,
  [data-theme="dark"] .seg-toggle,
  [data-theme="dark"] .seg-toggle button,
  [data-theme="dark"] .opt,
  [data-theme="dark"] .place-tabs button,
  [data-theme="dark"] .cal-head button,
  [data-theme="dark"] .weekbtn,
  [data-theme="dark"] .cell,
  [data-theme="dark"] .modebar button,
  [data-theme="dark"] .money-ctrl button,
  [data-theme="dark"] .spot,
  [data-theme="dark"] .plan-item,
  [data-theme="dark"] .day-tabs button,
  [data-theme="dark"] .plan-row,
  [data-theme="dark"] .add-row-btn,
  [data-theme="dark"] .consent-grid button{background:var(--field)}
  [data-theme="dark"] .place-tabs button.on{background:var(--ink);color:var(--bg)}
  /* в‘ЎгӮ«гғ¬гғігғҖгғјгҒ®жңҲеҲҮжӣҝзҹўеҚ°гӮ’гғҖгғјгӮҜгғўгғјгғүгҒ§зҷҪгҒҸ */
  [data-theme="dark"] .cal-head button{color:#f4ede6}
  /* в‘ гғҖгғјгӮҜжҷӮгҖҒйҒёжҠһдёӯгӮ»гӮ°гғЎгғігғҲгҒҢ--fieldгҒ«жІҲгӮҖгҒ®гӮ’йҳІгҒҺгӮўгӮҜгӮ»гғігғҲиғҢжҷҜгӮ’з¶ӯжҢҒ */
  [data-theme="dark"] .seg-toggle button.on{background:var(--accent);color:var(--on-accent,#fff)}
  /* в‘ўгғҖгғјгӮҜжҷӮгҖҒmodebar(еҚҳж—Ҙ/зҜ„еӣІгғ»ж—Ҙеё°гӮҠ/е®ҝжіҠ)гҒЁopt(дёҠйҷҗйҮ‘йЎҚ)гҒ®йҒёжҠһдёӯгӮӮгӮўгӮҜгӮ»гғігғҲиғҢжҷҜгӮ’з¶ӯжҢҒ */
  [data-theme="dark"] .modebar button.on{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  [data-theme="dark"] .opt.sel{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  [data-theme="dark"] input[type=text],
  [data-theme="dark"] input[type=number],
  [data-theme="dark"] select,
  [data-theme="dark"] textarea{background:var(--field)}
  [data-theme="dark"] .mapwrap svg path{stroke:#0e1320}
  [data-theme="dark"] .timer{background:#2a2113;color:#e2b46b}

  /* ===== гӮ№гғһгғӣиЎЁзӨәгҒ®жңҖеӨ§е№…(йӣ»и©ұжһ ) ===== */
  .wrap{max-width:520px}
  header.app .head-inner,.steps{max-width:520px}
  header.app .head-inner{position:relative}
  header.app .logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1}
  header.app .logo .logo-img{height:26px;width:auto;display:block}

  /* ===== SNSгғҳгғғгғҖгғј(жӨңзҙўгғ»йҖҡзҹҘ) ===== */
  .sns-head{position:sticky;top:0;z-index:30;background:var(--bar);
    backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--bar-line)}
  .sns-head-inner{max-width:520px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:10px}
  .sns-head-inner.center{justify-content:space-between}
  .sns-head-inner.center .sns-head-side{flex:1;display:flex;align-items:center}
  .sns-head-inner.center .sns-head-side.left{justify-content:flex-start}
  .sns-head-inner.center .sns-head-side.right{justify-content:flex-end}
  .sns-head-inner.center .sns-logo{flex:0 0 auto}
  .sns-logo{font-weight:900;letter-spacing:.02em;font-size:57px;display:flex;align-items:baseline;gap:1px;color:var(--ink);cursor:pointer;line-height:1}
  .sns-logo .logo-img{height:25.6px;width:auto;display:block}
  /* в‘Ұиө·еӢ•гӮ№гғ—гғ©гғғгӮ·гғҘ(еӨ§гҒҚгҒӘгғӯгӮҙгӮ’дёӯеӨ®иЎЁзӨәгҒ—гҖҒе°‘гҒ—й•·гӮҒгҒ«еҮәгҒ—гҒҰгғ•гӮ§гғјгғүгӮўгӮҰгғҲ) */
  #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:var(--bg);transition:opacity .45s ease;opacity:1}
  #splash.hide{opacity:0;pointer-events:none}
  #splashLogo{height:120px;width:auto;animation:splashPop .5s ease}
  @keyframes splashPop{from{transform:scale(.86);opacity:.2}to{transform:scale(1);opacity:1}}
  .sns-logo .lg-en{font-family:"Yu Gothic","жёёгӮҙгӮ·гғғгӮҜ",YuGothic,"Yu Gothic Medium",sans-serif;color:var(--accent)}
  .sns-logo .lg-dot{font-family:"HGMinchoB","HGжҳҺжңқB","Yu Mincho","жёёжҳҺжңқ",serif;color:var(--accent)}
  .sns-logo span{font-size:10px;color:var(--ink-soft);font-weight:600;letter-spacing:.12em}
  .sns-head .sp{flex:1}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative;transition:.12s}
  .icon-btn:active{transform:scale(.92)}
  .icon-btn svg{width:21px;height:21px}
  .icon-btn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--card)}

  /* ===== жӨңзҙўгғҗгғј ===== */
  .searchbar{max-width:520px;margin:0 auto;padding:0 16px 11px}
  .searchbar .box{display:flex;align-items:center;gap:9px;background:var(--field);border:1px solid var(--line);
    border-radius:999px;padding:10px 15px;color:var(--ink-soft)}
  .searchbar .box svg{width:18px;height:18px;flex:0 0 18px}
  .searchbar input{border:0!important;background:transparent!important;padding:0!important;font-size:15px}
  .searchbar input:focus{outline:none}

  /* ===== гғңгғҲгғ гӮҝгғ–гғҗгғј ===== */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--bar);
    backdrop-filter:saturate(140%) blur(10px);border-top:1px solid var(--bar-line);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));display:flex}
  .tabbar .tabwrap{max-width:520px;margin:0 auto;width:100%;display:flex;justify-content:space-around}
  .tab{flex:1;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 0;cursor:pointer;color:var(--ink-soft);transition:.12s;font-family:inherit}
  .tab .tab-ic-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;height:30px}
  .tab .tab-ic{width:27px;height:27px;object-fit:contain;display:block;transition:.12s}
  .tab.on .tab-ic{transform:translateY(-1px)}
  .tab .tab-dot{position:absolute;top:-2px;right:-5px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .tab .tab-ava{width:28px;height:28px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:16px;overflow:hidden;border:2px solid transparent;box-sizing:border-box}
  .tab .tab-ava.img{background-size:cover;background-position:center;font-size:0}
  .tab .tab-ava.on{border-color:var(--accent)}
  .tab:active{transform:scale(.9)}
  .tab.post-tab{position:relative}
  .tab.post-tab .plus{width:46px;height:34px;border-radius:12px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(var(--accent-rgb,236,104,0),.4)}
  .tab.post-tab .plus svg{width:24px;height:24px;color:#fff;transform:none}

  /* ===== гғӣгғјгғ :ж—…гӮ°гғ«гғјгғ—гҒ®гғ•гӮЈгғјгғү ===== */
  .feed{max-width:520px;margin:0 auto;padding:14px 14px 96px}
  .feed-h{display:flex;align-items:baseline;justify-content:space-between;padding:6px 4px 10px}
  .feed-h h2{font-size:20px;margin:0;color:var(--ink)} .feed-h .cnt{font-size:13px;color:var(--ink-soft);font-weight:600}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);margin-bottom:16px;cursor:pointer;transition:.15s}
  .gcard:active{transform:scale(.985)}
  .gcard .cover{position:relative;height:152px;background-size:cover;background-position:center}
  .gcard .cover .card-pin{width:26px;height:26px;border-radius:50%;flex:0 0 auto;
    border:0;background:rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .gcard .cover .card-pin .pin-ic{height:14px;vertical-align:0;opacity:.75}
  .gcard .cover .card-pin.on{background:var(--accent)}
  .gcard .cover .card-pin.on .pin-ic{opacity:1}
  /* в‘ гғҖгғјгӮҜГ—гғўгғҺгӮҜгғӯ(зҷҪгӮўгӮҜгӮ»гғігғҲ)жҷӮгҒҜгғ”гғіз•ҷгӮҒгғңгӮҝгғігҒҢзҷҪиғҢжҷҜгҒ«гҒӘгӮӢгҒҹгӮҒгҖҒгҒқгҒ®дёҠгҒ®зҷҪгғ”гғігӮ’й»’гҒ«еҸҚи»ў */
  [data-theme="dark"][data-accent="mono"] .gcard .cover .card-pin.on .pin-ic{filter:invert(1)}
  .gcard .cover::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.5))}
  .gcard .cover .badge-row{position:absolute;left:12px;top:12px;display:flex;gap:6px;align-items:center;z-index:2}
  .gcard .st-badge{background:rgba(255,255,255,.92);color:#1b2330;font-size:11px;font-weight:800;
    padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}
  .gcard .st-badge.live{background:var(--sun);color:#fff}
  .gcard .st-badge.done{background:var(--ok);color:#fff}
  .gcard .cover .ttl{position:absolute;left:14px;bottom:11px;right:14px;z-index:2;color:#fff}
  .gcard .cover .ttl .nm{font-size:19px;font-weight:800;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .gcard .cover .ttl .dest{font-size:13px;font-weight:600;opacity:.92;margin-top:2px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .gcard .body{padding:13px 15px 15px}
  .gcard .meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
  .gcard .meta .ava{display:flex} .gcard .meta .ava span{width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--card);margin-left:-8px}
  .gcard .meta .ava span:first-child{margin-left:0}
  .gcard .progress{margin-top:11px}
  .gcard .progress .bar{height:6px;border-radius:999px;background:#faf3ed;border:1px solid var(--line);overflow:visible;position:relative}
  .gcard .progress .bar i{display:block;height:100%;border-radius:999px;
    background:var(--accent);position:relative}

  /* в‘ЎгҖҢгҒӮгҒӘгҒҹгҒ®ж—…гҖҚиҰӢеҮәгҒ—(гӮҝгғғгғ—гҒ§иЎЁзӨәгӮөгӮӨгӮәеҲҮжӣҝ) */

  /* в‘ӨгҒ“гҒ®гӮўгғ—гғӘгҒ«гҒӨгҒ„гҒҰз”»йқў */

  /* в‘ўгӮўгӮҜгӮ·гғ§гғіиЎҢ(гҒ„гҒ„гҒӯгғ»гӮігғЎгғігғҲ) */

  .pa-btn svg{transition:transform .18s cubic-bezier(.2,1.4,.5,1)}

  .pa-btn.just-liked svg{animation:heartPop .42s cubic-bezier(.2,1.4,.5,1)}
  /* в‘ гӮҝгғ–йҒ·з§»гӮ«гғғгғҲгӮӨгғі(еҸі/е·ҰгҒӢгӮүиҰҶгҒ„гҒӢгҒ¶гҒ•гӮӢ) */
  #screen.cut-in-right{animation:cutInRight .3s cubic-bezier(.22,.8,.3,1)}
  #screen.cut-in-left{animation:cutInLeft .3s cubic-bezier(.22,.8,.3,1)}
  @keyframes cutInRight{from{transform:translateX(28%);opacity:.4}to{transform:translateX(0);opacity:1}}
  @keyframes cutInLeft{from{transform:translateX(-28%);opacity:.4}to{transform:translateX(0);opacity:1}}
  /* в‘ўжҲ»гӮӢ: еүҚгҒ®з”»йқўгҒҢе·ҰеҒҙгҒӢгӮүжҲ»гӮҠгҖҒзҸҫеңЁз”»йқўгҒҢеҸігҒёгҒҜгҒ‘гӮӢж“¬дјјжј”еҮә */
  #screen.cut-back{animation:cutBack .3s cubic-bezier(.22,.8,.3,1)}
  @keyframes cutBack{from{transform:translateX(-22%) scale(.98);opacity:.5}to{transform:translateX(0) scale(1);opacity:1}}
  @keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.35)}55%{transform:scale(.85)}100%{transform:scale(1)}}
  /* в‘ўгғңгӮҝгғіе…ЁиҲ¬гҒ®жҠјдёӢгғһгӮӨгӮҜгғӯгӮӨгғігӮҝгғ©гӮҜгӮ·гғ§гғі */
  .pa-btn,.pcmp-submit,.post-cmt-input button,.cmt-more{transition:transform .12s ease,opacity .12s ease}

  .post-menu-btn{transition:transform .12s ease,opacity .12s}

  /* в‘ўйЈӣгҒ¶гғҸгғјгғҲ(гғҖгғ–гғ«гӮҝгғғгғ—йўЁгҒ®дёӯеӨ®гӮЁгғ•гӮ§гӮҜгғҲ) */
  .like-burst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);

  /* в‘ гҒ„гҒ„гҒӯгғңгӮҝгғігҒӢгӮүгҒөгӮҸгҒЈгҒЁз«ӢгҒЎдёҠгӮӢе°ҸгғҸгғјгғҲ */
  .pa-btn{position:relative}

    100%{transform:translate(-50%,-50%) scale(1.3);opacity:0}}

/* ===== Supabase иӘҚиЁјгғҳгғ«гғ‘гғј(гғЎгғјгғ«+гғ‘гӮ№гғҜгғјгғү) ===== */
/* иӘҚиЁјзҠ¶ж…ӢгҖӮ__authUser гҒҜгғўгӮёгғҘгғјгғ«еҒҙгҒҢжӣҙж–°гҒҷгӮӢ */
function authUser(){ return window.__authUser || null; }
function isSignedIn(){ return !!authUser(); }

/* ж–°иҰҸзҷ»йҢІ: гғЎгғјгғ«гғ»гғ‘гӮ№гғҜгғјгғүгғ»иЎЁзӨәеҗҚгҖӮprofilesгҒ«гӮӮиЎҢгӮ’дҪңгӮӢ */
async function authSignUp(email, password, displayName, userId){
  if(!window.SB){ toast(t("x.auth.noConn")); return; }
  // иЎЁзӨәеҗҚгғ»гғҰгғјгӮ¶гғјIDгҒҜгғЎгӮҝгғҮгғјгӮҝгҒЁгҒ—гҒҰдҝқжҢҒ(гғЎгғјгғ«зўәиӘҚеҫҢгҒ®гғӯгӮ°гӮӨгғіжҷӮгҒ«profilesгҒёеҸҚжҳ )
  // жҲ»гӮҠе…ҲгҒҜзҸҫеңЁгҒ®гғҡгғјгӮёURL(GitHub PagesгҒ®гӮөгғ–гғ‘гӮ№гӮӮеҗ«гӮҖжӯЈзўәгҒӘе ҙжүҖ)гӮ’жҳҺзӨәжҢҮе®ҡ
  const redirectTo = location.origin + location.pathname;
  const { data, error } = await window.SB.auth.signUp({
    email, password,
    options: { data: { display_name: displayName || "", user_id: userId || "" }, emailRedirectTo: redirectTo }
  });
  if(error){ toast(translateAuthError(error.message)); return; }
  // зўәиӘҚгғЎгғјгғ«гҒҢжңүеҠ№гҒӘе ҙеҗҲгҖҒгҒ“гҒ“гҒ§гҒҜгҒҫгҒ гғӯгӮ°гӮӨгғігҒ—гҒҰгҒ„гҒӘгҒ„(гӮ»гғғгӮ·гғ§гғігҒӘгҒ—)
  if(data && data.session){
    // зўәиӘҚдёҚиҰҒгҒ®иЁӯе®ҡгҒӘгӮүеҚігғӯгӮ°гӮӨгғі вҶ’ гғ—гғӯгғ•гӮЈгғјгғ«з”Ёж„Ҹ
    await ensureProfile();
    toast(t("x.auth.signedIn"));
  }else{
    // зўәиӘҚгғЎгғјгғ«йҖҒдҝЎжёҲгҒҝгҖӮгғӘгғігӮҜгӮ’иёҸгӮҖгҒҫгҒ§еҫ…гҒӨ
    authMode = "verify";
    const sc=$("#screen"); if(sc) sc.innerHTML=screenAuth();
  }
}

/* гғӯгӮ°гӮӨгғідёӯгғҰгғјгӮ¶гғјгҒ®profilesиЎҢгӮ’з”Ёж„Ҹ(з„ЎгҒ‘гӮҢгҒ°дҪңгӮӢ) */
async function ensureProfile(){
  if(!window.SB || !isSignedIn()) return;
  const u = authUser();
  const name = (u.user_metadata && u.user_metadata.display_name) || "";
  const uid = (u.user_metadata && u.user_metadata.user_id) || "";
  try{
    const row = { id: u.id, display_name: name };
    if(uid) row.user_id = uid;
    const { error } = await window.SB.from("profiles")
      .upsert(row, { onConflict: "id", ignoreDuplicates: true });
    if(error) console.log("[profiles] ensure error:", error.message);
  }catch(e){ console.log("[profiles] ensure exception:", e); }
}

/* гғҰгғјгӮ¶гғјID(гғҸгғігғүгғ«)гҒ®еҪўејҸгғҒгӮ§гғғгӮҜ: 3гҖң20ж–Үеӯ—гҖҒеҚҠи§’иӢұж•°еӯ—/_/.гҒ®гҒҝгҖҒе…Ҳй ӯгғ»жң«е°ҫгҒҢгғ”гғӘгӮӘгғүдёҚеҸҜгҖҒгғ”гғӘгӮӘгғүйҖЈз¶ҡдёҚеҸҜ */
/* гғҰгғјгӮ¶гғјIDгҒ®еҪўејҸгғҒгӮ§гғғгӮҜгҖӮе•ҸйЎҢгҒҢгҒӮгӮҢгҒ°зҗҶз”ұгӮігғјгғүгӮ’иҝ”гҒҷ(гҒӘгҒ‘гӮҢгҒ°null) */
/* зҗҶз”ұ: "empty" | "length" | "chars" | "edge" | "dots" */
function validateUserId(v){
  if(!v) return "empty";
  if(v.length < 3 || v.length > 20) return "length";
  if(!/^[a-zA-Z0-9_.]+$/.test(v)) return "chars";
  if(v.startsWith(".") || v.endsWith(".")) return "edge";
  if(v.includes("..")) return "dots";
  return null;
}
function isValidUserId(v){
  return validateUserId(v) === null;
}
/* гғЎгғјгғ«гӮўгғүгғ¬гӮ№гҒ®з°Ўжҳ“еҪўејҸгғҒгӮ§гғғгӮҜ(@гӮ’еҗ«гҒҝгҖҒеүҚеҫҢгҒ«ж–Үеӯ—гҒҢгҒӮгӮӢдёҖиҲ¬зҡ„гҒӘеҪў) */
function isValidEmail(v){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v||"");
}
/* гғ‘гӮ№гғҜгғјгғүеј·еәҰгғҒгӮ§гғғгӮҜ: 8ж–Үеӯ—д»ҘдёҠгҖҒиӢұеӯ—гҒЁж•°еӯ—гӮ’1ж–Үеӯ—д»ҘдёҠгҒҡгҒӨеҗ«гӮҖ */
function isStrongPassword(v){
  if(!v || v.length < 8) return false;
  if(!/[a-zA-Z]/.test(v)) return false;
  if(!/[0-9]/.test(v)) return false;
  return true;
}
/* SupabaseгҒ®иӘҚиЁјгӮЁгғ©гғј(иӢұиӘһеҺҹж–Ү)гӮ’гҖҒж—Ҙжң¬иӘһиЎЁзӨәжҷӮгҒ®гҒҝеҜҫиЁігҒ«зҪ®гҒҚжҸӣгҒҲгӮӢгҖӮ
   и©ІеҪ“гҒ—гҒӘгҒ„гӮӮгҒ®гҒҜеҺҹж–Ү(иӢұиӘһ)гҒ®гҒҫгҒҫиҝ”гҒҷ(з„ЎзҗҶгҒ«иЁігҒ•гҒӘгҒ„) */
/* SupabaseгҒ®иӘҚиЁјгӮЁгғ©гғј(иӢұиӘһеҺҹж–Ү)гӮ’гҖҒиЎЁзӨәиЁҖиӘһгҒ«еҝңгҒҳгҒҹе®ҡеһӢгғЎгғғгӮ»гғјгӮёгҒ«еӨүжҸӣгҒҷгӮӢгҖӮ
   и©ІеҪ“гҒ—гҒӘгҒ„жңӘзҹҘгҒ®гӮЁгғ©гғјгҒҜгҖҒиЁҖиӘһеҲҘгҒ®жұҺз”ЁгғЎгғғгӮ»гғјгӮёгҒ«иҗҪгҒЁгҒҷ(еёёгҒ«ja/enгҒ©гҒЎгӮүгҒӢгҒ§зөұдёҖ) */

  [/For security purposes, you can only request this after (\d+) seconds?/i,
    "гӮ»гӮӯгғҘгғӘгғҶгӮЈгҒ®гҒҹгӮҒгҖҒ$1з§’еҫҢгҒ«еҶҚеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„", "For security, please try again in $1 seconds"],
  [/Email rate limit exceeded/i,
    "гғЎгғјгғ«йҖҒдҝЎгҒ®дёҠйҷҗгҒ«йҒ”гҒ—гҒҫгҒ—гҒҹгҖӮжҷӮй–“гӮ’гҒҠгҒ„гҒҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„", "Email sending limit reached. Please try again later"],
  [/Signup requires a valid password/i,
    "жңүеҠ№гҒӘгғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„", "Please enter a valid password"],
  [/Token has expired or is invalid/i,
    "гғӘгғігӮҜгҒҢз„ЎеҠ№гҒӢжңҹйҷҗеҲҮгӮҢгҒ§гҒҷ", "This link is invalid or has expired"],
];
function translateAuthError(msg){
  const ja = curLang() === "ja";
  if(!msg) return ja ? "гӮЁгғ©гғјгҒҢзҷәз”ҹгҒ—гҒҫгҒ—гҒҹгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„" : "Something went wrong. Please try again.";
  for(const [pat, jaMsg, enMsg] of AUTH_ERR_MAP){
    const m = msg.match(pat);
    if(m){ const tmpl = ja ? jaMsg : enMsg; return tmpl.replace("$1", m[1]||""); }
  }
  // еҜҫеҝңиЎЁгҒ«з„ЎгҒ„жңӘзҹҘгҒ®гӮЁгғ©гғјгҒҜиЁҖиӘһеҲҘгҒ®жұҺз”ЁгғЎгғғгӮ»гғјгӮёгҒё(еҺҹж–ҮгҒ®иӢұиӘһгӮ’жјҸгӮүгҒ•гҒӘгҒ„)
  return ja ? "гӮЁгғ©гғјгҒҢзҷәз”ҹгҒ—гҒҫгҒ—гҒҹгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„" : "Something went wrong. Please try again.";
}

/* ===== жҠ•зЁҝ(ж–Үз« )гҒ®ж°ёз¶ҡеҢ–: Supabase posts гғҶгғјгғ–гғ« ===== */
/* з°Ўжҳ“гҒӘзөҢйҒҺжҷӮй–“иЎЁзӨә(жҠ•зЁҝеҸ–еҫ—жҷӮгҒ®гҒҝиЁҲз®—гҖӮеҲҶеҚҳдҪҚгҒҫгҒ§гҒ®зІ—гҒ„иЎЁзӨә) */
function computeAgo(ts){
  const diff = Math.max(0, Date.now() - ts);
  const min = Math.floor(diff/60000);
  if(min < 1) return t("time.justNow");
  if(min < 60) return t("time.minAgo").replace("{n}", min);
  const hr = Math.floor(min/60);
  if(hr < 24) return t("time.hourAgo").replace("{n}", hr);
  const day = Math.floor(hr/24);
  if(day < 30) return t("time.dayAgo").replace("{n}", day);
  const month = Math.floor(day/30);
  if(month < 12) return t("time.monthAgo").replace("{n}", month);
  const year = Math.floor(day/365);
  return t("time.yearAgo").replace("{n}", year);
}

/* SupabaseгҒӢгӮүpostsдёҖиҰ§гӮ’еҸ–еҫ—гҒ—POSTSй…ҚеҲ—гӮ’дҪңгӮҠзӣҙгҒҷ(гҒ„гҒ„гҒӯ/гӮігғЎгғігғҲгҒҜж¬Ўж®өгҒҫгҒ§еҲқжңҹеҖӨ) */
async function loadPosts(){
  if(!window.SB) return;
  try{
    // postsгҒ гҒ‘гӮ’еҸ–еҫ—(гғҶгғјгғ–гғ«зөҗеҗҲгҒҜгӮ№гӮӯгғјгғһгӮӯгғЈгғғгӮ·гғҘгҒ®жӣҙж–°еҫ…гҒЎгҒ§дёҚе®үе®ҡгҒ«гҒӘгӮҠгҒҶгӮӢгҒҹгӮҒдҪҝгӮҸгҒӘгҒ„)
    const { data, error } = await window.SB
      .from("posts")
      .select("id, author_id, text, created_at")
      .order("created_at", { ascending:false })
      .limit(100);
    if(error){ console.log("[posts] load error:", error.message); return; }
    const rows = data || [];
    // жҠ•зЁҝиҖ…idгҒ®дёҖиҰ§гҒ§profilesгӮ’гҒҫгҒЁгӮҒгҒҰеҸ–еҫ—гҒ—гҖҒгӮўгғ—гғӘеҒҙгҒ§зө„гҒҝеҗҲгӮҸгҒӣгӮӢ
    const authorIds = [...new Set(rows.map(r=>r.author_id))];
    let profMap = {};
    if(authorIds.length){
      const { data: profs, error: pe } = await window.SB
        .from("profiles").select("id, user_id, display_name, avatar_url").in("id", authorIds);
      if(pe){ console.log("[profiles] load error:", pe.message); }
      (profs||[]).forEach(p=>{ profMap[p.id]=p; });
    }
    const me = authUser();
    POSTS.length = 0;
    rows.forEach(row=>{
      const prof = profMap[row.author_id] || {};
      POSTS.push({
        id: row.id, who: prof.display_name || t("post.noName"),
        avatar: prof.avatar_url || "рҹ§і",
        authorId: row.author_id,
        ts: new Date(row.created_at).getTime(),
        ago: computeAgo(new Date(row.created_at).getTime()),
        text: row.text || "", images: [], ratio: "1/1",
        likedByMe:false, likeCount:0, comments:[],
        mine: !!(me && row.author_id===me.id)
      });
    });
    if(POSTS.length){ await loadLikesFor(POSTS.map(p=>p.id)); await loadCommentsFor(POSTS.map(p=>p.id)); }
    if(typeof rerenderPost === "function") rerenderPost();
  }catch(e){ console.log("[posts] load exception:", e); }
}

/* ===== гҒ„гҒ„гҒӯгҒ®ж°ёз¶ҡеҢ–: Supabase likes гғҶгғјгғ–гғ« ===== */
/* дёҺгҒҲгҒҹжҠ•зЁҝidдёҖиҰ§гҒ«гҒӨгҒ„гҒҰгҖҒд»¶ж•°гҒЁиҮӘеҲҶгҒҢгҒ„гҒ„гҒӯжёҲгҒҝгҒӢгӮ’гҒҫгҒЁгӮҒгҒҰеҸ–еҫ—гҒ—POSTSгҒёеҸҚжҳ  */
async function loadLikesFor(postIds){
  if(!window.SB || !postIds.length) return;
  try{
    const { data, error } = await window.SB.from("likes").select("post_id, user_id").in("post_id", postIds);
    if(error){ console.log("[likes] load error:", error.message); return; }
    const me = authUser();
    const countMap = {}, mineSet = new Set();
    (data||[]).forEach(row=>{
      countMap[row.post_id] = (countMap[row.post_id]||0) + 1;
      if(me && row.user_id===me.id) mineSet.add(row.post_id);
    });
    POSTS.forEach(p=>{
      p.likeCount = countMap[p.id] || 0;
      p.likedByMe = mineSet.has(p.id);
    });
  }catch(e){ console.log("[likes] load exception:", e); }
}

/* ===== гӮігғЎгғігғҲгҒ®ж°ёз¶ҡеҢ–: Supabase comments гғҶгғјгғ–гғ«(гғ•гғ©гғғгғҲеһӢ) ===== */
/* дёҺгҒҲгҒҹжҠ•зЁҝidдёҖиҰ§гҒ®гӮігғЎгғігғҲгӮ’гҒҫгҒЁгӮҒгҒҰеҸ–еҫ—гҒ—гҖҒеҗ„POSTSиҰҒзҙ гҒ®commentsгҒёеҸҚжҳ  */
async function loadCommentsFor(postIds){
  if(!window.SB || !postIds.length) return;
  try{
    const { data, error } = await window.SB
      .from("comments").select("id, post_id, author_id, text, created_at")
      .in("post_id", postIds).order("created_at", { ascending:true });
    if(error){ console.log("[comments] load error:", error.message); return; }
    const rows = data || [];
    const authorIds = [...new Set(rows.map(r=>r.author_id))];
    let profMap = {};
    if(authorIds.length){
      const { data: profs, error: pe } = await window.SB
        .from("profiles").select("id, user_id, display_name, avatar_url").in("id", authorIds);
      if(pe) console.log("[profiles] load error:", pe.message);
      (profs||[]).forEach(p=>{ profMap[p.id]=p; });
    }
    // гӮігғЎгғігғҲгҒёгҒ®гҒ„гҒ„гҒӯгӮ’гҒҫгҒЁгӮҒгҒҰеҸ–еҫ—(з·Ҹж•°гҒЁгҖҒжҠ•зЁҝиҖ…гҒҢгҒ„гҒ„гҒӯгҒ—гҒҰгҒ„гӮӢгҒӢгҒ®еҲӨе®ҡгҒ«дҪҝгҒҶ)
    const commentIds = rows.map(r=>r.id);
    let likeCountMap = {}, likedByOwnerSet = new Set(), likedByMeSet = new Set();
    if(commentIds.length){
      const { data: cl, error: cle } = await window.SB
        .from("comment_likes").select("comment_id, user_id").in("comment_id", commentIds);
      if(cle) console.log("[comment_likes] load error:", cle.message);
      const me = authUser();
      const postAuthorByPost = {}; // post_id -> author_id(жҠ•зЁҝиҖ…)
      POSTS.forEach(p=>{ postAuthorByPost[p.id] = p.authorId; });
      const commentPostMap = {}; rows.forEach(r=>{ commentPostMap[r.id]=r.post_id; });
      (cl||[]).forEach(row=>{
        likeCountMap[row.comment_id] = (likeCountMap[row.comment_id]||0) + 1;
        const ownerOfPost = postAuthorByPost[commentPostMap[row.comment_id]];
        if(ownerOfPost && row.user_id === ownerOfPost) likedByOwnerSet.add(row.comment_id);
        if(me && row.user_id === me.id) likedByMeSet.add(row.comment_id);
      });
    }
    const me = authUser();
    const byPost = {};
    rows.forEach(row=>{
      const prof = profMap[row.author_id] || {};
      (byPost[row.post_id] = byPost[row.post_id] || []).push({
        id: row.id, who: prof.display_name || t("post.noName"),
        userId: prof.user_id || "", photo: prof.avatar_url || null,
        avatar: (prof.avatar_url && !/^https?:\/\//.test(prof.avatar_url)) ? prof.avatar_url : "рҹ§і",
        text: row.text || "",
        mine: !!(me && row.author_id===me.id), ts: new Date(row.created_at).getTime(),
        ago: computeAgo(new Date(row.created_at).getTime()),
        likeCount: likeCountMap[row.id] || 0,
        likedByMe: likedByMeSet.has(row.id),
        likedByOwner: likedByOwnerSet.has(row.id)
      });
    });
    const idSet = new Set(postIds);
    POSTS.forEach(p=>{ if(idSet.has(p.id)) p.comments = byPost[p.id] || []; });
  }catch(e){ console.log("[comments] load exception:", e); }
}

/* гӮігғЎгғігғҲгҒ®гғҸгғјгғҲгӮ’жҠјгҒ—гҒҹгҒЁгҒҚгҒ®еҮҰзҗҶ(жҠ•зЁҝгҒЁеҗҢгҒҳгҒҸжҘҪиҰізҡ„жӣҙж–°+еӨұж•—жҷӮгғӯгғјгғ«гғҗгғғгӮҜ) */
function toggleCommentLike(postId, commentId){
  const p = POSTS.find(x=>x.id===postId); if(!p || !p.comments) return;
  const c = p.comments.find(x=>x.id===commentId); if(!c) return;
  if(!isSignedIn()){ toast(t("x.auth.noConn")); return; }
  const was = c.likedByMe;
  c.likedByMe = !was;
  c.likeCount = Math.max(0, (c.likeCount||0) + (was ? -1 : 1));
  rerenderPost();
  (async()=>{
    const ok = was ? await removeCommentLikeFromSupabase(commentId) : await addCommentLikeToSupabase(commentId);
    if(!ok){
      c.likedByMe = was;
      c.likeCount = Math.max(0, (c.likeCount||0) + (was ? 1 : -1));
      toast(t("x.auth.noConn"));
      rerenderPost();
    }
  })();
}

function t(key, vars){
  const lang=curLang();
  let s=(I18N[lang] && I18N[lang][key]) || (I18N.ja[key]) || key;
  if(vars){ Object.keys(vars).forEach(k=>{ s=s.replace(new RegExp("\\{"+k+"\\}","g"), vars[k]); }); }
  return s;
}

function dowLabel(idx){ return t("dow."+idx); }
function monthName(m){ return curLang()==="en" ? EN_MONTHS[(+m)-1] : (m+"жңҲ"); }
// ж—Ҙд»ҳгӮӯгғј(yyyy-mm-dd)гӮ’гҖҢжӣңж—ҘгҒӨгҒҚжңҲж—ҘгҖҚгҒ«ж•ҙеҪў(иЁҖиӘһиҝҪеҫ“)
function dateMD(key){
  const d=new Date(key); const dow=dowLabel(d.getDay());
  const [Y,M,D]=key.split("-");
  return t("date.md",{m:+M,d:+D,dow});
}

function holName(k){ if(!HOLIDAYS[k]) return ""; return curLang()==="en"?t("date.holiday"):HOLIDAYS[k]; }

// дәҲз®—йҒёжҠһиӮўгғ©гғҷгғ«(ж—Ҙжң¬иӘһгҒҜгҒқгҒ®гҒҫгҒҫгҖҒиӢұиӘһгҒҜгҖҢUp to ВҘxx,xxxгҖҚ/гҖҢNo preferenceгҖҚгҒ«еӨүжҸӣ)
function budgetOptLabel(label){
  if(curLang()!=="en") return label;
  if(label.indexOf("еёҢжңӣгҒӘгҒ—")>=0) return t("s5.noWish");
  const m=label.match(/(\d+)дёҮ/); if(m) return "up to ВҘ"+(parseInt(m[1])*10000).toLocaleString();
  const k=label.match(/(\d+)еҚғ/); if(k) return "up to ВҘ"+(parseInt(k[1])*1000).toLocaleString();
  return label;
}

/* гғўгғҺгӮҜгғӯжҷӮгҒ®е®ҹйҡӣгҒ®иүІ(гғҶгғјгғһдҫқеӯҳ):гғ©гӮӨгғҲ=й»’, гғҖгғјгӮҜ=зҷҪзі» */
function accentColor(key){
  if(key==="mono") return (document.documentElement.getAttribute("data-theme")==="dark") ? "#faf3ed" : "#080001";
  return key;
}
/* HEXвҶ’{r,g,b} */
function hex2rgb(h){ h=h.replace("#",""); return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)}; }
function rgb2hex(r,g,b){ const f=x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,"0"); return "#"+f(r)+f(g)+f(b); }
/* baseгӮ’зҷҪеҒҙ(t=0)гҖңbase(t=1)гҒ§ж··гҒңгӮӢ(ең°еӣігҒ®и–„гҒ„ж®өйҡҺз”Ё) */
function mixWhite(hex,t){ const c=hex2rgb(hex); return rgb2hex(255+(c.r-255)*t, 255+(c.g-255)*t, 255+(c.b-255)*t); }
/* baseгӮ’й»’еҒҙгҒ«еҜ„гҒӣгӮӢ(жҝғиүІ accent-deep з”Ё) */
function darken(hex,t){ const c=hex2rgb(hex); return rgb2hex(c.r*(1-t), c.g*(1-t), c.b*(1-t)); }
/* гӮўгӮҜгӮ»гғігғҲгӮ’йҒ©з”Ё:--accentзӯүгҒЁең°еӣі5ж®өйҡҺгӮ’жӣёгҒҚжҸӣгҒҲгӮӢгҖӮkeyгҒҜиүІHEXгҒҫгҒҹгҒҜ"mono" */
function applyAccent(key){
  S.accent=key;
  const hex=accentColor(key);
  const root=document.documentElement.style;
  root.setProperty("--accent", hex);
  root.setProperty("--accent-deep", darken(hex,0.22));
  root.setProperty("--sat", hex);
  // ең°еӣі5ж®өйҡҺ(и–„вҶ’жҝғ)
  root.setProperty("--map1", mixWhite(hex,0.22));
  root.setProperty("--map2", mixWhite(hex,0.42));
  root.setProperty("--map3", mixWhite(hex,0.62));
  root.setProperty("--map4", mixWhite(hex,0.82));
  root.setProperty("--map5", hex);
  // в‘©FABзӯүгҒ®еҪұгӮ’гӮўгӮҜгӮ»гғігғҲиүІгҒ«йҖЈеӢ•
  const c=hex2rgb(hex);
  root.setProperty("--accent-rgb", `${c.r},${c.g},${c.b}`);
  // в‘ўгӮўгӮҜгӮ»гғігғҲиғҢжҷҜгҒ®дёҠгҒ«д№—гӮӢж–Үеӯ—иүІгҖӮйҖҡеёёгҒҜзҷҪгҖҒгғўгғҺгӮҜгғӯгҒ®гғҖгғјгӮҜ(зҷҪгӮўгӮҜгӮ»гғігғҲ)гҒ§гҒҜй»’гҒ«гҒ—гҒҰеҗҢеҢ–гӮ’йҳІгҒҗ
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const onAccent=(key==="mono"&&dark)?"#080001":"#fff";
  root.setProperty("--on-accent", onAccent);
  document.documentElement.setAttribute("data-accent", key==="mono"?"mono":"color");
  // в‘ йҖІжҚ—гғҗгғјеҲ°йҒ”зӮ№гҒ®зҸҫеңЁең°гғ”гғіз”»еғҸ(гғҶгғјгғһгғ»гӮўгӮҜгӮ»гғігғҲгҒ§иүІгҒҢеӨүгӮҸгӮӢ)
  const pin = dark ? (key==="mono"?UI_IMG.pin_white:UI_IMG.pin_red) : (key==="mono"?UI_IMG.pin_black:UI_IMG.pin_red);
  root.setProperty("--pin-img", `url('${pin}')`);
}

function badgeToast(html, ms, withKey){

/* зҸҫеңЁжҷӮеҲ»гӮ’ HH:MM еҪўејҸгҒ§иҝ”гҒҷ(гғҒгғЈгғғгғҲгҒ®йҖҒдҝЎжҷӮеҲ»иЎЁзӨәз”Ё) */

/* гғЎгғғгӮ»гғјгӮёз”ЁгҒ®дёҖж„ҸIDгҖӮйҖҒдҝЎгғ»иҮӘеӢ•иҝ”дҝЎгҒ®гҒ©гҒЎгӮүгҒ«гӮӮд»ҳдёҺгҒ—гҖҒиҝ”дҝЎ/еүҠйҷӨ/еҸ–гӮҠж¶ҲгҒ—гҒ®зӣ®еҚ°гҒ«гҒҷгӮӢ */
let _msgSeq=0;

/* ж—ўеӯҳгғЎгғғгӮ»гғјгӮёгҒ«idгҒЁtsгҒҢз„ЎгҒ‘гӮҢгҒ°иЈңе®ҢгҒҷгӮӢ(гғӘгғӯгғјгғүеҲқжңҹгғҮгғјгӮҝеҗ‘гҒ‘) */
function ensureMsgId(m){ if(m&&!m.id) m.id=newMsgId(); if(m&&m.ts==null) m.ts=Date.now(); return m; }
/* йҖҒдҝЎгҒӢгӮү24жҷӮй–“(1ж—Ҙ)д»ҘеҶ…гҒӘгӮүеҸ–гӮҠж¶ҲгҒ—еҸҜиғҪ */
function canUnsend(m){ return m && m.mine && !m.unsent && (m.ts!=null) && (Date.now()-m.ts < 86400000); }
/* жң¬ж–ҮгҒӢгӮү @ID гҒЁ @All гӮ’йқ’иүІиЈ…йЈҫгҒҷгӮӢHTMLгӮ’иҝ”гҒҷ(escгҒҜгҒ“гҒ®дёӯгҒ§иЎҢгҒҶ) */
/* в‘ жҠ•зЁҝжң¬ж–Үз”Ё: гғЎгғігӮ·гғ§гғігӮ’гӮҜгғӘгғғгӮҜеҸҜиғҪгҒ«гҒ—гҖҒеҜҫеҝңгҒҷгӮӢдәәгҒ®гғ—гғӯгғ•гӮЈгғјгғ«гҒёйЈӣгҒ°гҒҷгҖӮ
   жҠ•зЁҝгҒ§гҒҜ @All гғЎгғігӮ·гғ§гғігҒҜз„ЎеҠ№(иЈ…йЈҫгҒӣгҒҡйҖҡеёёгғҶгӮӯгӮ№гғҲгҒЁгҒ—гҒҰиЎЁзӨә) */
function decorateMentionsClickable(text){
  const safe=esc(text||"");
  return safe.replace(/[@пј ](All|all|[A-Za-z0-9._]+)/g, (m0,p1)=>{
    if(/^all$/i.test(p1)) return m0;   // жҠ•зЁҝгҒ§гҒҜ @All гҒҜгғЎгғігӮ·гғ§гғіжүұгҒ„гҒ—гҒӘгҒ„
    // id гҒҫгҒҹгҒҜ name гҒ§PEOPLEгӮ’жӨңзҙў(иҮӘеҲҶ=Tomato/гғҲгғһгғҲгӮӮиҖғж…®)
    const person=PEOPLE.find(x=>x.id===p1 || x.name===p1);
    if(person){
      return `<span class="mention link" onclick="event.stopPropagation();profileBackView='post';openProfile('${person.id}')">@${esc(person.name)}</span>`;
    }
    return `<span class="mention">@${esc(p1)}</span>`;
  });
}
function decorateMentions(text){
  const safe=esc(text||"");
  // @All(@all/пј All)гҒЁ @иӢұж•°еӯ—._ гӮ’йқ’иүІspanгҒ«гҖӮиЁҳеҸ·гҒҜе…Ёи§’пј гӮӮиЁұе®№
  return safe.replace(/[@пј ](All|all|[A-Za-z0-9._]+)/g, (m0,p1)=>{
    const isAll=/^all$/i.test(p1);
    return `<span class="mention">@${isAll?"All":esc(p1)}</span>`;
  });
}
/* жң¬ж–ҮдёӯгҒ«гҒӮгӮӢгғЎгғігӮ·гғ§гғіеҜҫиұЎIDгҒ®й…ҚеҲ—гӮ’иҝ”гҒҷгҖӮ@AllгҒҜ "*" гӮ’еҗ«гӮҒгӮӢ */
function extractMentions(text){
  const out=[]; const re=/[@пј ](All|all|[A-Za-z0-9._]+)/g; let mm;
  while((mm=re.exec(text||""))){ out.push(/^all$/i.test(mm[1])?"*":mm[1]); }
  return out;
}

function curMsgLog(scope){

/* гғЎгғғгӮ»гғјгӮёж“ҚдҪңгғЎгғӢгғҘгғј(й•·жҠјгҒ—/еҸігӮҜгғӘгғғгӮҜгҒ§й–ӢгҒҸ) */
let msgMenu={scope:null,id:null};
function openMsgMenu(scope,id,clientX,clientY){
  const m=findMsgById(scope,id); if(!m||m.sys)return;
  closeMsgMenu();
  msgMenu={scope,id};
  const items=[];
  // иҝ”дҝЎ:е…ЁгғЎгғғгӮ»гғјгӮёеҸҜ
  items.push(`<button onclick="startReply('${scope}','${id}')">${t('x.msg.reply')}</button>`);
  // гӮігғ”гғј:гғҶгӮӯгӮ№гғҲгҒҢгҒӮгӮӢгҒЁгҒҚ
  if(m.t && !m.img) items.push(`<button onclick="copyMsg('${scope}','${id}')">${t('x.msg.copy')}</button>`);
  // иҮӘеҲҶгҒ®йҖҒдҝЎ:24жҷӮй–“д»ҘеҶ…гҒӘгӮүгҖҢйҖҒдҝЎеҸ–гӮҠж¶ҲгҒ—гҖҚгҖҒгҒ„гҒӨгҒ§гӮӮгҖҢиҮӘеҲҶгҒ®з”»йқўгҒӢгӮүеүҠйҷӨгҖҚ
  if(m.mine){
    if(canUnsend(m)) items.push(`<button onclick="unsendMsg('${scope}','${id}')">${t('x.msg.unsend')}</button>`);
    items.push(`<button class="danger" onclick="deleteMsgLocal('${scope}','${id}')">${t('x.msg.delMine')}</button>`);
  } else {
    // зӣёжүӢгҒ®йҖҒдҝЎ:иҮӘеҲҶгҒ®з”»йқўгҒӢгӮүгҒ®гҒҝеүҠйҷӨ
    items.push(`<button class="danger" onclick="deleteMsgLocal('${scope}','${id}')">${t('x.msg.delMine')}</button>`);
  }
  const menu=document.createElement("div");
  menu.id="msgMenu"; menu.className="msg-menu"; menu.innerHTML=items.join("");
  document.body.appendChild(menu);
  // дҪҚзҪ®иӘҝж•ҙ:з”»йқўеҶ…гҒ«еҸҺгӮҒгӮӢ
  const mw=190, mh=menu.offsetHeight||44*items.length;

  setTimeout(()=>document.addEventListener("click",closeMsgMenuOnce,{once:true}),0);
}

/* иҝ”дҝЎгӮ’й–Ӣе§Ӣ */
function startReply(scope,id){
  const m=findMsgById(scope,id); if(!m)return;
  replyDraft={id:m.id, who:m.who, t:m.img?"":(m.t||""), img:!!m.img};
  closeMsgMenu(); renderReplyBar();
  const ta=document.getElementById("chatInput"); if(ta)ta.focus();
}
/* гӮігғ”гғј */
function copyMsg(scope,id){
  const m=findMsgById(scope,id); if(!m)return; closeMsgMenu();
  const text=m.t||"";
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(t("x.toast.copied"))).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement("textarea"); ta.value=text;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");toast(t("x.toast.copied"));}catch(e){toast(t("x.toast.copyFail"));}
  document.body.removeChild(ta);
}
/* йҖҒдҝЎеҸ–гӮҠж¶ҲгҒ—:иҮӘеҲҶгғ»зӣёжүӢгҒ®дёЎж–№гҒ®з”»йқўгҒ§гҖҢеҸ–гӮҠж¶ҲгҒ—гҒҫгҒ—гҒҹгҖҚиЎЁзӨәгҒ«зҪ®гҒҚжҸӣгҒҲгӮӢ */
function unsendMsg(scope,id){
  const m=findMsgById(scope,id); if(!m)return; closeMsgMenu();
  if(!canUnsend(m)){ toast(t("x.toast.unsendExpired")); return; }
  m.unsent=true; m.t=""; m.img=null; m.reactions={}; m.replyTo=null;
  if(scope==="dm") renderDMBody(false); else renderGroupChatBody(false);
  toast(t("x.toast.unsent"));
}
/* еүҠйҷӨ:иҮӘеҲҶгҒ®з”»йқўгҒӢгӮүгҒ®гҒҝж¶ҲгҒҷ(зӣёжүӢеҒҙгҒ«гҒҜж®ӢгӮӢжғіе®ҡгҒӘгҒ®гҒ§гҖҒй…ҚеҲ—гҒӢгӮүйҷӨеҺ») */
function deleteMsgLocal(scope,id){
  closeMsgMenu();
  if(scope==="dm"){
    const log=DM[activeChatId]; if(!log)return;
    const i=log.findIndex(m=>m.id===id); if(i>=0)log.splice(i,1);
    renderDMBody(false);
  } else {
    const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
    const i=g.chat.findIndex(m=>m.id===id); if(i>=0)g.chat.splice(i,1);
    renderGroupChatBody(false);
  }
  toast(t("x.toast.removedFromMine"));
}
/* гғЎгғігӮ·гғ§гғійҖҡзҹҘ:@IDи©ІеҪ“иҖ…гғ»@AllгҒ®гҒЁгҒҚе…Ёе“ЎгҒёгҒҠзҹҘгӮүгҒӣгӮ’йҖҒгӮӢ(иҮӘеӢ•иҝ”дҝЎгҒ®зӣёжүӢеҗ‘гҒ‘гҒ®ж“¬дјјжҢҷеӢ•) */
function notifyMentions(g, txt){
  const ids=extractMentions(txt); if(!ids.length)return;
  const all=ids.includes("*");
  const names=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
  let hit=false;
  if(all){ hit=names.length>0; }
  else {
    // @IDгҒҢгғЎгғігғҗгғјгҒ®гҒ„гҒҡгӮҢгҒӢгҒ«дёҖиҮҙгҒҷгӮӢгҒӢ(PEOPLEгҒ®idгҒӢеҗҚеүҚгҒ§еҲӨе®ҡ)
    hit=ids.some(idv=>{
      const p=PEOPLE.find(x=>x.id===idv||x.name===idv);
      return p && names.includes(p.name);
    });
  }
  if(hit){
    pushNotif({ic:"рҹ“Ј", a:`гҖҢ${g.name}гҖҚгҒ§гҒӮгҒӘгҒҹгҒҢгғЎгғігӮ·гғ§гғігҒ•гӮҢгҒҫгҒ—гҒҹ`, b:txt.slice(0,40),
      when:"гҒҹгҒЈгҒҹд»Ҡ", unread:true, target:{type:"groupchat", gid:g.id}});
  }
}

/* ===== в‘ гғЎгғігӮ·гғ§гғіеҖҷиЈң(гӮөгӮёгӮ§гӮ№гғҲ) ===== */
/* зҸҫеңЁй–ӢгҒ„гҒҰгҒ„гӮӢгӮ°гғ«гғјгғ—гҒ®гғЎгғігғҗгғјеҖҷиЈңгӮ’иҝ”гҒҷгҖӮTomato(иҮӘеҲҶ)гҒҜйҷӨгҒҸ */
function mentionCandidates(){
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return [];
  const names=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
  return names.map(nm=>{
    const p=PEOPLE.find(x=>x.name===nm);
    return p ? {id:p.id, name:p.name, photo:p.photo||"", avatar:p.avatar||"рҹҷӮ"}
             : {id:nm, name:nm, photo:"", avatar:"рҹҷӮ"};
  });
}
/* textareaгҒ®е…ҘеҠӣгӮ’зӣЈиҰ–гҒ—гҖҒгӮ«гғјгӮҪгғ«зӣҙеүҚгҒҢ @иӘһ гҒӘгӮүгӮөгӮёгӮ§гӮ№гғҲгӮ’еҮәгҒҷ */
let _mentionStart=-1;
function mentionInput(ta){
  const pos=ta.selectionStart;
  const left=ta.value.slice(0,pos);
  // зӣҙиҝ‘гҒ® @/пј  гӮ’жҺўгҒ—гҖҒгҒқгҒ®еҫҢгҒ«з©әзҷҪгҒҢз„ЎгҒ‘гӮҢгҒ°гӮөгӮёгӮ§гӮ№гғҲеҜҫиұЎ
  const m=left.match(/[@пј ]([A-Za-z0-9._гҒҒ-гӮ“гӮЎ-гғ¶дёҖ-йҫ гғј]*)$/);
  if(!m){ hideMentionPop(); return; }
  _mentionStart=pos-m[0].length;   // @гҒ®дҪҚзҪ®
  const q=m[1].toLowerCase();
  let cands=mentionCandidates();
  // @All гӮ’е…Ҳй ӯеҖҷиЈңгҒ«(гӮҜгӮЁгғӘгҒҢз©әгҒӢallгҒ«еүҚж–№дёҖиҮҙ)
  const list=[];
  if(!q || "all".startsWith(q)) list.push({id:"All", name:"е…Ёе“ЎгҒ«гғЎгғігӮ·гғ§гғі", photo:"", avatar:"рҹ“Ј", isAll:true});
  cands.forEach(c=>{
    if(!q || c.id.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)) list.push(c);
  });
  if(!list.length){ hideMentionPop(); return; }
  showMentionPop(list);
}
function showMentionPop(list){
  const pop=document.getElementById("mentionPop"); if(!pop)return;
  pop.innerHTML=list.slice(0,6).map(c=>{
    const av = c.photo
      ? `<div class="mc-av" style="background-image:url('${c.photo}')"></div>`
      : `<div class="mc-av emoji">${esc(c.avatar||"рҹҷӮ")}</div>`;
    const sub = c.isAll ? "гӮ°гғ«гғјгғ—е…Ёе“ЎгҒё" : `@${esc(c.id)}`;
    return `<button class="mc-item" onmousedown="event.preventDefault()" onclick="pickMention('${esc(c.id)}')">
      ${av}<div class="mc-body"><div class="mc-name">${esc(c.name)}</div><div class="mc-id">${sub}</div></div></button>`;
  }).join("");
  pop.style.display="block";
}
function hideMentionPop(){ const pop=document.getElementById("mentionPop"); if(pop){pop.style.display="none";pop.innerHTML="";} _mentionStart=-1; }
/* еҖҷиЈңгӮ’йҒёгӮ“гҒ гӮү @ID гӮ’жң¬ж–ҮгҒёжҢҝе…Ҙ */
function pickMention(id){
  const ta=document.getElementById("chatInput"); if(!ta||_mentionStart<0)return;
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,_mentionStart);
  const after=ta.value.slice(pos);
  const insert="@"+id+" ";
  ta.value=before+insert+after;
  const caret=(before+insert).length;
  ta.setSelectionRange(caret,caret);
  hideMentionPop(); autoGrow(ta); ta.focus();
}
function ymd(y,m,d){return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}

const STEP_LABELS=["дҪңжҲҗ","еҸӮеҠ ","еёҢжңӣ","иЎҢгҒҚе…Ҳ","ж—ҘзЁӢ","дәҲз®—","гӮ№гғқгғғгғҲ","еҗҲж„Ҹ"];
// еҗ„з”»йқўгҒ®stepз•ӘеҸ· -> йҖІжҚ—гғҗгғјдёҠгҒ®ж®ө(1е§ӢгҒҫгӮҠ)
function stepStage(){
  const s=S.step;
  if(s<=2)return s;          // 0,2
  if(s<4)return 3;           // 3,3.5 еёҢжңӣ/иЎҢгҒҚе…Ҳ
  if(s<5)return 5;           // 4,4.5 ж—ҘзЁӢ
  if(s<5.6)return 6;         // 5,5.5 дәҲз®—
  if(s<6)return 7;           // 5.6,5.7 гӮ№гғқгғғгғҲ
  return 8;                  // 6,7 еҗҲж„Ҹ
}
function renderSteps(){
  const stage=stepStage();
  $("#steps").innerHTML = STEP_LABELS.map((_,i)=>{
    const idx=i+1; let c="seg";
    if(stage>idx)c+=" done"; else if(stage===idx)c+=" now";
    return `<div class="${c}"></div>`;
  }).join("");
  const rp=$("#roomPill"); if(rp) rp.textContent = S.roomName?t("room.pill",{name:S.roomName,n:S.members.length}):t("room.notCreated");
}
function personSwitch(){

  return `<div class="person-switch"><span>${t("person.testMode")}</span><span class="lbl">${t("person.acting")}</span>

      ${S.members.map(m=>`<option value="${m.id}" ${m.id===S.me?"selected":""}>${esc(m.name)}</option>`).join("")}

function ensureRoomShell(){
  // гғ«гғјгғ з”»йқўгҒ®йӘЁж ј(жҲ»гӮӢгғ»гғҳгғғгғҖгғјгғ»йҖІжҚ—гғҗгғјгғ»жң¬дҪ“)гӮ’ #screen гҒ«з”Ёж„Ҹ
  if($("#app")) return;

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>${t("room.talk")}</button>` : `<div class="room-pill" id="roomPill">${t("room.notCreated")}</div>`;
  $("#screen").innerHTML = `
    <header class="app">
      <div class="head-inner">
        <button class="room-back" onclick="goBack('home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>${t("room.list")}
        </button>
        <div class="logo" onclick="goView('home')" title="${t("logo.toHome")}"><img src="${logoSrc()}" alt="TAVIгҖӮ" class="logo-img"></div>
        <div class="head-spacer"></div>
        ${gchatBtn}
      </div>
      <div class="steps" id="steps"></div>
    </header>
    <div class="wrap" id="app"></div>`;
}
function render(opts){
  ensureRoomShell();
  window.app = appEl();
  renderSteps();
  switch(S.step){
    case 0:viewCreate();break; case 2:viewJoin();break;
    case 3:viewWishes();break; case 3.5:viewWishTally();break;
    case 4:viewDates();break; case 4.5:viewDateConfirm();break;
    case 5:viewBudget();break; case 5.5:viewBudgetTally();break;
    case 5.6:viewSpots();break; case 5.7:viewSpotPlan();break;
    case 6:viewConsent();break; case 7:viewDone();break;
    case 8:viewDayPlan();break;
    default:viewCreate();
  }
  if(!(opts&&opts.noscroll)) window.scrollTo({top:0,behavior:"smooth"});
  if(activeGid) commitRoom();
  // и„ұйҖҖгғңгӮҝгғі(еҸӮеҠ жёҲгҒҝгӮ°гғ«гғјгғ—гҒ§гҖҒдҪңжҲҗзӣҙеҫҢд»ҘеӨ–)
  const g = activeGid?GROUPS.find(x=>x.id===activeGid):null;
  if(g && g.joined && S.step>=2){
    const a=$("#app");
    if(a && !$("#leaveWrap")){
      const div=document.createElement("div");
      div.id="leaveWrap"; div.style.maxWidth="100%"; div.style.marginTop="14px";
      div.innerHTML=`<button class="leave-btn" onclick="leaveGroup('${g.id}')">${t("leave.btn")}</button>`;
      a.appendChild(div);
    }
  }
}

function onCoverPick(e){

function drawFriendPick(){
  const box=$("#friendPick"); if(!box)return;
  const friends=(typeof PEOPLE!=="undefined"?PEOPLE:[]).filter(p=>p.iFollow);
  if(!friends.length){ box.innerHTML=`<p class="muted">${t("s2.noFriends")}</p>`; return; }
  box.innerHTML=friends.map(p=>{
    const added=S.members.some(m=>m.refId===p.id);
    return `<button class="friend-row ${added?'on':''}" onclick="toggleFriendMember('${p.id}')">
      <span class="fp-ava">${p.avatar||"рҹҷӮ"}</span>
      <span class="fp-name">${esc(p.name)}</span>
      <span class="fp-act">${added?("вң“ "+t("s2.added")):("пјӢ "+t("s2.addToTrip"))}</span>
    </button>`;
  }).join("");
}
/* еҸӢйҒ”гӮ’гғЎгғігғҗгғјгҒ«иҝҪеҠ /и§ЈйҷӨ(refIdгҒ§еҜҫеҝңд»ҳгҒ‘) */
function toggleFriendMember(pid){
  const p=(typeof PEOPLE!=="undefined"?PEOPLE:[]).find(x=>x.id===pid); if(!p)return;
  const idx=S.members.findIndex(m=>m.refId===pid);
  if(idx>=0){
    const removed=S.members[idx];
    S.members.splice(idx,1);
    if(S.me===removed.id) S.me=S.members.length?S.members[0].id:null;
    toast(t("toast.memberRemoved",{name:p.name}));
  }else{
    const m={id:uid(),name:p.name,refId:pid};
    S.members.push(m); if(!S.me)S.me=m.id;
    toast(t("toast.memberAdded",{name:p.name}));
  }
  drawFriendPick(); drawRoster(); renderSteps();
}
function drawRoster(){const r=$("#roster");if(!r)return;
  r.innerHTML=S.members.map(m=>`<span class="chip"><span class="dot"></span>${esc(m.name)}</span>`).join("")||`<span class="muted">${t("s2.rosterEmpty")}</span>`;
  const b=$("#toAct");if(b)b.disabled=S.members.length<3;}
function seedMembers(){["гҒҹгӮҚгҒҶ","гҒ•гҒҸгӮү","гҒ‘гӮ“гҒҹ","гҒҝгҒҶ","гӮҶгҒҶгҒҚ"].forEach(n=>{
  if(!S.members.find(x=>x.name===n))S.members.push({id:uid(),name:n});});
  if(!S.me)S.me=S.members[0].id;drawFriendPick();drawRoster();renderSteps();toast(t("toast.seeded"));}
function startNext(){if(S.members.length<3){toast(t("toast.need3"));return;} S.step=S.mode==='decided'?4:3; render();}
</script>
<script>
/* ===== з”»йқў3 еёҢжңӣйӣҶзҙ„ ===== */
function viewWishes(){
  const myCountry=S.countryVotes[S.me]||[];
  const myFree=S.countryFree[S.me]||[];
  app.innerHTML=`
  ${personSwitch()}
  <div class="card">
    <div class="eyebrow">${t("s3.eyebrow")}</div>
    <h2>${t("s3.h")}</h2>
    <p class="lead">${t("s3.lead")}${timerChip()}</p>

    <h3 class="sub"><span class="badge">A</span>${t("s3.aPlace")}</h3>
    <div class="place-tabs">
      <button class="${S.region==='domestic'?'on':''}" onclick="switchRegion('domestic')">${t("s1.domestic")}</button>
      <button class="${S.region==='overseas'?'on':''}" onclick="switchRegion('overseas')">${t("s1.overseas")}</button>
    </div>

    <div class="${S.region==='domestic'?'':'hide'}">

            <div class="scene" style="${c.img?`background:url('${KOREA_IMG}') center/cover`:(COUNTRY_IMG[c.n]?`background:url('${COUNTRY_IMG[c.n]}') center/cover`:`background:linear-gradient(160deg,${c.c1},${c.c2})`)}"></div>
            <div class="veil2"></div>
            <span class="cname"><span class="cn-ja">${esc(c.n)}</span><span class="cn-en">${esc(c.en||"")}</span></span>
          </div>`).join("")}
      </div>
      <label class="fld">${t("s3.otherCountry")}</label>
      <div class="freelist" id="freeList">
        ${myFree.concat([""]).map((fv,i)=>`<div class="row">
          <input type="text" data-fi="${i}" placeholder="${t("s3.country.ph")}" value="${esc(fv)}" oninput="updateFree()" style="flex:5">
        </div>`).join("")}
      </div>
      <p class="hint">${t("s3.free.hint")}</p>
    </div>

    <div class="divider"></div>
    <h3 class="sub"><span class="badge">B</span>${t("s3.bThing")}</h3>
    <p class="hint">${t("s3.act.hint")}</p>

    <div class="btn-row">
      <button class="btn ghost" onclick="saveWishes();toast(t('toast.savedAns',{name:meName()}))">${t("s3.saveMine")}</button>

    </div>
    <p class="hint center" id="wishCount">${t("answered",{c:countWishAnswered(),total:S.members.length})}</p>

  if(S.region==='domestic') drawMap("mapwrap", S.prefVotes[S.me]||[], "togglePref", false);
}
function renderGenres(){
  const myAct=S.activityVotes[S.me]||[];
  // еҲқжңҹиЎЁзӨәгҒҷгӮӢгӮёгғЈгғігғ«(еёёгҒ«й–ӢгҒ„гҒҰдёҰгҒ№гӮӢ)
  if(!S.openGenres) S.openGenres=GENRE_DEFAULT_OPEN.slice();
  if(S.showMoreGenres==null) S.showMoreGenres=false;
  const genreBlock=(g)=>{
    const open=S.openGenres.includes(g.name);
    return `<div class="genre ${open?'open':''}">
      <button class="gh" onclick="toggleGenre('${esc(g.name)}')">
        <span>${esc(itemLabel(g.name))}</span>
        <span class="gh-right"><span class="count">${t("list.count",{n:g.items.length})}</span><span class="gh-caret">${open?'в–ҫ':'в–ё'}</span></span>
      </button>
      ${open?`<div class="opts">
        ${g.items.map(it=>`<div class="opt ${myAct.includes(it)?'sel':''}" data-act="${esc(it)}" onclick="toggleAct('${esc(it)}',event)">${esc(itemLabel(it))}</div>`).join("")}
      </div>`:``}
    </div>`;
  };
  const defaults=GENRES.filter(g=>GENRE_DEFAULT_OPEN.includes(g.name));
  const others=GENRES.filter(g=>!GENRE_DEFAULT_OPEN.includes(g.name));
  let html=defaults.map(genreBlock).join("");
  if(S.showMoreGenres){
    html+=others.map(genreBlock).join("");
    html+=`<button class="more-genres" onclick="collapseGenres()">${t("s3.less")}</button>`;
  }else{
    html+=`<button class="more-genres" onclick="S.showMoreGenres=true;rerenderGenres()">${t("s3.more")}</button>`;
  }
  return html;
}
/* в‘ гӮёгғЈгғігғ«й–Ӣй–ү(еҗҢдёҖгӮ°гғ«гғјгғ—гҒҜй …зӣ®йҒёжҠһгҒ§гҒҜй–үгҒҳгҒӘгҒ„=еҶҚжҸҸз”»гҒҜгҒ“гҒ®й–ўж•°гҒ®гҒҝ) */
function toggleGenre(name){
  if(!S.openGenres)S.openGenres=[];
  const i=S.openGenres.indexOf(name);
  if(i>=0)S.openGenres.splice(i,1); else S.openGenres.push(name);
  rerenderGenres();
}
function rerenderGenres(){
  const w=$("#genreWrap"); if(w)w.innerHTML=renderGenres();
}
/* гӮӮгҒЈгҒЁиҰӢгӮӢгҒ§й–ӢгҒ„гҒҹиҝҪеҠ гӮёгғЈгғігғ«гӮ’й–үгҒҳгӮӢ(onclickгҒ«JSONй…ҚеҲ—гӮ’еҹӢгӮҒиҫјгӮҖгҒЁHTMLеұһжҖ§гҒҢеЈҠгӮҢгӮӢгҒҹгӮҒй–ўж•°еҢ–) */
function collapseGenres(){
  S.showMoreGenres=false;
  if(S.openGenres) S.openGenres=S.openGenres.filter(n=>GENRE_DEFAULT_OPEN.includes(n));
  rerenderGenres();
}
function countWishAnswered(){
  const ids=new Set();
  Object.keys(S.prefVotes).forEach(k=>{if((S.prefVotes[k]||[]).length)ids.add(k)});
  Object.keys(S.countryVotes).forEach(k=>{if((S.countryVotes[k]||[]).length)ids.add(k)});
  Object.keys(S.activityVotes).forEach(k=>{if((S.activityVotes[k]||[]).length)ids.add(k)});
  return ids.size;
}
/* гӮ„гӮҠгҒҹгҒ„гҒ“гҒЁ: гҒқгҒ®е ҙгҒ®гғңгӮҝгғігҒ гҒ‘гғҲгӮ°гғ«(еҶҚжҸҸз”»гӮӮгӮ№гӮҜгғӯгғјгғ«гӮӮгҒ—гҒӘгҒ„) */
function toggleAct(it,ev){
  const a=S.activityVotes[S.me]||(S.activityVotes[S.me]=[]);
  const i=a.indexOf(it);if(i>=0)a.splice(i,1);else a.push(it);
  if(ev&&ev.currentTarget)ev.currentTarget.classList.toggle("sel");
  const wc=$("#wishCount");if(wc)wc.textContent=t("answered",{c:countWishAnswered(),total:S.members.length});
}
function switchRegion(r){
  if(S.region===r){render({noscroll:true});return;}
  // жҺ’д»–: еҲҮжӣҝжҷӮгҒ«гӮӮгҒҶзүҮж–№(зҸҫгғЎгғігғҗгғјеҲҶ)гҒ®йҒёжҠһгӮ’гӮҜгғӘгӮў
  if(r==='domestic'){ S.countryVotes[S.me]=[]; S.countryFree[S.me]=[]; }
  else { S.prefVotes[S.me]=[]; }
  S.region=r; render({noscroll:true});
}
function toggleCountry(c){
  const a=S.countryVotes[S.me]||(S.countryVotes[S.me]=[]);
  const i=a.indexOf(c);if(i>=0)a.splice(i,1);else a.push(c);
  // жө·еӨ–гӮ«гғјгғүгҒ гҒ‘жӣҙж–°(гӮ№гӮҜгғӯгғјгғ«з¶ӯжҢҒ)
  render({noscroll:true});
}
function togglePref(id){
  const a=S.prefVotes[S.me]||(S.prefVotes[S.me]=[]);
  const i=a.indexOf(id);if(i>=0)a.splice(i,1);else a.push(id);
  drawMap("mapwrap", S.prefVotes[S.me], "togglePref", false); // ең°еӣігҒ®гҒҝеҶҚжҸҸз”»
}
function updateFree(){
  const inputs=[...document.querySelectorAll('#freeList input')];
  S.countryFree[S.me]=inputs.map(i=>i.value.trim()).filter(Boolean);
  const last=inputs[inputs.length-1];
  if(last&&last.value.trim()!==""){
    const wrap=document.createElement("div");wrap.className="row";
    wrap.innerHTML=`<input type="text" data-fi="${inputs.length}" placeholder="${t('s3.country.ph')}" oninput="updateFree()" style="flex:5">`;
    document.getElementById("freeList").appendChild(wrap);
  }
}
function saveWishes(){const t=$("#actFree");if(t)S.activityFree[S.me]=t.value.trim();
  const inputs=[...document.querySelectorAll('#freeList input')];
  if(inputs.length)S.countryFree[S.me]=inputs.map(i=>i.value.trim()).filter(Boolean);}

/* ең°еӣіжҸҸз”»(жІ–зё„жһ гҒӨгҒҚ) */
function drawMap(containerId, selectedIds, onclickFn, heat){
  const c=document.getElementById(containerId); if(!c||typeof JP_PREF==="undefined")return;
  const heatCounts={};
  if(heat) S.members.forEach(m=>(S.prefVotes[m.id]||[]).forEach(id=>heatCounts[id]=(heatCounts[id]||0)+1));
  const total=S.members.length||1;
  const paths=JP_PREF.map(p=>{
    let cls="";
    if(heat){const n=heatCounts[p.id]||0,r=n/total;
      if(n>0)cls=r<=.2?"m1":r<=.4?"m2":r<=.6?"m3":r<1?"m4":"m5";}
    else if((selectedIds||[]).includes(p.id))cls="sel";
    const click=heat?"":`onclick="${onclickFn}(${p.id})"`;
    const title=heat&&heatCounts[p.id]?`${p.name} ${heatCounts[p.id]}дәә`:p.name;
    return `<path d="${p.d}" class="${cls}" ${click}><title>${esc(title)}</title></path>`;
  }).join("");
  // жІ–зё„гҒЁжң¬еңҹгҒ®д»•еҲҮгӮҠ(дёҖе‘ЁгҒ•гҒӣгҒҡгҖҒй–“гҒ«ж–ңгӮҒгҒ®зӮ№з·ҡгҒ®гҒҝ)
  const frame=`<polyline class="okiframe" points="142,38 142,118 38,165" fill="none"/>`;
  c.innerHTML=`<svg viewBox="0 0 480 470" xmlns="http://www.w3.org/2000/svg">${frame}${paths}</svg>`;
  if(!heat){const sp=document.getElementById("selPref");
    if(sp)sp.innerHTML=(selectedIds||[]).map(id=>`<span class="chip">${esc(PREF_BY_ID[id]||id)}</span>`).join("");}
}

/* йӣҶиЁҲз”»йқў(еёҢжңӣ) */
function viewWishTally(){
  const enough=S.members.length>=3;
  const cCount={};Object.values(S.countryVotes).forEach(a=>(a||[]).forEach(c=>cCount[c]=(cCount[c]||0)+1));
  const cRank=Object.entries(cCount).sort((a,b)=>b[1]-a[1]);const cMax=cRank.length?cRank[0][1]:1;
  const fCount={};Object.values(S.countryFree).forEach(a=>(a||[]).forEach(t=>fCount[t]=(fCount[t]||0)+1));
  const fRank=Object.entries(fCount).sort((a,b)=>b[1]-a[1]);
  const aCount={};Object.values(S.activityVotes).forEach(a=>(a||[]).forEach(x=>aCount[x]=(aCount[x]||0)+1));

  const frees=Object.values(S.activityFree).filter(Boolean);
  const prefVoted=Object.values(S.prefVotes).some(a=>(a||[]).length);
  const flagOf=n=>{const c=COUNTRIES.find(x=>x.n===n);return c?c.f:"рҹҢҚ";};
  app.innerHTML=`<div class="card">
    <div class="eyebrow">${t("wt.eyebrow")}</div><h2>${t("wt.h")}</h2>
    <p class="lead">${t("wt.lead")}</p>
    <h3 class="sub"><span class="badge">A</span>${t("wt.aPlace")}</h3>
    ${prefVoted?`<p class="hint">${t("wt.dom")}</p><div class="mapwrap" id="mapHeat"></div>`:``}
    ${cRank.length?`<p class="hint" style="margin-top:12px">${t("wt.ovs")}</p>
      <div class="tally">${cRank.map(([c,n])=>`<div class="tline"><div class="name">${flagOf(c)} ${esc(c)}</div>
        <div class="tbar"><i style="width:${Math.round(n/cMax*100)}%"></i></div><div class="num">${t("people.count",{n})}</div></div>`).join("")}</div>`:``}
    ${fRank.length?`<p class="hint" style="margin-top:10px">${t("wt.ovsOther")}</p>
      ${fRank.map(([fl,n])=>`<div class="anon-note">рҹҢҚ ${esc(fl)} вҖҰ ${t("people.count",{n})}</div>`).join("")}`:``}
    ${(!prefVoted&&!cRank.length&&!fRank.length)?`<p class="muted">${t("wt.noPlace")}</p>`:``}
    <div class="divider"></div>
    <h3 class="sub"><span class="badge">B</span>${t("wt.bThing")}</h3>
    <div class="tally">${aRank.length?aRank.slice(0,12).map(([a,n])=>`<div class="tline"><div class="name">${esc(itemLabel(a))}</div>
      <div class="tbar"><i style="width:${Math.round(n/aMax*100)}%"></i></div><div class="num">${t("people.count",{n})}</div></div>`).join("")
      :`<p class="muted">${t("wt.noAns")}</p>`}</div>
    ${enough?(frees.length?frees.map(f=>`<div class="anon-note">рҹ’¬ ${esc(f)}</div>`).join(""):"")
            :`<p class="veil">${t("wt.veil")}</p>`}
    <div class="divider"></div>
    <label class="fld">${t("wt.decideDest")}</label>
    <div class="seg-toggle">
      <button class="${S.destKind==='domestic'?'on':''}" onclick="S.destKind='domestic';render({noscroll:true})">${t("s1.domestic")}</button>
      <button class="${S.destKind==='overseas'?'on':''}" onclick="S.destKind='overseas';render({noscroll:true})">${t("s1.overseas")}</button>
    </div>
    <input type="text" id="destChoose" placeholder="${t("wt.dest.ph")}" value="${esc(S.destination)}" style="margin-top:8px">
    <p class="hint">${t("wt.dest.hint")}</p>
    <div class="btn-row">
      <button class="btn ghost" onclick="S.step=3;render()">${t("wt.backWish")}</button>
      <button class="btn primary" onclick="confirmDest()">${t("wt.confirmDest")}</button>
    </div>
  </div>`;
  if(prefVoted) drawMap("mapHeat", null, null, true);
}
function confirmDest(){const v=$("#destChoose").value.trim();if(!v){toast(t("toast.needDestInput"));return;}
  S.destination=v;S.step=4;render();}

/* ===== з”»йқў4 ж—ҘзЁӢ(еҚҳж—Ҙ / зҜ„еӣІ) ===== */

  // еҲқеӣһ:гғһгӮӨгӮ«гғ¬гғігғҖгғјгҒ®з©әгҒҚдәҲе®ҡгӮ’гҒ“гҒ®дәәгҒ®еӣһзӯ”гҒёиҮӘеӢ•еҸҚжҳ 
  const applied=applyMyCalToAvail(false);
  // еҸҚжҳ гҒ—гҒҹе ҙеҗҲгҖҒиҰӢгҒҲгӮӢгӮҲгҒҶгғһгӮӨгӮ«гғ¬гғігғҖгғјгҒ®жңҖе°ҸжңҲгҒёз§»еӢ•
  if(applied){

      ${timerChip()}
    </div>

    ${hasMyCal?`<div class="mycal-help" style="display:flex;align-items:center;gap:10px;justify-content:space-between">
