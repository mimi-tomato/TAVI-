async function submitAuth(){
  clearAllAuthFieldErrors();
  const email=($("#authEmail")||{}).value||"";
  const pass=($("#authPass")||{}).value||"";
  let hasErr=false;
  if(!email){ showAuthFieldError("authEmail", "x.auth.emailRequired"); hasErr=true; }
  else if(!isValidEmail(email)){ showAuthFieldError("authEmail", "x.auth.emailInvalid"); hasErr=true; }
  if(!pass){ showAuthFieldError("authPass", "x.auth.passRequired"); hasErr=true; }
  else if(authMode==="signup" && !isStrongPassword(pass)){ showAuthFieldError("authPass", "x.auth.passWeak"); hasErr=true; }
  if(authMode==="signup"){
    const name=($("#authName")||{}).value||"";
    if(!name.trim()){ showAuthFieldError("authName", "x.auth.nameRequired"); hasErr=true; }
  }
  if(hasErr) return;
  if(authMode==="signup"){
    const name=($("#authName")||{}).value||"";
    const uid=(($("#authUserId")||{}).value||"").trim();
    const reason = validateUserId(uid);
    if(reason){
      const msgKey = {
        empty: "x.auth.idRequired", length: "x.auth.idErrLength",
        chars: "x.auth.idErrChars", edge: "x.auth.idErrEdge", dots: "x.auth.idErrDots"
      }[reason];
      showAuthFieldError("authUserId", msgKey);
      return;
    }
    if(await isUserIdTaken(uid)){ showAuthFieldError("authUserId", "x.toast.idTaken"); return; }
    authPendingEmail = email.trim();
    await authSignUp(email.trim(), pass, name.trim(), uid);
  }else{
    await authSignIn(email.trim(), pass);
  }
}
async function submitReset(){
  const email=($("#authEmail")||{}).value||"";
  if(!email){ toast(t("x.auth.enterEmail")); return; }
  await authResetPassword(email.trim());}

let authResendCooldown = 0;      // ж®ӢгӮҠз§’ж•°
let authResendTimer = null;      // гӮ«гӮҰгғігғҲгғҖгӮҰгғіз”Ё
function authResendTick(){
  const btn = $("#authResendBtn");
  if(authResendCooldown > 0){
    if(btn){ btn.textContent = t("x.auth.resendWait").replace("{s}", authResendCooldown); btn.style.opacity="0.5"; btn.style.pointerEvents="none"; }
    authResendCooldown--;
  }else{
    if(authResendTimer){ clearInterval(authResendTimer); authResendTimer=null; }
    if(btn){ btn.textContent = t("x.auth.resend"); btn.style.opacity=""; btn.style.pointerEvents=""; }
  }
}
function startResendCooldown(sec){
  authResendCooldown = sec;
  if(authResendTimer) clearInterval(authResendTimer);
  authResendTick();
  authResendTimer = setInterval(authResendTick, 1000);
}
async function resendCode(){
  if(!window.SB){ toast(t("x.auth.noConn")); return; }
  if(!authPendingEmail){ toast(t("x.auth.noConn")); return; }
  if(authResendCooldown > 0) return; // гӮҜгғјгғ«гғҖгӮҰгғідёӯгҒҜз„ЎеҠ№
  const { error } = await window.SB.auth.resend({
    type:"signup", email: authPendingEmail,
    options: { emailRedirectTo: location.origin + location.pathname }
  });
  if(error){
    // йҖҒдҝЎеӨұж•—(гғ¬гғјгғҲеҲ¶йҷҗгҒӘгҒ©)гӮ’жҳҺзўәгҒ«иЎЁзӨә
    toast(t("x.auth.resendFail"));
    console.log("[auth] resend error:", error.message);
    startResendCooldown(60);   // еӨұж•—жҷӮгӮӮгӮҜгғјгғ«гғҖгӮҰгғі(йҖЈжү“йҳІжӯў)
    return;
  }
  toast(t("x.auth.resent"));
  startResendCooldown(60);
}

function initFollowDates(){
  const base=Date.now();
  PEOPLE.forEach((p,i)=>{
    // иҮӘеҲҶвҶ’зӣёжүӢгҒ®гғ•гӮ©гғӯгғјж—Ҙ(iFollowжҷӮ)гҖӮiгҒ”гҒЁгҒ«йҒҺеҺ»гҒ«гҒҡгӮүгҒҷ
    if(p.iFollow && p.followedAt==null) p.followedAt = base - (i+1)*5*86400000 - (i*3600000);
    // зӣёжүӢвҶ’иҮӘеҲҶгҒ®гғ•гӮ©гғӯгғјж—Ҙ(followsMeжҷӮ)
    if(p.followsMe && p.followerSince==null) p.followerSince = base - (i+2)*4*86400000 - (i*7200000);
  });
}

checkBadgeAwards(true);   // иө·еӢ•жҷӮ:ж—ўгҒ«жқЎд»¶гӮ’жәҖгҒҹгҒҷгғҗгғғгӮёгҒҜйҖҡзҹҘжёҲгҒҝжүұгҒ„гҒ«гҒҷгӮӢ
renderApp();
/* в‘Ұиө·еӢ•гӮ№гғ—гғ©гғғгӮ·гғҘ: еӨ§гҒҚгӮҒгғӯгӮҙгӮ’е°‘гҒ—й•·гӮҒ(зҙ„0.9з§’)гҒ«еҮәгҒ—гҒҰгҒӢгӮүгғ•гӮ§гғјгғүгӮўгӮҰгғҲ */
(function(){
  try{
    const sp=document.getElementById("splash"), im=document.getElementById("splashLogo");
    if(sp&&im){
      im.src=logoSrc();
      setTimeout(()=>{ sp.classList.add("hide"); }, 900);
      setTimeout(()=>{ if(sp&&sp.parentNode) sp.parentNode.removeChild(sp); }, 1400);
    }
  }catch(e){}
})();
/* в‘ЈдёӢйғЁгӮҝгғ–гҒ®гҒӮгӮӢз”»йқўгҒ§гҖҒжЁӘгӮ№гғҜгӮӨгғ—гҒ§гӮҝгғ–з§»еӢ•гҖӮеҗ„гӮҝгғ–гҒ®зҠ¶ж…ӢгҒҜз¶ӯжҢҒгҒ•гӮҢгӮӢ(goViewгҒ®гҒҝгҒ§еҶҚжҸҸз”»)
   гӮ«гғ«гғјгӮ»гғ«гҒ®гғүгғ©гғғгӮ°гҒҜеҲҘгғӯгӮёгғғгӮҜгҒҢеҮҰзҗҶгҖӮгӮ«гғ«гғјгӮ»гғ«еҶ…гҒ§й–Ӣе§ӢгҒ—гҒҹгӮ№гғҜгӮӨгғ—гҒҜгӮҝгғ–з§»еӢ•гҒ—гҒӘгҒ„ */
(function(){
  const TAB_ORDER=["post","home","chat","addfriend","profile"];
  let sx=0, sy=0, tracking=false, inCarousel=false;
  const screen=document.getElementById("screen");
  if(!screen) return;
  screen.addEventListener("touchstart",(e)=>{
    if(!isSignedIn()){ tracking=false; return; } // иӘҚиЁјз”»йқўиЎЁзӨәдёӯгҒҜгӮ№гғҜгӮӨгғ—гҒ§гҒ®гӮҝгғ–з§»еӢ•гӮ’з„ЎеҠ№еҢ–
    if(e.touches.length!==1){ tracking=false; return; }
    if(TAB_ORDER.indexOf(S.view)<0){ tracking=false; return; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; tracking=true;
    // гӮ«гғ«гғјгӮ»гғ«еҶ…гҒ§й–Ӣе§ӢгҒ—гҒҹгҒӢгӮ’иЁҳйҢІ(иӨҮж•°жһҡгҒӘгӮүгғүгғ©гғғгӮ°еҒҙгҒ«е§”гҒӯгӮӢ)
    inCarousel=false;
    const track=e.target.closest&&e.target.closest(".pc-track");
    if(track && track.id && track.id.indexOf("pct_")===0){
      const len=track.children?track.children.length:1;
      if(len>1) inCarousel=true;
    }
  },{passive:true});
  screen.addEventListener("touchend",(e)=>{
    if(!tracking) return; tracking=false;
    // гӮ«гғ«гғјгӮ»гғ«гҒҢгғүгғ©гғғгӮ°гӮ’ж¶ҲиІ»гҒ—гҒҹгҖҒгҒҫгҒҹгҒҜгӮ«гғ«гғјгӮ»гғ«еҶ…й–Ӣе§ӢгҒӘгӮүгӮҝгғ–з§»еӢ•гҒ—гҒӘгҒ„
    if(inCarousel || window.__carDragConsumed) return;
    const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<60 || Math.abs(dx)<Math.abs(dy)*1.6) return;
    const idx=TAB_ORDER.indexOf(S.view); if(idx<0) return;
    let ni = dx<0 ? idx+1 : idx-1;
    if(ni<0||ni>=TAB_ORDER.length) return;
    pendingViewAnim = dx<0 ? "cut-in-right" : "cut-in-left";
    goView(TAB_ORDER[ni]);
  },{passive:true});
})();
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js");
    });
  }
</script>
