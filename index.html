      <button class="mini-btn solid" style="white-space:nowrap" onclick="applyMyCalToAvail(true);drawCalendar();toast(t('toast.calOverwrite'))">${t("s4.cal.reapply")}</button>
    </div>`:``}
    <div class="modebar">
      <button class="${S.dateMode==='single'?'on':''}" onclick="setDateMode('single')">${t("s4.single")}</button>
      <button class="${S.dateMode==='range'?'on':''}" onclick="setDateMode('range')">${t("s4.range")}</button>
    </div>
    ${S.dateMode==='range'?`<p class="hint">${t("s4.range.hint")}</p>`:``}
    <div class="cal-head">
      <button onclick="calMove(-1)">вҖ№</button><div class="cal-title" id="calTitle"></div><button onclick="calMove(1)">вҖә</button>
      <button class="cal-help-btn" onclick="showDateHelp()" aria-label="${t("s4.help.aria")}" title="${t("s4.help.aria")}">?</button>
    </div>
    <div class="cal">
      <div class="dow"><span class="wk">${t("s4.wk")}</span><span>${dowLabel(0)}</span><span>${dowLabel(1)}</span><span>${dowLabel(2)}</span><span>${dowLabel(3)}</span><span>${dowLabel(4)}</span><span>${dowLabel(5)}</span><span>${dowLabel(6)}</span></div>
      <div id="calBody"></div>
    </div>
    <div class="cal-legend2">
      <span class="lg"><b style="color:var(--accent)">в–¶</b>${t("s4.weekBatch")}</span>
      <span class="lg"><span class="sw full"></span>${t("s4.full")}</span>
      <span class="lg"><span class="sw day"></span>${t("s4.dayOnly")}</span>
      <span class="lg"><span class="sw night"></span>${t("s4.nightOnly")}</span>
    </div>
    <div id="dateSummary"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="toast(t('toast.savedAns',{name:meName()}))">${t("s4.saveMine")}</button>
      <button class="btn primary" onclick="S.step=4.5;render()">${t("s4.tally")}</button>
    </div>
  </div>`;
  if(!S.calMonth)S.calMonth=6; drawCalendar();
}
/* в‘Ҙж—ҘзЁӢиӘҝж•ҙгҒ®гғҳгғ«гғ—:ж“ҚдҪңж–№жі•гҒЁгӮ«гғ¬гғігғҖгғјйҖЈжҗәгӮ’иӨҮж•°иЎҢгҒ§иЎЁзӨә */
function showDateHelp(){
  const el=$("#toast"); if(!el)return;
  el.textContent=t("s4.help.cycle")+"\n\n"+t("s4.help.cal");
  el.classList.add("show","help");
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>{ el.classList.remove("show","help"); }, 6000);
}
function setDateMode(m){S.dateMode=m;S.rangeStart=null;render({noscroll:true});}
function calMove(d){S.calMonth+=d;if(S.calMonth>12){S.calMonth=1;S.calYear++;}if(S.calMonth<1){S.calMonth=12;S.calYear--;}drawCalendar();}
function overlapForDate(k){let n=0;S.members.forEach(m=>{if(S.avail[m.id]&&S.avail[m.id][k])n++;});return n;}
/* в‘ўж—ҘзЁӢиӘҝж•ҙгӮ’иЁҳеҗҚеҢ–:гҒқгҒ®ж—ҘгҒ«з©әгҒ„гҒҰгҒ„гӮӢгғЎгғігғҗгғјеҗҚгӮ’иҝ”гҒҷ(гӮ№гғӯгғғгғҲзЁ®еҲҘгӮ’дҪөиЁҳ) */
function availNamesForDate(k){
  const out=[];
  S.members.forEach(m=>{
    const v=S.avail[m.id]&&S.avail[m.id][k];
    if(v){ const slot=(v==="day"?t("s4.dayOnly"):v==="night"?t("s4.nightOnly"):""); out.push({name:m.name, slot}); }
  });
  return out;
}
function heatClass(n){const t=S.members.length||1,r=n/t;if(n===0)return"";if(r<=.25)return"h1";if(r<=.5)return"h2";if(r<=.7)return"h3";if(r<1)return"h4";return"h5";}
function drawCalendar(){
  const y=S.calYear,m=S.calMonth;
  $("#calTitle").textContent=t("date.full",{y,m,mn:monthName(m)});
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const mine=S.avail[S.me]||{};
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  let html="";
  for(let w=0;w<cells.length/7;w++){
    const wk=cells.slice(w*7,w*7+7);
    const validKeys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
    const allSel=validKeys.length>0&&validKeys.every(k=>mine[k]);
    html+=`<div class="calrow"><button class="weekbtn ${allSel?'on':''}" onclick="toggleWeek(${w})" title="${t('x.title.weekToggle')}">в–¶</button>`;
    html+=wk.map(d=>{
      if(!d)return `<div class="cell empty"></div>`;
      const key=ymd(y,m,d),dow=new Date(y,m-1,d).getDay(),hol=HOLIDAYS[key];
      const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);const past=dt<today;
      const n=overlapForDate(key);let cls="cell "+heatClass(n);
      if(dow===0)cls+=" sun";if(dow===6)cls+=" sat";if(hol)cls+=" hol";if(past)cls+=" past";
      if(dt.getTime()===today.getTime())cls+=" today";
      const myv=mine[key];
      if(myv==="full")cls+=" av-full"; else if(myv==="day")cls+=" av-day"; else if(myv==="night")cls+=" av-night"; else if(myv)cls+=" av-full";
      if(S.dateMode==='range'&&S.rangeStart===key)cls+=" rangestart";
      const slot = myv?`<span class="slot">${slotLabel(myv)}</span>`:(n>0?`<span class="mini">${t("people.count",{n})}</span>`:`<span class="mini">&nbsp;</span>`);
      return `<div class="${cls}" ${past?"":`onclick="onDateClick('${key}')"`}>
        <span class="d">${d}</span>${slot}</div>`;
    }).join("");
    html+=`</div>`;
    if(w<cells.length/7-1)html+=`<div style="height:5px"></div>`;
  }
  $("#calBody").innerHTML=html; drawDateSummary();
}
function onDateClick(key){
  const mine=S.avail[S.me]||(S.avail[S.me]={});
  if(S.dateMode==='single'){
    // зөӮж—Ҙ вҶ’ жҳј вҶ’ еӨң вҶ’ гҒӘгҒ— гҒ®е·Ўеӣһ(гғһгӮӨгӮ«гғ¬гғігғҖгғјгҒЁеҗҢгҒҳж“ҚдҪңж„ҹ)
    const cur=mine[key]||null;
    const idx=SLOT_CYCLE.indexOf(cur);
    const next=SLOT_CYCLE[(idx+1)%SLOT_CYCLE.length];
    if(next)mine[key]=next; else delete mine[key];
    drawCalendar(); return;
  }
  // range гҒҜзөӮж—ҘгҒ§еЎ—гӮӢ
  if(!S.rangeStart){ S.rangeStart=key; drawCalendar(); return; }
  if(S.rangeStart===key){ S.rangeStart=null; drawCalendar(); return; }
  let a=S.rangeStart,b=key; if(a>b){const t=a;a=b;b=t;}
  const today=new Date();today.setHours(0,0,0,0);
  let cur=new Date(a);
  const end=new Date(b);
  while(cur<=end){
    const k=ymd(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
    const dd=new Date(k);dd.setHours(0,0,0,0);
    if(dd>=today)mine[k]="full";
    cur.setDate(cur.getDate()+1);
  }
  S.rangeStart=null; drawCalendar();
  toast(t("toast.rangeSel"));
}

function toggleWeek(w){
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const wk=cells.slice(w*7,w*7+7);
  const today=new Date();today.setHours(0,0,0,0);
  const keys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
  const mine=S.avail[S.me]||(S.avail[S.me]={});
  const allSel=keys.length>0&&keys.every(k=>mine[k]);
  keys.forEach(k=>{if(allSel)delete mine[k];else mine[k]="full";});
  drawCalendar();
}

function drawBills(){
  const area=$("#stackArea");if(!area)return;
  const cur=S.budgetVotes[S.me]||{bills:0};
  const n=cur.bills||0;
  if(cur.noWish){
    area.style.height="120px";
    area.innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#16305c;font-size:14px">${t("s5.noWishSel")}</div>`;
    $("#moneyTotal").textContent=t("s5.noWish"); return;
  }
  if(n===0){
    area.style.height="120px";
    area.innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#16305c;font-size:13px">${t("s5.zeroBills")}</div>`;
    $("#moneyTotal").textContent="ВҘ0"; return;
  }
  // жқҹгҒ”гҒЁгҒ«жұәе®ҡзҡ„гҒӘж“¬дјјд№ұж•°(жқҹз•ӘеҸ·гҒӢгӮүе®үе®ҡз”ҹжҲҗ)
  const rnd=(seed)=>{const x=Math.sin(seed*97.13+13.7)*43758.5453;return x-Math.floor(x);};
  const fullBundles=Math.floor(n/10);
  const rem=n%10;
  const denseStep=2.3;     // е®ҢжҲҗжқҹ: жңӯгӮ’еҜҶгҒ«йҮҚгҒӯгӮӢ
  const looseStep=11;      // з«Ҝж•°: гӮҶгҒЈгҒҹгӮҠз©ҚгӮҖ
  const billW=180;         // жңӯгҒ®иЎЁзӨәе№…
  const bandW=13;          // зёҰеёҜе°ҒгҒ®е№…(зҙ°гӮҒ)
  let html="", idx=0;

  // е®ҢжҲҗжқҹгӮ’гҖҢеұұгҒ®гӮҲгҒҶгҒ«гҖҚз©ҚгӮҖ: 1жқҹгҒ”гҒЁгҒ«ж®өгӮ’дёҠгҒ’гҒӨгҒӨгҖҒжЁӘдҪҚзҪ®гҒЁеӣһи»ўгӮ’гғ©гғігғҖгғ гҒ«ж•ЈгӮүгҒҷ
  const risePerBundle=20;  // 1жқҹгҒ”гҒЁгҒ«еұұгҒҢй«ҳгҒҸгҒӘгӮӢйҮҸ
  let maxTop=0;
  for(let bnd=0;bnd<fullBundles;bnd++){
    const base=10 + bnd*risePerBundle;                 // жқҹгҒ”гҒЁгҒ«й«ҳгҒҸ
    const dx=Math.round((rnd(bnd)-0.5)*70);            // жЁӘгҒ«гғ©гғігғҖгғ гҒҡгӮүгҒ—(Вұ35px)
    const rot=(rnd(bnd+100)-0.5)*10;                   // гғ©гғігғҖгғ еӮҫгҒҚ(Вұ5deg)
    for(let j=0;j<10;j++){
      const jit=(j%2===0?-1:1)*0.8;
      const by=base + j*denseStep;
      html+=`<img src="${BILL_IMG}" class="stack-bill" alt="${t('x.alt.bill')}"
        style="bottom:${by}px;width:${billW}px;
        transform:translateX(calc(-50% + ${dx+jit}px)) rotate(${rot}deg);z-index:${10+bnd*12+j}"
        onclick="addBill(-1)">`;
      idx++;
    }
    // зёҰеёҜе°Ғ: жқҹгҒ®дёӯеӨ®гӮ’зёҰгҒ«е·»гҒҸ(жңӯгҒ®й«ҳгҒ•вү’billW*0.466гҖӮзёҰгҒ«е°‘гҒ—гҒҜгҒҝеҮәгҒҷ)
    const billH=billW*0.466;
    const bandH=billH+9*denseStep+6;
    const bandBottom=base-3;
    html+=`<div class="band" style="bottom:${bandBottom}px;width:${bandW}px;height:${bandH}px;
      transform:translateX(calc(-50% + ${dx}px)) rotate(${rot}deg);z-index:${10+bnd*12+11}"
      onclick="addBill(-1)"></div>`;
    maxTop=Math.max(maxTop, base+9*denseStep);
  }
  // з«Ҝж•°(жңӘе®ҢжҲҗжқҹ)гӮ’еұұгҒ®й ӮдёҠд»ҳиҝ‘гҒ«гӮҶгҒЈгҒҹгӮҠз©ҚгӮҖ
  const remBase=fullBundles>0? maxTop+14 : 6;
  for(let j=0;j<rem;j++){
    const jitter=(j%2===0?-4:4);
    const by=remBase + j*looseStep;
    html+=`<img src="${BILL_IMG}" class="stack-bill" alt="${t('x.alt.bill')}"
      style="bottom:${by}px;width:${billW}px;transform:translateX(calc(-50% + ${jitter}px)) rotate(${jitter*0.1}deg);z-index:${500+j}"
      onclick="addBill(-1)">`;
    idx++;
  }
  const topRem = rem>0? (remBase + (rem-1)*looseStep) : maxTop;

function removeFromPlan(i){ S.spotOrder.splice(i,1); render({noscroll:true}); }
function addToPlan(name){ if(!S.spotOrder.includes(name)) S.spotOrder.push(name); render({noscroll:true}); }
function addFreeToPlan(){
  const inp=$("#planAdd");if(!inp)return;
  const v=inp.value.trim();if(!v){return;}
  if(!S.spotOrder.includes(v)) S.spotOrder.push(v);
  render({noscroll:true});
}
function setupDragSort(){
  const list=$("#planList");if(!list)return;
  let dragIdx=null;
  list.querySelectorAll(".plan-item").forEach(item=>{
    item.addEventListener("dragstart",e=>{dragIdx=+item.dataset.idx;item.classList.add("dragging");});
    item.addEventListener("dragend",e=>{item.classList.remove("dragging");list.querySelectorAll(".plan-item").forEach(x=>x.classList.remove("over"));});
    item.addEventListener("dragover",e=>{e.preventDefault();item.classList.add("over");});
    item.addEventListener("dragleave",e=>{item.classList.remove("over");});
    item.addEventListener("drop",e=>{
      e.preventDefault();
      const dropIdx=+item.dataset.idx;
      if(dragIdx==null||dragIdx===dropIdx)return;
      const arr=S.spotOrder;
      const [moved]=arr.splice(dragIdx,1);
      arr.splice(dropIdx,0,moved);
      render({noscroll:true});
    });
  });
}

function blockUser(id){
  const p=findPerson(id); if(!p)return;
  if(!confirm(`${p.name}гӮ’гғ–гғӯгғғгӮҜгҒ—гҒҫгҒҷгҒӢпјҹ\nгғ»гҒҠдә’гҒ„гҒ®гғ•гӮ©гғӯгғјгҒҢеӨ–гӮҢгҒҫгҒҷ\nгғ»жӨңзҙўгӮ„гғЎгғғгӮ»гғјгӮёгҒҢгҒ§гҒҚгҒӘгҒҸгҒӘгӮҠгҒҫгҒҷ\nгғ»гҒ“гӮҢгҒҫгҒ§гҒ®гғҒгғЈгғғгғҲеұҘжӯҙгҒҜж®ӢгӮҠгҒҫгҒҷ`))return;
  p.blocked=true; p.iFollow=false; p.followsMe=false; p.reqIncoming=false; p.reqOutgoing=false;
  if(p.friends){ const i=p.friends.indexOf(ME.id); if(i>=0)p.friends.splice(i,1); }

  renderApp();
}

function pushNotif(n){ if(n.ts==null)n.ts=Date.now(); NOTIFS.unshift(n); }
function openNotif(i){
  const n=NOTIFS[i]; if(!n)return; n.unread=false;
  const t=n.target||{};
  if(t.type==="dm"){ const p=findPerson(t.fid); if(p&&canDM(p)) openDM(t.fid); else { profileBackView='notify'; if(p)openProfile(t.fid); else goView("chat"); } }
  else if(t.type==="room"){ const g=GROUPS.find(x=>x.id===t.gid&&x.joined); if(g) openRoom(t.gid); else { toast(t("x.toast.groupNotFound")); goView("home"); } }
  else if(t.type==="groupchat"){ const g=GROUPS.find(x=>x.id===t.gid&&x.joined); if(g) openGroupChat(t.gid); else { toast(t("x.toast.groupNotFound")); goView("chat"); } }
  else if(t.type==="editprofile"){ goView("editprofile"); }
  else if(t.type==="profile"){ if(t.pid){ profileBackView='notify'; openProfile(t.pid); } else { goView("editprofile"); } }
  else if(t.type==="request"){ profileBackView='notify'; openProfile(t.pid); }
  else if(t.type==="badges"){ goView("profile"); }
  else { goView("home"); }
}

/* гӮ°гғ«гғјгғ—гҒ®йҖІжҚ—гғ©гғҷгғ«гҒЁ% гӮ’ roomState гҒӢгӮүз®—еҮә(йҖЈеӢ•) */
function groupProgress(g){
  const s=g.room.step, st=stepStageOf(s);
  const pct = Math.min(100, Math.round((st-1)/7*100));
  let label="дҪңжҲҗдёӯ", status="plan";
  if(s===0){ label="гҒҫгҒ жә–еӮҷдёӯ"; status="plan"; }
  else if(s===2){ label="гғЎгғігғҗгғјгӮ’жӢӣеҫ…дёӯ"; status="plan"; }
  else if(s<4){ label="гӮ„гӮҠгҒҹгҒ„гҒ“гҒЁгӮ’йӣҶгӮҒгҒҰгҒ„гҒҫгҒҷ"; status="live"; }
  else if(s<5){ label="ж—ҘзЁӢгӮ’иӘҝж•ҙдёӯ"; status="live"; }
  else if(s<5.6){ label="дәҲз®—гӮ’жұәгӮҒгҒҰгҒ„гҒҫгҒҷ"; status="live"; }
  else if(s<6){ label="гӮ№гғқгғғгғҲгӮ’жҠ•зҘЁдёӯ"; status="live"; }
  else if(s<7){ label="жңҖзөӮеҗҲж„ҸгӮ’еҫ…гҒЈгҒҰгҒ„гҒҫгҒҷ"; status="live"; }
  else { label="гғ—гғ©гғізўәе®ҡжёҲгҒҝ"; status="done"; }
  return {pct: s>=7?100:pct, label, status};
}
function stepStageOf(s){
  if(s<=2)return s<=0?1:2;
  if(s<4)return 3; if(s<5)return 5; if(s<5.6)return 6; if(s<6)return 7; return 8;
}
function destLabel(g){
  const r=g.room;
  if(r.destination) return r.destination;
  if(r.step<4) return "жңӘе®ҡпјҲеёҢжңӣеӢҹйӣҶдёӯпјү";
  return "жңӘе®ҡпјҲиӘҝж•ҙдёӯпјү";
}

  }
  goView(v);
}

/* в‘ўжҲ»гӮӢж“ҚдҪң: еүҚз”»йқўгӮ’ж®ӢгҒ—гҒӨгҒӨзҸҫеңЁз”»йқўгҒҢеҸігҒёгҒҜгҒ‘гӮӢж“¬дјјгӮ«гғғгғҲгӮӨгғі */
function goBack(v){ pendingViewAnim="cut-back"; goView(v); }
/* в‘ўиЁӯе®ҡгғ»гҒҠзҹҘгӮүгҒӣзӯүгӮ’й–ӢгҒҸ(йҖІгӮҖ): ж–°гҒ—гҒ„з”»йқўгҒҢеҸігҒӢгӮүгҒӢгҒ¶гҒ•гӮӢ(жҲ»гӮӢгҒ®йҖҶ) */
function goFwd(v){ pendingViewAnim="cut-in-right"; goView(v); }
/* в‘Ј+гғңгӮҝгғігӮ’жҠјгҒҷгҒЁгҖҒгҒқгҒ®дҪҚзҪ®гҒӢгӮүеҶҶгҒҢеәғгҒҢгҒЈгҒҰдҪңжҲҗз”»йқўгҒҢзҸҫгӮҢгӮӢ */
function fabExpand(btn, action){
  if(!btn){ action&&action(); return; }
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  // з”»йқўе…ЁдҪ“гӮ’иҰҶгҒҶгҒ®гҒ«еҝ…иҰҒгҒӘзӣҙеҫ„(иө·зӮ№гҒӢгӮүжңҖйҒ гӮігғјгғҠгғјгҒҫгҒ§гҒ®и·қйӣўГ—2)
  const far=Math.max(
    Math.hypot(cx,cy), Math.hypot(window.innerWidth-cx,cy),
    Math.hypot(cx,window.innerHeight-cy), Math.hypot(window.innerWidth-cx,window.innerHeight-cy)
  );
  const d=far*2+40;
  const ov=document.createElement("div");
  ov.className="fab-reveal";
  ov.style.left=cx+"px"; ov.style.top=cy+"px";
  ov.style.width=d+"px"; ov.style.height=d+"px";
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add("go"));
  // еҶҶгҒҢеәғгҒҢгӮҠгҒҚгӮӢзӣҙеүҚгҒ«з”»йқўйҒ·з§»гҒ—гҖҒгҒқгҒ®еҫҢгӮӘгғјгғҗгғјгғ¬гӮӨгӮ’гғ•гӮ§гғјгғүгҒ§йҷӨеҺ»
  setTimeout(()=>{ action&&action(); }, 230);
  setTimeout(()=>{
    ov.style.transition="opacity .16s ease"; ov.style.opacity="0";
    setTimeout(()=>{ if(ov.parentNode)ov.parentNode.removeChild(ov); },180);
  }, 290);
}
/* в‘ гӮҝгғ–йҒ·з§»гҒ®гӮ«гғғгғҲгӮӨгғігӮўгғӢгғЎгӮ’#screenгҒ«йҒ©з”Ё */
function applyViewAnim(){
  if(!pendingViewAnim) return;
  const sc=$("#screen"); const anim=pendingViewAnim; pendingViewAnim=null;
  if(!sc) return;
  sc.classList.remove("cut-in-right","cut-in-left","cut-back");
  void sc.offsetWidth;
  sc.classList.add(anim);
  setTimeout(()=>{ sc.classList.remove(anim); }, 320);
}
/* гӮ°гғ«гғјгғ—гӮ’й–ӢгҒҸ:гҒқгҒ®гӮ°гғ«гғјгғ—гҒ® roomState гӮ’ S гҒ«еұ•й–Ӣ */
function openRoom(gid){
  commitRoom();
  const g=GROUPS.find(x=>x.id===gid); if(!g)return;
  activeGid=gid;
  Object.assign(S, g.room);
  S.me = S.members.length?S.members[0].id:null;
  S.view="room"; renderApp();
}
/* S гҒ®йҖІиЎҢеҶ…е®№гӮ’зҸҫеңЁгҒ®гӮ°гғ«гғјгғ—гҒёжӣёгҒҚжҲ»гҒҷ */
function commitRoom(){
  if(S.view!=="room") return;   // гғ«гғјгғ з”»йқўд»ҘеӨ–гҒ§гҒҜSгҒҜroomStateгҒ§гҒӘгҒ„гҒ®гҒ§жӣёгҒҚжҲ»гҒ•гҒӘгҒ„
  if(!activeGid)return;
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
  const keys=Object.keys(blankRoom());
  keys.forEach(k=>{ g.room[k]=S[k]; });
  // в‘§ж—…иЎҢж—Ҙд»ҳгҒҜиЁҲз”»гҒ•гӮҢгҒҹж—…иЎҢж—ҘзЁӢгҒ®еҲқж—Ҙ(ISO)гӮ’дҪҝгҒҶгҖӮзўәе®ҡж—ҘзЁӢж–Үеӯ—еҲ—гҒӢгӮүгҒҜеҸ–гӮүгҒӘгҒ„
  const normIso=(key)=>{
    if(key && /^\d{4}-\d{1,2}-\d{1,2}$/.test(key)){
      const m=key.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      return `${m[1]}-${String(+m[2]).padStart(2,"0")}-${String(+m[3]).padStart(2,"0")}`;
    }
    return null;
  };
  const iso0=normIso(S.tripStartKey), iso1=normIso(S.tripEndKey);
  if(iso0){ g.tripDate=iso0; g.tripDateEnd=(iso1&&iso1!==iso0)?iso1:""; } // в‘ЈеҚҳж—ҘгҒӘгӮүзөӮдәҶж—ҘгҒҜз©ә
}
function toggleTheme(){
  S.theme = S.theme==="dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", S.theme);
  renderApp();
}

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      ${NOTIFS.some(n=>n.unread)?'<span class="dot"></span>':''}

function tabbarHTML(){
  if(S.view==="room"||S.view==="groupchat"||S.view==="dm") return "";
  if(S.view==="about"||S.view==="terms"||S.view==="version") return ""; // в‘ӨгҒ“гҒ®гӮўгғ—гғӘгҒ«гҒӨгҒ„гҒҰзі»
  if(S.view==="postcompose") return ""; // в‘ жҠ•зЁҝдҪңжҲҗдёӯ
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  const tone = dark ? "white" : "black";   // йқһйҒёжҠһжҷӮгҒ®иүІ(гғҖгғјгӮҜ=зҷҪ, гғ©гӮӨгғҲ=й»’)
  // з”»еғҸгӮўгӮӨгӮігғігҒ®гӮҝгғ–гҖӮbaseгҒҜTAB_ICONSгҒ®гӮӯгғјжҺҘй ӯиҫһгҖҒvгҒҜviewеҗҚ
  const imgTab=(v,base)=>{
    const on = S.view===v;
    const src = on ? TAB_ICONS[base+"_orange"] : TAB_ICONS[base+"_"+tone];
    let dot="";
    if(v==="chat"){
      const unread = friendsList().some(f=>(DM[f.id]||[]).some(m=>m.unread)) || GROUPS.some(g=>g.joined&&(g.chat||[]).some(c=>c.unread));
      if(unread) dot='<span class="tab-dot"></span>';
    }
    return `<button class="tab ${on?'on':''}" onclick="goTab('${v}')">
      <span class="tab-ic-wrap"><img class="tab-ic" src="${src}" alt="">${dot}</span></button>`;
  };
  // гғ—гғӯгғ•гӮЈгғјгғ«гӮҝгғ–(гғҰгғјгӮ¶гғјз”»еғҸгӮ’дёёгҒҸиЎЁзӨәгҖӮгӮөгӮӨгӮәзөұдёҖ)
  const onP = S.view==="profile";
  const pAv = ME.photo
    ? `<span class="tab-ava img ${onP?'on':''}" style="background-image:url('${ME.photo}')"></span>`
    : `<span class="tab-ava ${onP?'on':''}">${esc(ME.avatar||"рҹҷӮ")}</span>`;
  const profileTab = `<button class="tab ${onP?'on':''}" onclick="goTab('profile')">
      <span class="tab-ic-wrap">${pAv}</span></button>`;
  // в‘ЎдёҰгҒій Ҷ: жҠ•зЁҝ / ж—…иЁҲз”» / гғҒгғЈгғғгғҲ / жӨңзҙў / гғ—гғӯгғ•гӮЈгғјгғ«
  //   жҠ•зЁҝ(post)=еҫ“жқҘгҒ®гғӣгғјгғ гӮўгӮӨгӮігғі, ж—…иЁҲз”»(home)=гғҡгғігӮўгӮӨгӮігғі
  return `<div class="tabbar"><div class="tabwrap">
    ${imgTab('post','home')}
    ${imgTab('home','pen')}
    ${imgTab('chat','msg')}
    ${imgTab('addfriend','search')}
    ${profileTab}
  </div></div>`;
}

/* в‘Өж—…гҒ®дёҰгҒій ҶгӮ’жұәгӮҒгӮӢгғҳгғ«гғ‘гғјзҫӨ */
function tripHasUnread(g){ return (g.chat||[]).some(c=>c.unread); }
// еӣһзӯ”жңҹйҷҗ(гӮҝгӮӨгғ гӮ№гӮҝгғігғ—)гҖӮpollDeadlineгҒҢз„ЎгҒ„/еҗҲж„ҸжёҲгҒҝгҒҜжңҹйҷҗгҒӘгҒ—жүұгҒ„
function tripDeadlineTs(g){
  if(g.pollDeadlineTs!=null) return g.pollDeadlineTs;
  return null;
}
// дҪңжҲҗж—ҘжҷӮгҖӮcreatedAtгҒҢз„ЎгҒ‘гӮҢгҒ°0(=жңҖгӮӮеҸӨгҒ„жүұгҒ„)
function tripCreatedTs(g){ return g.createdAt!=null ? g.createdAt : 0; }
function sortHomeTrips(a,b){
  // гҒҫгҒҡгғ”гғіз•ҷгӮҒ
  const pin=(b.pinned?1:0)-(a.pinned?1:0); if(pin) return pin;
  // гҒӨгҒҺгҒ«жңӘиӘӯгғҒгғЈгғғгғҲгҒ®жңүз„Ў
  const un=(tripHasUnread(b)?1:0)-(tripHasUnread(a)?1:0); if(un) return un;
  // гҒ•гӮүгҒ«еӣһзӯ”жңҹйҷҗгҒҢиҝ‘гҒ„гӮӮгҒ®(жңҹйҷҗгҒӮгӮҠгҒҢе…Ҳгғ»иҝ‘гҒ„й Ҷ)
  const da=tripDeadlineTs(a), db=tripDeadlineTs(b);
  if(da!=null && db!=null){ if(da!==db) return da-db; }
  else if(da!=null){ return -1; }
  else if(db!=null){ return 1; }
  // жңҖеҫҢгҒ«дҪңжҲҗж—ҘжҷӮгҒҢж–°гҒ—гҒ„гӮӮгҒ®
  return tripCreatedTs(b)-tripCreatedTs(a);
}

/* ---- гғӣгғјгғ :ж—…гӮ°гғ«гғјгғ—гҒ®гғ•гӮЈгғјгғү ---- */
/* в‘ЎжҠ•зЁҝгӮҝгғ–(жһ гҒ®гҒҝгғ»дёӯиә«гҒҜд»ҠеҫҢFirebaseгҒ§е®ҹиЈ…) */
function screenPost(){
  const cards = POSTS.slice().sort((a,b)=>b.ts-a.ts).map(postCardHTML).join("");
  const body = POSTS.length ? cards : `<div class="feed-empty"><div class="ic">рҹ“ё</div>${t("post.empty")}<br>${t("post.empty.sub")}</div>`;
  return `<div class="feed post-feed">
    <div class="feed-h" style="padding:14px 14px 8px"><h2>${t("post.title")}</h2></div>
    ${body}
  </div>
  <button class="fab" onclick="fabExpand(this,openPostCompose)" aria-label="${t('post.new')}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>`;
}
/* в‘ жҠ•зЁҝгӮ«гғјгғү(з”»еғҸгҒҜгӮ«гғ«гғјгӮ»гғ«) */
/* в‘ в‘Ўв‘ўв‘ЈжҠ•зЁҝгӮ«гғјгғү */
function postCardHTML(p){
  const hasImg=p.images&&p.images.length;
  const cmtCount=(p.comments||[]).length;
  const open=postCommentsOpen[p.id];
  const shownComments=open?(p.comments||[]):(p.comments||[]).slice(0,1);
  const commentsHTML=`<div class="post-comments">
    ${shownComments.map(c=>commentHTML(p,c)).join("")}
    ${(!open&&cmtCount>1)?`<div class="cmt-more" onclick="event.stopPropagation();togglePostComments('${p.id}')">${t("post.viewAllComments",{n:cmtCount})}</div>`:''}
    ${open&&cmtCount>1?`<div class="cmt-more" onclick="event.stopPropagation();togglePostComments('${p.id}')">${t("post.hideComments")}</div>`:''}
  </div>`;

/* в‘ўз”»еғҸгғҖгғ–гғ«гӮҝгғғгғ—: гҒ„гҒ„гҒӯгӮ’д»ҳгҒ‘гҖҒдёӯеӨ®гҒ«гғҸгғјгғҲгӮ’йЈӣгҒ°гҒҷ */
function likeBurst(id){
  const p=POSTS.find(x=>x.id===id); if(!p)return;
  const wasLiked=p.likedByMe;
  if(!wasLiked){
    if(!isSignedIn()){ toast(t("x.auth.noConn")); return; }
    p.likedByMe=true; p.likeCount=(p.likeCount||0)+1; if(!p.mine) pushPostNotif("like",p);
  }
  const card=document.querySelector(`.post-card[data-pid="${id}"]`);
  const wrap=card?card.querySelector(".post-carousel.full"):null;
  if(wrap){
    const h=document.createElement("div"); h.className="like-burst";
    h.innerHTML=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="mb_${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD23F"/><stop offset="45%" stop-color="#FFA62B"/><stop offset="100%" stop-color="#EC6800"/></linearGradient></defs><path fill="url(#mb_${id})" d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`;
    wrap.appendChild(h); requestAnimationFrame(()=>h.classList.add("go"));
    setTimeout(()=>{ if(h.parentNode)h.parentNode.removeChild(h); },800);
  }
  // гҒ„гҒ„гҒӯгғңгӮҝгғігҒ®иҰӢгҒҹзӣ®гҒ гҒ‘йғЁеҲҶжӣҙж–°
  if(card && !wasLiked){
    const btn=card.querySelector(".pa-btn");
    if(btn){ btn.classList.add("liked"); const svg=btn.querySelector("svg"); if(svg)svg.setAttribute("fill",`url(#mh_${id})`);
      btn.classList.remove("just-liked"); void btn.offsetWidth; btn.classList.add("just-liked"); spawnFloatHeart(btn); }
    const likesEl=card.querySelector(".pa-likes");
    if(likesEl && p.mine) likesEl.textContent=t("post.likeCount",{n:p.likeCount||0});
  }
  // иҰӢгҒҹзӣ®гҒҜеҚіеә§гҒ«еҸҚжҳ гҒ—гҖҒиЈҸгҒ§SupabaseгҒёдҝқеӯҳгҖӮеӨұж•—гҒ—гҒҹгӮүзҠ¶ж…ӢгӮ’жҲ»гҒҷ
  if(!wasLiked){
    (async()=>{
      const ok = await addLikeToSupabase(id);
      if(!ok){
        p.likedByMe=false; p.likeCount=Math.max(0,(p.likeCount||0)-1);
        toast(t("x.auth.noConn"));
        rerenderPost();
      }
    })();
  }
}
/* в‘ гҒ„гҒ„гҒӯгғңгӮҝгғігҒ®д»ҳиҝ‘гҒӢгӮүгғҸгғјгғҲгҒҢгҒөгӮҸгҒЈгҒЁз«ӢгҒЎдёҠгӮӢ */
function spawnFloatHeart(btn){
  if(!btn) return;

  btn.appendChild(h);
  requestAnimationFrame(()=>h.classList.add("go"));
  setTimeout(()=>{ if(h.parentNode)h.parentNode.removeChild(h); },950);
}
function togglePostLike(id){
  const p=POSTS.find(x=>x.id===id); if(!p)return;
  if(!isSignedIn()){ toast(t("x.auth.noConn")); return; }
  const wasLiked=p.likedByMe;
  if(wasLiked){ p.likedByMe=false; p.likeCount=Math.max(0,(p.likeCount||0)-1); }
  else { p.likedByMe=true; p.likeCount=(p.likeCount||0)+1; if(!p.mine) pushPostNotif("like",p); }
  // жҠјгҒ—гҒҹжҠ•зЁҝгҒ®гғңгӮҝгғігҒ гҒ‘йғЁеҲҶжӣҙж–°(е…ЁдҪ“еҶҚжҸҸз”»гҒ—гҒӘгҒ„гҒ®гҒ§гӮўгғӢгғЎгҒҢд»–гҒ«жіўеҸҠгҒ—гҒӘгҒ„)
  const card=document.querySelector(`.post-card[data-pid="${id}"]`);
  if(card){
    const btn=card.querySelector(".pa-btn");
    if(btn){
      btn.classList.toggle("liked",p.likedByMe);
      const svg=btn.querySelector("svg");
      if(svg) svg.setAttribute("fill", p.likedByMe?`url(#mh_${id})`:"none");
      if(p.likedByMe && !wasLiked){
        btn.classList.remove("just-liked"); void btn.offsetWidth; btn.classList.add("just-liked");
        spawnFloatHeart(btn);
      }
    }
    // иҮӘеҲҶгҒ®жҠ•зЁҝгҒ®гҒ„гҒ„гҒӯж•°иЎЁзӨәгӮ’жӣҙж–°
    const likesEl=card.querySelector(".pa-likes");
    if(likesEl && p.mine) likesEl.textContent=t("post.likeCount",{n:p.likeCount||0});
  } else {
    rerenderPost();
  }
  // иҰӢгҒҹзӣ®гҒҜеҚіеә§гҒ«еҸҚжҳ гҒ—гҖҒиЈҸгҒ§SupabaseгҒёдҝқеӯҳгҖӮеӨұж•—гҒ—гҒҹгӮүзҠ¶ж…ӢгӮ’жҲ»гҒҷ
  (async()=>{
    const ok = wasLiked ? await removeLikeFromSupabase(id) : await addLikeToSupabase(id);
    if(!ok){
      p.likedByMe = wasLiked;
      p.likeCount = wasLiked ? (p.likeCount||0)+1 : Math.max(0,(p.likeCount||0)-1);
      toast(t("x.auth.noConn"));
      rerenderPost();
    }
  })();
}

/* в‘ гӮ«гғ«гғјгӮ»гғ«гҒ®гӮ№гғ©гӮӨгғүз§»еӢ• */
const carouselPos={};
function carouselMove(id,dir,len){
  const cur=(carouselPos[id]||0)+dir;
  const idx=Math.max(0,Math.min(len-1,cur));
  carouselPos[id]=idx;
  const track=document.getElementById("pct_"+id);
  if(track) track.style.transform=`translateX(-${idx*100}%)`;
  const dots=document.getElementById("pcd_"+id);
  if(dots){ [...dots.children].forEach((d,i)=>d.classList.toggle("on",i===idx)); }
}
/* в‘ жЁӘгӮ«гғ«гғјгӮ»гғ«гӮ’жҢҮиҝҪеҫ“гғүгғ©гғғгӮ°гҒ«(зҹўеҚ°гӮҜгғӘгғғгӮҜгҒҜеҲҘйҖ”ж®ӢгҒҷ)гҖӮе§”иӯІгҒ§1еәҰгҒ гҒ‘иЁӯзҪ® */
window.__carDragConsumed=false;
(function(){
  let drag=null;
  function findTrack(el){
    const t=el&&el.closest&&el.closest(".pc-track");
    return (t&&t.id&&t.id.indexOf("pct_")===0)?t:null;
  }
  function start(clientX,clientY,target){
    const track=findTrack(target); if(!track) return;
    const len=track.children?track.children.length:1; if(len<=1) return;
    const id=track.id.slice(4);
    drag={ id, track, len, pos:(carouselPos[id]||0), w:track.getBoundingClientRect().width||1,
      sx:clientX, sy:clientY, dx:0, dy:0, locked:null };
  }
  function move(clientX,clientY,ev){
    if(!drag) return;
    drag.dx=clientX-drag.sx; drag.dy=clientY-drag.sy;
    if(drag.locked===null){
      if(Math.abs(drag.dx)>6||Math.abs(drag.dy)>6) drag.locked = Math.abs(drag.dx)>Math.abs(drag.dy) ? "x" : "y";
    }
    if(drag.locked!=="x") return;
    if(ev&&ev.cancelable) ev.preventDefault();
    drag.track.classList.add("dragging");
    // з«ҜгҒ§гҒ®жҠөжҠ—(гӮҙгғ ж„ҹ)
    let move=drag.dx;
    const atStart=drag.pos===0, atEnd=drag.pos===drag.len-1;
    if((atStart&&move>0)||(atEnd&&move<0)) move*=0.35;
    const base=-drag.pos*drag.w;
    drag.track.style.transform=`translateX(${base+move}px)`;
  }
  function end(){
    if(!drag) return;
    const d=drag; drag=null;
    d.track.classList.remove("dragging");
    if(d.locked==="x"){
      window.__carDragConsumed=true;
      setTimeout(()=>{ window.__carDragConsumed=false; },50);
      const ratio=d.dx/d.w;
      let next=d.pos;
      if(ratio<=-0.18) next=Math.min(d.len-1,d.pos+1);
      else if(ratio>=0.18) next=Math.max(0,d.pos-1);
      carouselPos[d.id]=next;
      d.track.style.transform=`translateX(-${next*100}%)`;
      const dots=document.getElementById("pcd_"+d.id);
      if(dots){ [...dots.children].forEach((el,i)=>el.classList.toggle("on",i===next)); }
    }else{
      d.track.style.transform=`translateX(-${d.pos*100}%)`;
    }
  }
  document.addEventListener("touchstart",(e)=>{
    if(e.touches.length!==1) return;
    start(e.touches[0].clientX,e.touches[0].clientY,e.target);
  },{passive:true});
  document.addEventListener("touchmove",(e)=>{
    if(!drag) return;
    move(e.touches[0].clientX,e.touches[0].clientY,e);
  },{passive:false});
  document.addEventListener("touchend",()=>end(),{passive:true});
  // гғһгӮҰгӮ№гғүгғ©гғғгӮ°(PCгҒ§гҒ®зўәиӘҚз”Ё)
  document.addEventListener("mousedown",(e)=>{ if(e.button!==0)return; start(e.clientX,e.clientY,e.target); });
  document.addEventListener("mousemove",(e)=>{ if(drag) move(e.clientX,e.clientY,e); });
  document.addEventListener("mouseup",()=>end());
})();
/* в‘Јз”»еғҸдёӢйғЁгҒ®ијқеәҰгӮ’жё¬гӮҠгҖҒжҳҺгӮӢгҒ‘гӮҢгҒ°ж–Үеӯ—гӮ’й»’гҒ«еҲҮгӮҠжӣҝгҒҲгӮӢ(гӮ°гғ©гғҮгҒЁдҪөз”Ё) */
function applyPostImageLuminance(){
  POSTS.forEach(p=>{
    if(!(p.images&&p.images.length))return;
    const ov=document.querySelector(`.post-card[data-pid="${p.id}"] .pc-overlay`);
    if(!ov)return;
    const im=new Image();
    im.onload=()=>{
      try{
        const cv=document.createElement("canvas"); const w=cv.width=24, h=cv.height=24;
        const ctx=cv.getContext("2d");
        ctx.drawImage(im,0,Math.floor(im.naturalHeight*0.5),im.naturalWidth,Math.ceil(im.naturalHeight*0.5),0,0,w,h);
        const d=ctx.getImageData(0,0,w,h).data; let sum=0,n=0;
        for(let i=0;i<d.length;i+=4){ sum+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; n++; }
        const lum=sum/n;
        if(lum>165){ ov.classList.add("on-light"); ov.classList.remove("on-dark"); }
        else { ov.classList.add("on-dark"); ov.classList.remove("on-light"); }
      }catch(e){}
    };
    im.src=p.images[0];
  });
}

    <div class="pcmp-count"><span id="postCount">${postDraft.text.length}</span>/${POST_MAX_CHARS}</div>
    <div class="pcmp-imgs">
      ${imgs}
      ${canAddImg?`<button class="pcmp-add" onclick="document.getElementById('postImgInput').click()">пјӢ<span>${t("post.addImg")}</span></button>`:''}
    </div>
    <div class="pcmp-hint">${t("post.imgHint",{n:POST_MAX_IMAGES})}</div>
    <input type="file" id="postImgInput" accept="image/*" multiple style="display:none" onchange="onPostImagePick(event)">
  </div>`;
}
function onPostTextInput(){
  const ta=document.getElementById("postText"); if(!ta)return;
  postDraft.text=ta.value;
  const c=document.getElementById("postCount"); if(c)c.textContent=ta.value.length;
}
function onPostImagePick(e){
  const files=[...(e.target.files||[])];
  if(!files.length)return;
  const room=POST_MAX_IMAGES-postDraft.images.length;
  const take=files.slice(0,room);
  let loaded=0;
  take.forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{
      postDraft.images.push(r.result);
      loaded++;
      if(loaded===take.length){
        // в‘ 1жһҡзӣ®гҒ®жҜ”зҺҮгӮ’е…Ёз”»еғҸгҒ«йҒ©з”ЁгҒҷгӮӢгҒҹгӮҒгҖҒ1жһҡзӣ®гҒ®зёҰжЁӘжҜ”гӮ’жё¬гӮӢ
        if(postDraft.images.length && !postDraft._ratioSet){
          const im=new Image();
          im.onload=()=>{
            postDraft.ratio = ratioString(im.naturalWidth, im.naturalHeight);
            postDraft._ratioSet=true;
            if(S.view==="postcompose") renderApp();
          };
          im.src=postDraft.images[0];
        } else {
          if(S.view==="postcompose") renderApp();
        }
      }
    };
    r.readAsDataURL(f);
  });
  e.target.value="";
}
/* в‘ 1жһҡзӣ®гҒ®жҜ”зҺҮгӮ’гҖҒиҝ‘гҒ„е®ҡз•ӘжҜ”зҺҮ(1/1, 4/5, 3/4, 16/9)гҒ«дёёгӮҒгӮӢ */
function ratioString(w,h){
  const r=w/h;
  const cand=[["1/1",1],["4/5",0.8],["3/4",0.75],["16/9",1.777],["9/16",0.5625]];
  let best=cand[0], diff=Infinity;
  cand.forEach(c=>{ const d=Math.abs(r-c[1]); if(d<diff){diff=d;best=c;} });
  return best[0];
}
function removePostImage(i){
  postDraft.images.splice(i,1);
  if(!postDraft.images.length){ postDraft._ratioSet=false; postDraft.ratio="1/1"; }
  if(S.view==="postcompose") renderApp();
}
async function submitPost(){
  const text=(postDraft.text||"").trim();
  const hasImg=postDraft.images.length>0;
  if(!text && !hasImg){ toast(t("post.empty.warn")); return; }
  // в‘ўж–Үз« гҒ®гҒҝгғ»еҶҷзңҹд»ҳгҒҚгӮ’е•ҸгӮҸгҒҡ1ж—Ҙ1еӣһгҒҫгҒ§
  const today=new Date().toDateString();
  if(postDayCount.day!==today){ postDayCount={day:today,count:0}; }
  if(postDayCount.count>=POST_DAILY_LIMIT){
    toast(t("post.onceADay")); return;
  }
  if(!isSignedIn()){ toast(t("x.auth.noConn")); return; }
  // зҸҫж®өйҡҺгҒҜж–Үз« гҒ®гҒҝе…ұжңү(з”»еғҸгҒҜж°ёз¶ҡеҢ–гҒ—гҒӘгҒ„)
  const ok = await savePostToSupabase(text.slice(0,POST_MAX_CHARS));
  if(!ok) return;
  postDayCount.count++;
  postDraft={ text:"", images:[], ratio:"1/1" };
  toast(t("post.done"));
  await loadPosts();
  goView("post");
}
function screenHome(){
  const all = GROUPS.filter(g=>g.joined);
  if(!all.length){
    return `<div class="feed">
      <div class="feed-h"><h2>${t("home.title")}</h2></div>
      <div class="feed-empty"><div class="ic">рҹ§і</div>${t("home.empty")}<br>${t("home.empty.sub")}</div>
    </div>
    <button class="fab" onclick="fabExpand(this,startNewTrip)" aria-label="${t('x.aria.newTrip')}">

    </button>`;
  }
  // гӮўгӮҜгғҶгӮЈгғ–(гғ”гғіе„Әе…Ҳ)гҒЁгӮўгғјгӮ«гӮӨгғ–гҒ«еҲҶйӣў
  // в‘ӨдёҰгҒій Ҷ:гғ”гғіз•ҷгӮҒжңҖе„Әе…Ҳ вҶ’ жңӘиӘӯгғҒгғЈгғғгғҲгҒӮгӮҠ вҶ’ еӣһзӯ”жңҹйҷҗгҒҢиҝ‘гҒ„ вҶ’ дҪңжҲҗж—ҘжҷӮгҒҢж–°гҒ—гҒ„
  const active = all.filter(g=>!g.archived).sort(sortHomeTrips);
  const archived = all.filter(g=>g.archived);
  const mine = active;
  // в‘ЎгӮ«гғјгғүзёҰе№…гғўгғјгғү: 0=1еҖҚ(е…ЁйғЁиЎЁзӨә) 1=2/3еҖҚ(з”»еғҸзё®е°Ҹгғ»гғЎгғігғҗгғјзңҒз•Ҙ) 2=1/3еҖҚ(з”»еғҸзңҒз•Ҙгғ»гӮігғігғ‘гӮҜгғҲ)
  if(S.cardSize==null) S.cardSize=0;
  const sz=S.cardSize;
  const sizeClass=sz===1?"s-mid":sz===2?"s-min":"";
  const makeCard = (g)=>{
    const pr=groupProgress(g);
    const done = pr.pct>=100;
    const stB = pr.status==="live"?`<span class="st-badge live">${t("card.live")}</span>`
      : pr.status==="done"?`<span class="st-badge done">${t("card.done")}</span>`
      : `<span class="st-badge">${t("card.prep")}</span>`;
    const cover = g.img ? `background-image:url('${g.img}')` : `background-image:${g.cover}`;
    const mem=g.room.members||[];
    const ava = mem.slice(0,5).map(m=>`<span>${esc((m.name||"?").slice(0,1))}</span>`).join("")
      + (mem.length>5?`<span>+${mem.length-5}</span>`:"");
    const unread=(g.chat||[]).some(c=>c.unread);
    const pinBtn=`<button class="card-pin ${g.pinned?'on':''}" onclick="event.stopPropagation();togglePin('${g.id}')" aria-label="${g.pinned?t('pin.remove'):t('pin.add')}" title="${g.pinned?t('pin.remove'):t('pin.add')}"><img src="${UI_IMG.pin_white}" class="pin-ic" alt=""></button>`;
    // в‘ӨжңҖе°ҸгӮ«гғјгғүз”Ё: и–„иғҢжҷҜгҒӘгҒ®гҒ§йқһйҒёжҠһжҷӮгҒҜй»’гғ”гғігҖҒйҒёжҠһжҷӮ(гӮўгӮҜгӮ»гғігғҲиғҢжҷҜ)гҒҜзҷҪгғ”гғі
    // в‘ҘжңҖе°ҸгӮ«гғјгғүгҒ®гғ”гғіз”»еғҸ: гғҶгғјгғһ(гғ©гӮӨгғҲ/гғҖгғјгӮҜ/monoгӮўгӮҜгӮ»гғігғҲ)гҒЁonзҠ¶ж…ӢгҒ§иҰӢгҒҲгӮӢиүІгҒ«
    const isDark=S.theme==="dark", isMono=S.accent==="mono";
    let pinImg;
    if(g.pinned){ pinImg=(isDark&&isMono)?UI_IMG.pin_black:UI_IMG.pin_white; }
    else { pinImg=isDark?UI_IMG.pin_white:UI_IMG.pin_black; }
    const pinBtnMin=`<button class="card-pin ${g.pinned?'on':''}" onclick="event.stopPropagation();togglePin('${g.id}')" aria-label="${g.pinned?t('pin.remove'):t('pin.add')}" title="${g.pinned?t('pin.remove'):t('pin.add')}"><img src="${pinImg}" class="pin-ic" alt=""></button>`;
    const newBadge=unread?`<span class="st-badge" style="background:var(--sun);color:#fff">рҹ’¬ ${t("card.new")}</span>`:'';
    // в‘Ў1/3еҖҚ: з”»еғҸгҒӘгҒ—гҒ®гӮігғігғ‘гӮҜгғҲиЎҢгҖӮйҖІжҚ—100%гҒҜгғҗгғјгӮ’еҮәгҒ•гҒҡвң“гӮ’иЎЁзӨә
    if(sz===2){
      return `<div class="gcard s-min" onclick="openRoom('${g.id}')">
        <div class="min-row">
          <div class="min-main">
            <div class="min-title">${esc(g.name)}</div>
            <div class="min-sub">рҹ“Қ ${esc(destLabel(g))}${tripDateLabel(g)?` гғ» ${tripDateLabel(g)}`:''}</div>
          </div>
          ${done?`<span class="min-done">рҹҺ’ ${esc(countdownLabel(g)||"вң“")}</span>`:`<span class="min-pct">${pr.pct}%</span>`}
          ${pinBtnMin}
        </div>
        ${done?``:`<div class="min-bar"><i style="width:${pr.pct}%"></i></div>`}
      </div>`;
    }
    // в‘Ў2/3еҖҚ: з”»еғҸгҒҜи–„гӮҒгғ»дҪҺгӮҒгҒ§ж®ӢгҒ—гҒӨгҒӨгғЎгғігғҗгғјгӮ’зңҒз•Ҙ
    // в‘Ў1еҖҚ: гғ•гғ«иЎЁзӨәгҖӮгҒҹгҒ гҒ—йҖІжҚ—100%гҒҜгҖҢйҖІжҚ—гғҗгғјгӮ’зңҒз•ҘгҒ—гҒҰз”»еғҸгӮ’иЎЁзӨәгҖҚ
    return `<div class="gcard ${sizeClass}" onclick="openRoom('${g.id}')">
      <div class="cover" style="${cover}">
        <div class="badge-row">${stB}${newBadge}${pinBtn}</div>
        <div class="ttl"><div class="nm">${esc(g.name)}</div><div class="dest">рҹ“Қ ${esc(destLabel(g))}${tripDateLabel(g)?` гғ» ${tripDateLabel(g)}`:''}</div></div>
      </div>
      ${(done && sz===0)?`<div class="body"><div class="countdown-row">рҹҺ’ ${esc(countdownLabel(g)||t("card.done"))}</div></div>` : `<div class="body">
        ${sz===0?`<div class="meta">
          <div class="ava">${ava}</div>
          <span>${t("people.count",{n:mem.length})}</span>
          <span style="flex:1"></span>
          <span>${esc((g.chat&&g.chat.length)?g.chat[g.chat.length-1].ago:"")}</span>
        </div>`:``}
        ${done?`<div class="countdown-row">рҹҺ’ ${esc(countdownLabel(g)||t("card.done"))}</div>`:`<div class="progress">
          <div class="bar"><i style="width:${pr.pct}%"></i></div>
          <div class="cap"><span>${esc(pr.label)}</span><b>${pr.pct}%</b></div>
        </div>`}
      </div>`}
    </div>`;
  };
  // в‘ЈиЁҲз”»дёӯ(йҖІжҚ—100%жңӘжәҖ)гҒЁзўәе®ҡжёҲ(100%)гҒ«еҲҶгҒ‘гӮӢгҖӮдёҰгҒій ҶгҒҜж—ўеӯҳгҒ®sortHomeTripsгӮ’з¶ӯжҢҒ
  const planning = mine.filter(g=>groupProgress(g).pct<100);
  const confirmed = mine.filter(g=>groupProgress(g).pct>=100);
  const planCards = planning.map(makeCard).join("");
  const confirmedCards = confirmed.map(makeCard).join("");
  const archCards = archived.map(g=>{
    const pr=groupProgress(g);
    const cover = g.img ? `background-image:url('${g.img}')` : `background-image:${g.cover}`;
    return `<div class="gcard" style="opacity:.85" onclick="openRoom('${g.id}')">
      <div class="cover" style="${cover};height:96px">
        <div class="badge-row"><span class="st-badge">${t('x.home.archive')}</span></div>
        <div class="ttl"><div class="nm" style="font-size:16px">${esc(g.name)}</div>${tripDateLabel(g)?`<div class="dest">${tripDateLabel(g)}</div>`:''}</div>
      </div>
      <div class="body" style="padding:10px 15px">

    ${planning.length?`<div class="trip-sect-h">${t("home.sect.planning",{n:planning.length})}</div>${planCards}`:""}
    ${confirmed.length?`<div class="trip-sect-h">${t("home.sect.confirmed",{n:confirmed.length})}</div>${confirmedCards}`:""}
    ${archived.length?`<div class="trip-sect-h">${t("home.sect.archived",{n:archived.length})}</div>${archCards}`:""}
  </div>
  <button class="fab" onclick="fabExpand(this,startNewTrip)" aria-label="${t('home.newTrip')}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>`;
}
/* в‘ЎгӮ«гғјгғүзёҰе№…гӮ’ 1еҖҚвҶ’2/3вҶ’1/3 гҒЁеҫӘз’°(гғӣгғјгғ йғЁеҲҶгҒ®гҒҝеҶҚжҸҸз”»гҒ—гҖҒдҪңжҲҗз”»йқўгӮ’жҢҹгҒҫгҒӘгҒ„гғ»гӮ№гӮҜгғӯгғјгғ«з¶ӯжҢҒ) */

function screenNotify(){
  // еұҠгҒ„гҒҰгҒ„гӮӢгғ•гӮ©гғӯгғјгғӘгӮҜгӮЁгӮ№гғҲ(зӣёжүӢвҶ’иҮӘеҲҶ)
  const reqs=PEOPLE.filter(p=>p.reqIncoming);
  const reqHtml = reqs.length ? `
    <h3 class="sub" style="margin:6px 4px 8px">${t('x.notif.followReq')}</h3>
    ${reqs.map(p=>`<div class="listcard">
      <div class="lic" style="${avatarStyle(p)};background:${p.photo?'transparent':'var(--chip)'}" onclick="profileBackView='notify';openProfile('${p.id}')">${avatarInner(p)}</div>
      <div class="lt" onclick="profileBackView='notify';openProfile('${p.id}')" style="cursor:pointer"><div class="a">${esc(p.name)}</div><div class="b">${t('x.notif.wantsFollow')}</div></div>
      <div style="display:flex;gap:6px">
        <button class="mini-btn solid" onclick="acceptRequest('${p.id}')">${t('x.common.approve')}</button>
        <button class="mini-btn danger" onclick="declineRequest('${p.id}')">${t('x.common.delete')}</button>
      </div>
    </div>`).join("")}
    <h3 class="sub" style="margin:18px 4px 8px">${t('x.notif.all')}</h3>` : "";

  // в‘ўжҷӮзі»еҲ—гҒ§иҰӢеҮәгҒ—гӮ’еҲҶгҒ‘гӮӢгҖӮеўғз•ҢгҒҜд»Ҡж—Ҙ/жҳЁж—Ҙ/йҒҺеҺ»7ж—Ҙй–“/йҒҺеҺ»30ж—Ҙй–“/гӮӮгҒЈгҒЁеүҚ
  const now=Date.now();
  const startToday=new Date(); startToday.setHours(0,0,0,0); const t0=startToday.getTime();
  const t1=t0-86400000;            // жҳЁж—ҘгҒ®0жҷӮ
  const t7=t0-7*86400000;          // 7ж—ҘеүҚ(=д»Ҡж—Ҙеҗ«гӮҒзӣҙиҝ‘гҖҒ8ж—ҘеүҚгҒӢгӮүгҒҜжҠҳгӮҠгҒҹгҒҹгҒҝеҜҫиұЎ)
  const t30=t0-30*86400000;        // 30ж—ҘеүҚ
  const buckets=[
    {key:"today", label:"д»Ҡж—Ҙ", from:t0, to:Infinity, fold:false},
    {key:"yesterday", label:"жҳЁж—Ҙ", from:t1, to:t0, fold:false},
    {key:"week", label:"йҒҺеҺ»7ж—Ҙй–“", from:t7, to:t1, fold:false},
    {key:"month", label:"йҒҺеҺ»30ж—Ҙй–“", from:t30, to:t7, fold:true},
    {key:"older", label:"гӮӮгҒЈгҒЁеүҚ", from:-Infinity, to:t30, fold:true},
  ];
  const card=(n,i)=>`<div class="listcard" onclick="openNotif(${i})">
      <div class="lic">${n.ic}</div>
      <div class="lt"><div class="a">${esc(n.a)}</div><div class="b">${esc(n.b)}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="when">${esc(n.when)}</div>
        ${n.unread?'<div class="notif-dot"></div>':''}
      </div>
    </div>`;
  // tsгҒ®з„ЎгҒ„еҸӨгҒ„гғҮгғјгӮҝгҒҜд»Ҡж—ҘжүұгҒ„
  const withIdx=NOTIFS.map((n,i)=>({n,i,ts:(n.ts!=null?n.ts:now)}));
  let foldHasItems=false;
  const sections=buckets.map(bk=>{
    const items=withIdx.filter(x=>x.ts>=bk.from && x.ts<bk.to);
    if(!items.length) return "";
    if(bk.fold) foldHasItems=true;
    const hidden = bk.fold && !notifShowMore;
    const body = items.map(x=>card(x.n,x.i)).join("");
    return `<div class="notif-sec ${hidden?'is-hidden':''}">
      <h3 class="sub" style="margin:16px 4px 8px">${bk.label}</h3>${body}</div>`;
  }).join("");
  const moreBtn = (foldHasItems && !notifShowMore)

   йҖҡеёёгҒҜзҷҪж–Үеӯ—гҒӘгҒ®гҒ§зҷҪйҚөгҖҒгғўгғҺгӮҜгғӯГ—гғҖгғјгӮҜгҒ®гҒЁгҒҚгҒ гҒ‘й»’ж–Үеӯ—гҒӘгҒ®гҒ§й»’йҚөгҒ«гҒҷгӮӢгҖӮ */
function lockIcOnAccent(){

/* в‘ЎгғӯгӮҙз”»еғҸ:гӮўгӮҜгӮ»гғігғҲгҒҢгӮӘгғ¬гғігӮёгҒ®гҒЁгҒҚгҒҜгӮӘгғ¬гғігӮёзүҲгҖҒгҒқгӮҢд»ҘеӨ–гҒҜгғҶгғјгғһгҒ«еҝңгҒҳй»’/зҷҪзүҲ */
/* в‘ зҸҫеңЁең°гғ”гғігҒ®иүІ:гғҖгғјгӮҜгҒҜзҷҪгӮўгӮҜгӮ»гғігғҲгҒӘгӮүзҷҪгғ»д»–гҒҜиөӨгҖҒгғ©гӮӨгғҲгҒҜй»’гӮўгӮҜгӮ»гғігғҲгҒӘгӮүй»’гғ»д»–гҒҜиөӨ */
function pinSrc(){
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const mono=document.documentElement.getAttribute("data-accent")==="mono";
  if(dark) return mono ? UI_IMG.pin_white : UI_IMG.pin_red;
  return mono ? UI_IMG.pin_black : UI_IMG.pin_red;
}
/* в‘ўж—…иЎҢж—Ҙ(YYYY-MM-DD)гӮ’ yyyy.mm.dd еҪўејҸгҒ«ж•ҙеҪўгҖӮз„ЎгҒ‘гӮҢгҒ°з©әж–Үеӯ— */
/* в‘Ҙж—…иЎҢй–Ӣе§Ӣж—Ҙ(g.tripDate, ISO)гҒҫгҒ§гҒ®ж®ӢгӮҠж—Ҙж•°гҖӮд»Ҡж—Ҙ=0, йҒҺгҒҺгҒҰгҒ„гӮҢгҒ°null */
function daysUntilTrip(g){
  const d=g&&g.tripDate;
  if(!d) return null;
  const m=String(d).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m) return null;
  const target=new Date(+m[1], +m[2]-1, +m[3]);
  const now=new Date();
  const t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.round((target-t0)/86400000);
  return diff;
}
/* в‘Ҙж®ӢгӮҠж—Ҙж•°гҒ®иЎЁзӨәж–ҮиЁҖгҖӮеҪ“ж—Ҙгғ»зөҢйҒҺгӮӮиҖғж…® */
function countdownLabel(g){
  const n=daysUntilTrip(g);
  if(n==null) return "";
  if(n>0) return t("countdown.days",{n:n});
  if(n===0) return t("countdown.today");
  return t("countdown.ongoing");
}
function tripDateLabel(g){
  const d=g&&g.tripDate;
  if(!d) return "";
  const m=String(d).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(!m) return "";
  const y0=m[1], mo0=m[2].padStart(2,"0"), d0=m[3].padStart(2,"0");
  const start=`${y0}.${mo0}.${d0}`;
  // в‘ЈзҜ„еӣІ(е®ҝжіҠ)гҒ®гҒЁгҒҚ:еҲқж—Ҙ-жңҖзөӮж—ҘгҖӮзІ’еәҰгҒҜйҮҚиӨҮйғЁеҲҶгӮ’зңҒгҒҸ
  const e=g&&g.tripDateEnd;
  if(e && e!==d){
    const me=String(e).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(me){
      const y1=me[1], mo1=me[2].padStart(2,"0"), d1=me[3].padStart(2,"0");
      if(y1!==y0)      return `${start}-${y1}.${mo1}.${d1}`; // е№ҙгҒҫгҒҹгҒҺ:yyyy.mm.dd
      else if(mo1!==mo0) return `${start}-${mo1}.${d1}`;       // жңҲгҒҫгҒҹгҒҺ:mm.dd
      else              return `${start}-${d1}`;               // еҗҢжңҲ:dd
    }
  }
  return start;
}

/* в‘ӨиӘ•з”ҹж—Ҙ:жңҲгӮ»гғ¬гӮҜгғҲгҒ®йҒёжҠһиӮў */
function bdayMonthOptions(bday){
  const cur = bday ? parseInt(String(bday).split("/")[0],10) : 0;
  let o=`<option value="">${t('x.bd.month')}</option>`;
  for(let m=1;m<=12;m++) o+=`<option value="${m}" ${cur===m?"selected":""}>${m}жңҲ</option>`;
  return o;
}
/* в‘ӨиӘ•з”ҹж—Ҙ:ж—ҘгӮ»гғ¬гӮҜгғҲгҒ®йҒёжҠһиӮўгҖӮжңҲгҒ«еҝңгҒҳгҒҰеӯҳеңЁгҒҷгӮӢж—ҘгҒ®гҒҝ(гҒҶгӮӢгҒҶе№ҙгҒҜиҖғж…®гҒ—2жңҲгҒҜ29ж—ҘгҒҫгҒ§иЁұеҸҜ) */
function daysInMonth(m){ return [0,31,29,31,30,31,30,31,31,30,31,30,31][m]||31; }
function bdayDayOptions(bday){
  const parts = bday?String(bday).split("/"):[];
  const curM = parts[0]?parseInt(parts[0],10):0;
  const curD = parts[1]?parseInt(parts[1],10):0;
  const max = curM?daysInMonth(curM):31;
  let o=`<option value="">${t('x.bd.day')}</option>`;
  for(let d=1;d<=max;d++) o+=`<option value="${d}" ${curD===d?"selected":""}>${d}ж—Ҙ</option>`;
  return o;
}
/* жңҲгӮ’еӨүгҒҲгҒҹгӮүж—ҘгҒ®йҒёжҠһиӮўгӮ’еӯҳеңЁгҒҷгӮӢзҜ„еӣІгҒ«дҪңгӮҠзӣҙгҒҷ */
function syncBdayDays(){
  const ms=document.getElementById("edBMonth"); const ds=document.getElementById("edBDay");
  if(!ms||!ds)return;
  const m=parseInt(ms.value,10)||0; const cur=parseInt(ds.value,10)||0;
  const max=m?daysInMonth(m):31;
  let o=`<option value="">${t('x.bd.day')}</option>`;
  for(let d=1;d<=max;d++) o+=`<option value="${d}" ${cur===d&&cur<=max?"selected":""}>${d}ж—Ҙ</option>`;
  ds.innerHTML=o;
}
function updateBioCount(){
  const ta=document.getElementById("edBio"); const c=document.getElementById("bioCount"); if(!ta||!c)return;
  c.textContent=`${ta.value.length} / 30`;
  c.classList.toggle("over", ta.value.length>=30);
}
function idHandle(fullId){ return (fullId||"").replace(/^@/,""); }
function idTag(fullId){ return ""; }
/* IDгҒ®еҪўејҸгғҒгӮ§гғғгӮҜгҖӮOKгҒӘгӮүnullгҖҒNGгҒӘгӮүзҗҶз”ұж–Үеӯ—еҲ— */
function validateId(handle){
  if(!handle) return "IDгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„";
  if(handle.length>30) return "30ж–Үеӯ—д»ҘеҶ…гҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„";
  if(!/^[A-Za-z0-9_.]+$/.test(handle)) return "дҪҝгҒҲгӮӢгҒ®гҒҜеҚҠи§’иӢұж•°еӯ—гғ»_гғ». гҒ®гҒҝгҒ§гҒҷ";
  if(handle.endsWith(".")) return "жң«е°ҫгҒ« . гҒҜдҪҝгҒҲгҒҫгҒӣгӮ“";
  if(handle.includes("..")) return ". гӮ’йҖЈз¶ҡгҒ—гҒҰдҪҝгҒҶгҒ“гҒЁгҒҜгҒ§гҒҚгҒҫгҒӣгӮ“";
  return null;
}
/* 1жҷӮй–“гҒ«2еӣһгҒҫгҒ§ */
function idChangeAllowed(){
  const now=Date.now(), hourAgo=now-3600000;
  ID_CHANGE_LOG=ID_CHANGE_LOG.filter(t=>t>hourAgo);
  return ID_CHANGE_LOG.length<2;
}
function updateIdHint(){
  const inp=document.getElementById("edId"); const h=document.getElementById("idHint"); if(!inp||!h)return;
  const v=inp.value.trim();
  if(v===idHandle(ME.id)){ h.textContent="зҸҫеңЁгҒ®IDгҒ§гҒҷ"; h.style.color="var(--ink-soft)"; return; }
  const err=validateId(v);
  if(err){ h.textContent="вҡ  "+err; h.style.color="var(--no)"; return; }
  // йҮҚиӨҮгғҒгӮ§гғғгӮҜ(д»–дәәгҒ®гғҸгғігғүгғ«гҒЁжҜ”ијғ)
  const dup=PEOPLE.some(p=>idHandle(p.id).toLowerCase()===v.toLowerCase());
  if(dup){ h.textContent="вҡ  гҒ“гҒ®IDгҒҜж—ўгҒ«дҪҝгӮҸгӮҢгҒҰгҒ„гҒҫгҒҷ"; h.style.color="var(--no)"; return; }
  h.textContent="вң“ дҪҝз”ЁгҒ§гҒҚгҒҫгҒҷ"; h.style.color="var(--ok)";
}
function saveProfile(){
  const nm=(document.getElementById("edName")||{}).value||"";
  // IDеӨүжӣҙгҒ®жӨңиЁј
  const idInp=document.getElementById("edId");
  if(idInp){
    const newH=idInp.value.trim();
    const curH=idHandle(ME.id);
    if(newH!==curH){
      const err=validateId(newH);
      if(err){ toast("ID: "+err); return; }
      if(PEOPLE.some(p=>idHandle(p.id).toLowerCase()===newH.toLowerCase())){ toast(t("x.toast.idTaken")); return; }
      if(!idChangeAllowed()){ toast(t("x.toast.idLimit")); return; }
      const oldId=ME.id;
      ME.id = newH;
      ID_CHANGE_LOG.push(Date.now());
      // иҮӘеҲҶгҒ®IDгӮ’еҸӮз…§гҒҷгӮӢзӣёжүӢгҒ® friends й…ҚеҲ—гғ»DMгӮӯгғјгӮӮжӣҙж–°
      PEOPLE.forEach(p=>{ if(p.friends){ const i=p.friends.indexOf(oldId); if(i>=0)p.friends[i]=ME.id; } });
    }
  }
  ME.name=nm.trim()||ME.name;
  ME.bio=((document.getElementById("edBio")||{}).value||"").trim().slice(0,30);
  // в‘ӨиӘ•з”ҹж—Ҙ:жңҲгғ»ж—ҘгҒ®дёЎж–№гҒҢйҒёгҒ°гӮҢгҒҰгҒ„гӮҢгҒ° "M/D"гҖҒжңӘйҒёжҠһгҒӘгӮүз©әгҒ«
  const bm=(document.getElementById("edBMonth")||{}).value||"";
  const bd=(document.getElementById("edBDay")||{}).value||"";
  ME.birthday = (bm&&bd) ? `${bm}/${bd}` : "";
  toast(t("x.toast.profileSaved"));
  goView("profile");
}

/* ---- д»–дәәгҒ®гғ—гғӯгғ•гӮЈгғјгғ« ---- */
function mutualFriends(person){
  const theirs=person.friends||[];
  return friendsList().filter(f=>theirs.includes(f.id));
}

/* ===== в‘Јгғ•гӮ©гғӯгғјдёӯ/гғ•гӮ©гғӯгғҜгғјдёҖиҰ§(InstagramйўЁ) ===== */
let followListKind="following";   // "following" | "followers"
let followListSort="new";          // "new"(гғ•гӮ©гғӯгғјж—ҘгҒҢж–°гҒ—гҒ„й Ҷ) | "old"(еҸӨгҒ„й Ҷ) | "name"(еҗҚеүҚй Ҷ)
function openFollowList(kind){ followListKind=kind; followListSort="new"; goView("followlist"); }
function setFollowSort(s){ followListSort=s; renderApp(); }
/* дёҖиҰ§еҜҫиұЎгҒ®дәәгӮ’иҝ”гҒҷгҖӮfollowing=иҮӘеҲҶгҒҢгғ•гӮ©гғӯгғјдёӯгҖҒfollowers=иҮӘеҲҶгӮ’гғ•гӮ©гғӯгғјдёӯ */
function followListPeople(){
  const kind=followListKind;
  let arr = PEOPLE.filter(p=> kind==="following" ? p.iFollow : p.followsMe);
  const dateKey = kind==="following" ? "followedAt" : "followerSince";
  const sorted=[...arr];
  if(followListSort==="name"){
    sorted.sort((a,b)=> (a.name||"").localeCompare(b.name||"", "ja"));
  } else {
    sorted.sort((a,b)=>{
      const da=a[dateKey]||0, db=b[dateKey]||0;
      return followListSort==="new" ? (db-da) : (da-db);
    });
  }
  return sorted;
}
function screenFollowList(){
  const kind=followListKind;

      <button class="ft ${kind==='followers'?'on':''}" onclick="openFollowList('followers')">${PEOPLE.filter(p=>p.followsMe).length} гғ•гӮ©гғӯгғҜгғј</button>
    </div>
    <div class="fsort-row">${sortBtn("new","ж–°гҒ—гҒ„й Ҷ")}${sortBtn("old","еҸӨгҒ„й Ҷ")}${sortBtn("name","еҗҚеүҚй Ҷ")}</div>

function unfollow(id){ const p=findPerson(id); if(!p)return;
  if(!confirm(`${p.name}гҒ®гғ•гӮ©гғӯгғјгӮ’и§ЈйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ`))return;

/* зӣёжүӢгҒӢгӮүжқҘгҒҹгғӘгӮҜгӮЁгӮ№гғҲгӮ’жүҝиӘҚ/жӢ’еҗҰ */

function declineRequest(id){ const p=findPerson(id); if(!p)return;

/* е®ҡеһӢгҒ®иҮӘеӢ•иҝ”дҝЎ(зӣёжүӢгҒӢгӮүжқҘгҒҹгӮҲгҒҶгҒ«иҰӢгҒӣгӮӢ) */
const AUTO_REPLIES = [
  "гҒ„гҒ„гҒӯпјҒиіӣжҲҗгҖң","дәҶи§ЈпјҒ","гҒҹгҒ—гҒӢгҒ«гҒқгӮҢгҒӮгӮҠгҒӢгӮӮ","гҒӮгҒЁгҒ§жҠ•зҘЁгҒ—гҒҰгҒҠгҒҸгҒӯ",

];
function autoReply(){ return AUTO_REPLIES[Math.floor(Math.random()*AUTO_REPLIES.length)]; }

function openDM(fid){ const p=findPerson(fid);
  if(p&&!canDM(p)){ toast(p.private?"зӣёдә’гғ•гӮ©гғӯгғјгҒ§гҒӘгҒ„гҒЁгғЎгғғгӮ»гғјгӮёгҒ§гҒҚгҒҫгҒӣгӮ“":"гғ•гӮ©гғӯгғјгҒҷгӮӢгҒЁгғЎгғғгӮ»гғјгӮёгҒ§гҒҚгҒҫгҒҷ"); profileBackView='chat'; openProfile(fid); return; }

function openGroupChat(gid){ commitRoom(); activeGid=gid; const g=GROUPS.find(x=>x.id===gid); if(g)(g.chat||[]).forEach(c=>c.unread=false); S.view="groupchat"; renderApp(); }

function chatScrollBottom(){ const b=document.getElementById("chatBody"); if(b) b.scrollTop=b.scrollHeight; }

function sendDM(){
  const ta=document.getElementById("chatInput"); if(!ta)return;
  let txt=ta.value.trim(); if(!txt)return;
  if(txt.length>CHAT_MAX){ txt=txt.slice(0,CHAT_MAX); toast(t("chat.tooLong",{n:CHAT_MAX})); }
  const fid=activeChatId; const f=findPerson(fid);
  if(!DM[fid]) DM[fid]=[];
  DM[fid].push({id:newMsgId(), ts:Date.now(), who:"Tomato", t:txt, mine:true, ago:nowTime(), replyTo:replyDraft?{...replyDraft}:null});
  clearReplyDraft();
  ta.value=""; ta.style.height="42px";
  renderDMBody(true);
  pendingTyping=true; renderDMBody(true);
  setTimeout(()=>{
    pendingTyping=false;
    DM[fid].push({id:newMsgId(), ts:Date.now(), who:f?f.name:"зӣёжүӢ", t:autoReply(), mine:false, ago:nowTime()});
    if(S.view==="dm"&&activeChatId===fid) renderDMBody(true);
  }, 900+Math.random()*700);
}
function sendGroupChat(){
  const ta=document.getElementById("chatInput"); if(!ta)return;
  let txt=ta.value.trim(); if(!txt)return;
  if(txt.length>CHAT_MAX){ txt=txt.slice(0,CHAT_MAX); toast(t("chat.tooLong",{n:CHAT_MAX})); }
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
  g.chat.push({id:newMsgId(), ts:Date.now(), who:"Tomato", t:txt, mine:true, ago:nowTime(), reactions:{}, readBy:0, replyTo:replyDraft?{...replyDraft}:null});
  notifyMentions(g, txt);
  clearReplyDraft();
  ta.value=""; ta.style.height="42px";
  renderGroupChatBody(true);
  pendingTyping=true; renderGroupChatBody(true);
  setTimeout(()=>{
    pendingTyping=false;
    const others=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
    const who=others.length?others[Math.floor(Math.random()*others.length)]:"гғЎгғігғҗгғј";
    // иҮӘеҲҶгҒ®зӣҙеүҚгғЎгғғгӮ»гғјгӮёгӮ’ж—ўиӘӯгҒ«
    const mine=[...g.chat].reverse().find(x=>x.mine); if(mine) mine.readBy=Math.max(1,others.length);
    g.chat.push({id:newMsgId(), ts:Date.now(), who, t:autoReply(), mine:false, ago:nowTime(), reactions:{}, readBy:0});

/* в‘ЈгғҒгғЈгғғгғҲж–Үеӯ—ж•°: йҖҒдҝЎдёҠйҷҗ3000еӯ—гҖҒиЎЁзӨәгҒҜ1000еӯ—и¶…гҒ§гҖҢгӮӮгҒЈгҒЁиҰӢгӮӢгҖҚ */
const CHAT_MAX=3000, CHAT_FOLD=1000;
function msgText(m){
  const full=m.t||"";
  if(full.length<=CHAT_FOLD) return decorateMentions(full);
  ensureMsgId(m);
  if(m._expanded){
    return decorateMentions(full)+`<span class="more-toggle" onclick="event.stopPropagation();toggleMsgExpand('${m.id}')">${t("chat.showLess")}</span>`;
  }
  return decorateMentions(full.slice(0,CHAT_FOLD))+`<span class="more-ellipsis">вҖҰ</span><span class="more-toggle" onclick="event.stopPropagation();toggleMsgExpand('${m.id}')">${t("chat.showMore")}</span>`;
}
function toggleMsgExpand(id){
  // DMгғ»гӮ°гғ«гғјгғ—еҸҢж–№гҒӢгӮүеҜҫиұЎгғЎгғғгӮ»гғјгӮёгӮ’жҺўгҒ—гҒҰгғҲгӮ°гғ«
  let target=null;
  for(const fid in DM){ const a=DM[fid]||[]; const f=a.find(x=>x.id===id); if(f){target=f;break;} }
  if(!target){ for(const g of GROUPS){ const f=(g.chat||[]).find(x=>x.id===id); if(f){target=f;break;} } }
  if(!target) return;
  target._expanded=!target._expanded;
  if(S.view==="dm") renderDMBody(false); else if(S.view==="groupchat") renderGroupChatBody(false);
}
function msgHTML(m){
  ensureMsgId(m);
  // йҖҒдҝЎеҸ–гӮҠж¶ҲгҒ—жёҲгҒҝ:дёӯеӨ®гҒ«ж·ЎиүІиЎЁзӨәгҒ§ж®ӢгҒҷ
  if(m.unsent){
    return `<div class="sys-msg unsent"><span>${m.mine?"гғЎгғғгӮ»гғјгӮёгҒ®йҖҒдҝЎгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒ—гҒҹ":(esc(m.who||"зӣёжүӢ")+"гҒҢгғЎгғғгӮ»гғјгӮёгҒ®йҖҒдҝЎгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒ—гҒҹ")}</span></div>`;
  }
  const press=`oncontextmenu="event.preventDefault();openMsgMenu('dm','${m.id}',event.clientX,event.clientY)" ontouchstart="msgTouchStart(event,'dm','${m.id}')" ontouchend="msgTouchEnd()" ontouchmove="msgTouchEnd()"`;
  const reply = m.replyTo ? `<div class="reply-quote ${m.mine?'me':'them'}"><span class="rq-name">${esc(m.replyTo.who||"")}</span><span class="rq-text">${m.replyTo.img?"еҶҷзңҹ":esc((m.replyTo.t||"")).slice(0,50)}</span></div>` : "";
  const body = m.img
    ? `<div class="bub ${m.mine?'me':'them'} img-bub" ${press}><img src="${m.img}" alt="${t('x.alt.photo')}"></div>`
    : `<div class="bub ${m.mine?'me':'them'}" ${press}>${msgText(m)}</div>`;
  if(m.mine) return `<div class="bub-wrap me">${reply}${body}<div class="bub-time">${esc(m.ago||"")}</div></div>`;
  return `<div class="bub-wrap them"><div class="bub-name">${esc(m.who||"")}</div>${reply}${body}<div class="bub-time">${esc(m.ago||"")}</div></div>`;
}
/* й•·жҠјгҒ—жӨңеҮә(гғўгғҗгӮӨгғ«):500msгҒ§ж“ҚдҪңгғЎгғӢгғҘгғјгӮ’й–ӢгҒҸ */
let _touchTimer=null;
function msgTouchStart(e,scope,id){
  const t=e.touches&&e.touches[0];
  const x=t?t.clientX:0, y=t?t.clientY:0;
  _touchTimer=setTimeout(()=>openMsgMenu(scope,id,x,y), 500);
}
function msgTouchEnd(){ if(_touchTimer){clearTimeout(_touchTimer);_touchTimer=null;} }
function onChatPhoto(e,kind){
  const f=e.target.files&&e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    if(kind==="dm"){
      const fid=activeChatId; if(!DM[fid])DM[fid]=[];
      DM[fid].push({id:newMsgId(), ts:Date.now(), who:"Tomato", img:r.result, t:"[еҶҷзңҹ]", mine:true, ago:nowTime()});
      renderDMBody(true);
      pendingTyping=true; renderDMBody(true);
      setTimeout(()=>{ pendingTyping=false;
        const fr=findPerson(fid);
        DM[fid].push({id:newMsgId(), ts:Date.now(), who:fr?fr.name:"зӣёжүӢ", t:"гҒ„гҒ„еҶҷзңҹпјҒрҹ“ё", mine:false, ago:nowTime()});
        if(S.view==="dm"&&activeChatId===fid) renderDMBody(true);
      }, 900+Math.random()*600);
    } else {
      const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
      g.chat.push({id:newMsgId(), ts:Date.now(), who:"Tomato", img:r.result, t:"[еҶҷзңҹ]", mine:true, ago:nowTime(), reactions:{}, readBy:0});
      renderGroupChatBody(true);
      pendingTyping=true; renderGroupChatBody(true);
      setTimeout(()=>{ pendingTyping=false;
        const others=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
        g.chat.push({id:newMsgId(), ts:Date.now(), who:others.length?others[0]:"гғЎгғігғҗгғј", t:"гҒ„гҒ„гҒӯпјҒрҹ“ё", mine:false, ago:nowTime(), reactions:{}, readBy:0});
        if(S.view==="groupchat"&&activeGid===g.id) renderGroupChatBody(true);
      }, 900+Math.random()*600);
    }
  };
  r.readAsDataURL(f);
  e.target.value="";
}
function renderDMBody(scroll){

/* гӮ°гғ«гғјгғ—гғҒгғЈгғғгғҲз”ЁгғЎгғғгӮ»гғјгӮё(гғӘгӮўгӮҜгӮ·гғ§гғі+ж—ўиӘӯгҒӨгҒҚ) */
const REACTIONS = ["рҹ‘Қ","вқӨпёҸ","рҹҳҶ","рҹҳ®","рҹҳў","рҹҳЎ","рҹҺү","рҹҷҸ","рҹ”Ҙ","рҹ’Ҝ"];
function groupMsgHTML(m,idx){
  ensureMsgId(m);
  // гӮ·гӮ№гғҶгғ гғЎгғғгӮ»гғјгӮё:дёӯеӨ®еҜ„гҒӣгғ»еҚҠйҖҸжҳҺжһ гғ»зҷҪеӯ—гғ»жҷӮеҲ»гҒӨгҒҚ
  if(m.sys){
    return `<div class="sys-msg"><span>${esc(m.t)}${m.ago?` гғ» ${esc(m.ago)}`:""}</span></div>`;
  }
  // йҖҒдҝЎеҸ–гӮҠж¶ҲгҒ—жёҲгҒҝ:дёӯеӨ®гҒ«ж·ЎиүІиЎЁзӨәгҒ§ж®ӢгҒҷ
  if(m.unsent){
    return `<div class="sys-msg unsent"><span>${m.mine?"гғЎгғғгӮ»гғјгӮёгҒ®йҖҒдҝЎгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒ—гҒҹ":(esc(m.who||"зӣёжүӢ")+"гҒҢгғЎгғғгӮ»гғјгӮёгҒ®йҖҒдҝЎгӮ’еҸ–гӮҠж¶ҲгҒ—гҒҫгҒ—гҒҹ")}</span></div>`;
  }
  const press=`oncontextmenu="event.preventDefault();openMsgMenu('group','${m.id}',event.clientX,event.clientY)" ontouchstart="msgTouchStart(event,'group','${m.id}')" ontouchend="msgTouchEnd()" ontouchmove="msgTouchEnd()"`;
  const reply = m.replyTo ? `<div class="reply-quote ${m.mine?'me':'them'}"><span class="rq-name">${esc(m.replyTo.who||"")}</span><span class="rq-text">${m.replyTo.img?"еҶҷзңҹ":esc((m.replyTo.t||"")).slice(0,50)}</span></div>` : "";
  const body = m.img
    ? `<div class="bub ${m.mine?'me':'them'} img-bub" ${press}><img src="${m.img}" alt="${t('x.alt.photo')}"></div>`
    : `<div class="bub ${m.mine?'me':'them'}" ${press}>${msgText(m)}</div>`;
  // гғӘгӮўгӮҜгӮ·гғ§гғігҒ®йӣҶиЁҲиЎЁзӨә
  const rx=m.reactions||{};
  const rxHtml=Object.keys(rx).filter(e=>(rx[e]||[]).length).map(e=>{
    const cnt=(rx[e]||[]).length; const mineR=(rx[e]||[]).includes("Tomato");
    return `<span class="rx-chip ${mineR?'mine':''}" onclick="toggleReaction(${idx},'${e}')">${e} ${cnt}</span>`;
  }).join("");
  const rxRow = rxHtml?`<div class="rx-row ${m.mine?'me':'them'}">${rxHtml}</div>`:"";
  // ж—ўиӘӯ(иҮӘеҲҶгҒ®гғЎгғғгӮ»гғјгӮёгҒ®гҒҝе°ҸгҒ•гҒҸиЎЁзӨә)
  const readHtml = m.mine&&m.readBy?`<span class="read-mark">ж—ўиӘӯ ${m.readBy}</span>`:"";
  // гғӘгӮўгӮҜгӮ·гғ§гғіиҝҪеҠ гғңгӮҝгғі:иҮӘеҲҶгҒ®йҖҒдҝЎгғЎгғғгӮ»гғјгӮёгҒ«гҒҜеҮәгҒ•гҒӘгҒ„
  const addBtn = m.mine ? "" : `<button class="rx-add" onclick="openReactionPicker(${idx})" title="${t('x.title.reaction')}">вҳә</button>`;

  if(m.mine) return `<div class="bub-wrap me">${reply}
      <div class="bub-line me">${body}</div>
      <div class="bub-time">${readHtml}<span class="msg-clock">${esc(m.ago||"")}</span></div>${rxRow}</div>`;
  return `<div class="bub-wrap them"><div class="bub-name">${esc(m.who||"")}</div>${reply}
      <div class="bub-line them">${body}${addBtn}</div>
      <div class="bub-time"><span class="msg-clock">${esc(m.ago||"")}</span></div>${rxRow}</div>`;
}
let reactionPickerIdx=null;
function openReactionPicker(idx){ reactionPickerIdx=idx; renderGroupChatBody(false);
  // гғ”гғғгӮ«гғјгӮ’жҸҸз”»
  const host=document.getElementById("rxPicker");
  if(host){ host.innerHTML=REACTIONS.map(e=>`<button onclick="pickReaction('${e}')">${e}</button>`).join("");
    host.classList.add("show"); }
}
function closeReactionPicker(){ reactionPickerIdx=null; const h=document.getElementById("rxPicker"); if(h){h.classList.remove("show");h.innerHTML="";} }
function pickReaction(e){ if(reactionPickerIdx==null)return; toggleReaction(reactionPickerIdx,e); closeReactionPicker(); }
function toggleReaction(idx,e){
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return;
  const m=g.chat[idx]; if(!m)return;
  if(m.mine){ toast(t("x.toast.noSelfReact")); return; }  // иҮӘеҲҶгҒ®йҖҒдҝЎгҒ«гҒҜдёҚеҸҜ
  if(!m.reactions)m.reactions={};
  // дёҖдәә1зЁ®йЎһгҒҫгҒ§:ж—ўгҒ«жҠјгҒ—гҒҰгҒ„гӮӢеҲҘгҒ®зөөж–Үеӯ—гҒҢгҒӮгӮҢгҒ°еӨ–гҒҷ
  const already=Object.keys(m.reactions).find(k=>(m.reactions[k]||[]).includes("Tomato"));
  if(already && already!==e){
    m.reactions[already]=m.reactions[already].filter(n=>n!=="Tomato");
    if(!m.reactions[already].length)delete m.reactions[already];
  }
  if(!m.reactions[e])m.reactions[e]=[];
  const i=m.reactions[e].indexOf("Tomato");
  if(i>=0)m.reactions[e].splice(i,1); else m.reactions[e].push("Tomato");
  if(!m.reactions[e].length)delete m.reactions[e];
  renderGroupChatBody(false);
}
function renderGroupChatBody(scroll){
  const b=document.getElementById("chatBody"); if(!b)return;
  const g=GROUPS.find(x=>x.id===activeGid); const log=g?g.chat:[];
  b.innerHTML = `<div class="daydiv">${t('x.chat.today')}</div>` + log.map((m,i)=>groupMsgHTML(m,i)).join("")
    + (pendingTyping?`<div class="typing"><i></i><i></i><i></i></div>`:"")
    + `<div id="rxPicker" class="rx-picker"></div>`;
  renderReplyBar();
  if(scroll) chatScrollBottom();
}

/* в‘ӨгӮ°гғ«гғјгғ—гҒ®гӮўгғҗгӮҝгғјиЎЁзӨә:дҪңжҲҗжҷӮгҒ®з”»еғҸгҒҢгҒӮгӮҢгҒ°еҸҚжҳ гҖҒз„ЎгҒ‘гӮҢгҒ°гӮ«гғҗгғјиүІ+й ӯж–Үеӯ— */
function groupAvHTML(g, extraClass, onclick){
  const cls = "av grp"+(extraClass?(" "+extraClass):"");
  const oc = onclick?` onclick="${onclick}"`:"";
  if(g.img){
    return `<div class="${cls} img" style="background-image:url('${g.img}');cursor:pointer"${oc}></div>`;
  }
  return `<div class="${cls}" style="background:${g.cover};color:#fff;cursor:pointer"${oc}>${esc(g.name.slice(0,1))}</div>`;
}

let activeAlbumId=null, albumGid=null;
function createAlbum(gid){
  const g=GROUPS.find(x=>x.id===gid); if(!g)return;
  const title=prompt("гӮўгғ«гғҗгғ гҒ®гӮҝгӮӨгғҲгғ«гӮ’е…ҘеҠӣ");
  if(!title||!title.trim())return;
  if(!g.albums)g.albums=[];
  const al={id:"al"+Date.now(), title:title.trim(), cover:null, by:ME.name, items:[]};
  g.albums.push(al);
  toast(`гӮўгғ«гғҗгғ гҖҢ${al.title}гҖҚгӮ’дҪңжҲҗгҒ—гҒҫгҒ—гҒҹ`);
  checkBadgeAwards();
  openAlbum(gid, al.id);
}
function openAlbum(gid,aid){ albumGid=gid; activeAlbumId=aid; S.view="album"; renderApp(); }
function screenAlbum(){
  const g=GROUPS.find(x=>x.id===albumGid); if(!g) return screenGroupInfo();
  const al=(g.albums||[]).find(a=>a.id===activeAlbumId); if(!al) return screenGroupInfo();
  const items=al.items||[];
  const tiles=items.map((it,i)=>`<div class="ph" onclick="viewAlbumItem(${i})">
      ${it.type==="video"?`<video src="${it.src}" muted></video>`:`<img src="${it.src}" alt="">`}
    </div>`).join("");
  return `<div class="page">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <button class="room-back" onclick="openGroupInfo('${g.id}',true)"><span class="back-arrow">вҶҗ</span></button>
      <h2 style="margin:0;font-size:19px;color:var(--ink)">${esc(al.title)}</h2>
    </div>
    <p class="hint" style="margin:0 4px 12px">${esc(g.name)}гғ»${items.length}жһҡгҖҖдҪңжҲҗпјҡ${esc(al.by)}</p>
    <input type="file" id="albumInput" accept="image/*,video/*" multiple style="display:none" onchange="onAlbumAdd(event)">
    <div class="photo-grid">
      <div class="album-add-tile" onclick="document.getElementById('albumInput').click()">пјӢ</div>
      ${tiles}
    </div>
    ${items.length===0?`<p class="muted" style="text-align:center;margin-top:18px">${t('x.room.noPhotos')}<br>${t('x.room.noPhotosSub')}</p>`:""}
  </div>`;
}
function onAlbumAdd(e){
  const files=[...(e.target.files||[])]; if(!files.length)return;
  const g=GROUPS.find(x=>x.id===albumGid); const al=g&&(g.albums||[]).find(a=>a.id===activeAlbumId);
  if(!al)return;
  let pending=files.length;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{
      al.items.push({type:f.type.startsWith("video")?"video":"image", src:r.result, by:ME.name});
      pending--; if(pending===0){ toast(`${files.length}д»¶гӮ’иҝҪеҠ гҒ—гҒҫгҒ—гҒҹ`); checkBadgeAwards(); renderApp(); }
    };
    r.readAsDataURL(f);
  });
  e.target.value="";
}
function viewAlbumItem(i){
  const g=GROUPS.find(x=>x.id===albumGid); const al=g&&(g.albums||[]).find(a=>a.id===activeAlbumId);
  if(!al||!al.items[i])return;
  const it=al.items[i];
  // з°Ўжҳ“гғ©гӮӨгғҲгғңгғғгӮҜгӮ№
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px";
  ov.onclick=()=>ov.remove();
  ov.innerHTML = it.type==="video"
    ? `<video src="${it.src}" controls autoplay style="max-width:100%;max-height:100%;border-radius:8px"></video>`
    : `<img src="${it.src}" style="max-width:100%;max-height:100%;border-radius:8px">`;
  document.body.appendChild(ov);
}

        <div class="av" style="font-size:18px">рҹ’ё</div>

        <div style="font-weight:800;color:var(--accent)">ВҘ${s.amount.toLocaleString()}</div>

/* еҸҺж”ҜгҒӢгӮүжңҖе°Ҹеӣһж•°гҒ®йҖҒйҮ‘гғӘгӮ№гғҲгӮ’дҪңгӮӢ(иІӘж¬Іжі•) */
function settleDebts(bal){
  const debtors=[], creditors=[];
  Object.keys(bal).forEach(name=>{
    if(bal[name]<-0) debtors.push({name, amt:-bal[name]});
    else if(bal[name]>0) creditors.push({name, amt:bal[name]});
  });
  debtors.sort((a,b)=>b.amt-a.amt); creditors.sort((a,b)=>b.amt-a.amt);
  const res=[]; let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const pay=Math.min(debtors[i].amt, creditors[j].amt);
    if(pay>0) res.push({from:debtors[i].name, to:creditors[j].name, amount:Math.round(pay)});
    debtors[i].amt-=pay; creditors[j].amt-=pay;
    if(debtors[i].amt<=0)i++; if(creditors[j].amt<=0)j++;
  }
  return res;
}
function addExpense(gid){
  const g=GROUPS.find(x=>x.id===gid); if(!g)return;
  const mem=(g.room.members||[]).map(m=>m.name); if(!mem.length){toast(t("x.toast.noMembers"));return;}
  const title=prompt("й …зӣ®еҗҚпјҲдҫӢпјҡе®ҝжіҠиІ»гҖҒж–°е№№з·ҡпјү"); if(!title)return;
  const amtStr=prompt("йҮ‘йЎҚпјҲеҶҶпјү"); const amount=parseInt((amtStr||"").replace(/[^0-9]/g,""),10);
  if(!amount){toast(t("x.toast.enterAmount"));return;}
  const by=prompt(`з«ӢгҒҰжӣҝгҒҲгҒҹдәәпјҲ${mem.join(" / ")}пјү\nгҒқгҒ®гҒҫгҒҫе…ҘеҠӣ`, mem[0]); if(!by)return;
  const byName=mem.find(m=>m===by.trim())||mem[0];
  if(!g.expenses)g.expenses=[];
  g.expenses.push({title:title.trim(), amount, by:byName, icon:"рҹ§ҫ"});
  toast(t("x.toast.expenseSaved"));
  renderApp();
}
function removeExpense(gid,i){

function ensureShiori(g){
  if(g.itinerary) return;
  const r=g.room;
  const items=[];
  items.push({type:"head", text:"йӣҶеҗҲгғ»еҮәзҷә"});
  if(r.chosenDate) items.push({type:"note", text:`ж—ҘзЁӢпјҡ${r.chosenDate}`});
  items.push({type:"note", text:"йӣҶеҗҲжҷӮй–“гғ»е ҙжүҖпјҡпјҲиҝҪиЁҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү"});
  if((r.spotOrder||[]).length){
    items.push({type:"head", text:"гҒҫгӮҸгӮӢгӮ№гғқгғғгғҲ"});
    r.spotOrder.forEach((s,i)=>items.push({type:"spot", text:`${i+1}. ${itemLabel(s)}`}));
  }
  items.push({type:"head", text:"дәҲз®—гғ»жҢҒгҒЎзү©"});
  const budget=settledBudget(r);
  if(budget) items.push({type:"note", text:`дәҲз®—гҒ®зӣ®е®үпјҡ1дәә ВҘ${budget.toLocaleString()} зЁӢеәҰ`});
  items.push({type:"note", text:"жҢҒгҒЎзү©пјҡпјҲиҝҪиЁҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү"});
  g.itinerary={ title:`${g.name} гҒ®гҒ—гҒҠгӮҠ`, items };
}
function settledBudget(r){
  const vals=Object.values(r.budgetVotes||{}).map(v=>v&&!v.noWish?v.amount:null).filter(x=>x!=null);
  if(!vals.length) return null;
  return Math.min(...vals);
}

/* IDж–Үеӯ—еҲ—гҒӢгӮүжұәе®ҡзҡ„гҒ«з°Ўжҳ“QRйўЁгҒ®еӣіеҪўгӮ’з”ҹжҲҗ(иЈ…йЈҫгҖӮиӘӯгҒҝеҸ–гӮҠгҒҜдёҚеҸҜ) */
function qrSVG(seed){
  let h=0; for(let i=0;i<seed.length;i++){ h=(h*31+seed.charCodeAt(i))>>>0; }
  const N=21, cell=8, size=N*cell;
  function rng(){ h=(h*1103515245+12345)>>>0; return (h>>>16)&0xff; }
  let rects="";
  const finder=(x,y)=>{
    let s="";
    s+=`<rect x="${x*cell}" y="${y*cell}" width="${7*cell}" height="${7*cell}" fill="#111"/>`;
    s+=`<rect x="${(x+1)*cell}" y="${(y+1)*cell}" width="${5*cell}" height="${5*cell}" fill="#fff"/>`;
    s+=`<rect x="${(x+2)*cell}" y="${(y+2)*cell}" width="${3*cell}" height="${3*cell}" fill="#111"/>`;
    return s;
  };
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const inFinder=(x<7&&y<7)||(x>N-8&&y<7)||(x<7&&y>N-8);
    if(inFinder) continue;
    if(rng()>128) rects+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#111"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${size}" height="${size}" fill="#fff"/>${rects}${finder(0,0)}${finder(N-7,0)}${finder(0,N-7)}</svg>`;
}

  const list=doneTrips().map(g=>({destination:g.room.destination, destKind:g.room.destKind, nights:nightsOf(g.room.chosenDate)}));

/* chosenDate ж–Үеӯ—еҲ—("в—ӢжіҠв—Ӣж—Ҙ"гӮ’еҗ«гӮҖ)гҒӢгӮүе®ҝжіҠж•°гӮ’еҸ–гӮҠеҮәгҒҷгҖӮз„ЎгҒ‘гӮҢгҒ°0 */
function nightsOf(chosenDate){
  if(!chosenDate) return 0;
  const m=String(chosenDate).match(/(\d+)\s*жіҠ/);
  return m? parseInt(m[1],10) : 0;
}
/* иЎҢгҒҚе…Ҳж–Үеӯ—еҲ—гҒӢгӮүиӨҮж•°гҒ®е®ҹеңЁеӣҪгӮ’жӨңеҮәгҖӮ1еӣһгҒ®ж—…гҒ§жңҖеӨ§10гҒӢеӣҪгҖҒгҒӢгҒӨгҖҢе®ҝжіҠж•°+1гҖҚгӮ’дёҠйҷҗгҒЁгҒҷгӮӢ */
function countriesInTrip(dest, nights){
  if(!dest) return [];
  const found=[]; const seen=new Set();
  // еҢәеҲҮгӮҠж–Үеӯ—(гғ»,гҖҒ/пјӢ&гҒЁз©әзҷҪ)гҒ§еҲҶеүІгҒ—гҒҰеҗ„ж–ӯзүҮгӮ’еӣҪеҲӨе®ҡгҖӮеҲҶеүІгҒ§еҮәгҒӘгҒ„гӮӮгҒ®гҒҜе…ЁдҪ“гӮӮеҲӨе®ҡ
  const parts=String(dest).split(/[гғ»,гҖҒ\/пјӢ\+&\s]+/).filter(Boolean);
  const tryAdd=(s)=>{ const c=detectCountry(s); if(c && !seen.has(c.code)){ seen.add(c.code); found.push(c); } };
  parts.forEach(tryAdd);
  if(!found.length) tryAdd(dest);
  // е®ҝжіҠж•°гҒҢдёҚжҳҺ(иӘӯгҒҝеҸ–гӮҢгҒҡ0)гҒ®гҒЁгҒҚгҒҜдёҠйҷҗгӮ’1гҒӢеӣҪгҒ«еӣәе®ҡгҒҷгӮӢгҖӮ
  // е®ҝжіҠж•°гҒҢеҲҶгҒӢгӮӢгҒЁгҒҚгҒҜгҖҢе®ҝжіҠж•°+1гҖҚгӮ’дёҠйҷҗ(жңҖеӨ§10)гҒЁгҒҷгӮӢгҖӮ
  const cap = (nights && nights>0) ? Math.min(10, nights+1) : 1;
  return found.slice(0, cap);
}

}

}

/* иЎҢгҒҚе…Ҳж–Үеӯ—еҲ—гҒӢгӮүе®ҹеңЁгҒҷгӮӢеӣҪгӮ’еҲӨеҲҘ(жӯЈејҸеҗҚз§°гғ»иӢұиӘһеҗҚгғ»з•Ҙз§°гҒ§з…§еҗҲ)гҖӮжҲ»гӮҠеҖӨгҒҜеӣҪгӮӘгғ–гӮёгӮ§гӮҜгғҲ or null */
function detectCountry(dest){
  if(!dest) return null;
  const s=String(dest).trim();
  const low=s.toLowerCase();
  // е®Ңе…ЁдёҖиҮҙ(ж—Ҙжң¬иӘһжӯЈејҸеҗҚз§°гғ»з•Ҙз§°гғ»иӢұиӘһеҗҚгғ»гӮігғјгғү)гӮ’е„Әе…Ҳ
  for(const c of COUNTRY_LIST){
    if(s===c.ja || c.al.includes(s)) return c;
    if(low===c.en.toLowerCase() || low===c.code.toLowerCase()) return c;
  }
  // йғЁеҲҶдёҖиҮҙ(иЎҢгҒҚе…ҲгҒ«еӣҪеҗҚ/з•Ҙз§°гҒҢеҗ«гҒҫгӮҢгӮӢ)гҖӮй•·гҒ„еҗҚз§°гӮ’е„Әе…ҲгҒ—гҒҰиӘӨжӨңеҮәгӮ’жҠ‘гҒҲгӮӢ
  const cand=[];
  for(const c of COUNTRY_LIST){
    const keys=[c.ja, ...c.al];
    for(const k of keys){ if(k.length>=2 && s.includes(k)){ cand.push({c,len:k.length}); break; } }
  }
  if(cand.length){ cand.sort((a,b)=>b.len-a.len); return cand[0].c; }
  return null;
}

  bronze:"linear-gradient(135deg,#b87333,#e0a36a)",

/* еӣҪеҲҘгғҗгғғгӮё:иЁӘе•ҸгҒ—гҒҹеӣҪгҒ”гҒЁгҒ«иЁӘе•Ҹеӣһж•°гҒ«еҝңгҒҳгҒҰгғ¬гғҷгғ«гҒҢдёҠгҒҢгӮӢ */
const COUNTRY_BADGE_LV=[
  {lv:1,n:1,suffix:"в… ",bg:"bronze"},{lv:2,n:2,suffix:"в…Ў",bg:"silver"},
  {lv:3,n:3,suffix:"в…ў",bg:"gold"},{lv:4,n:5,suffix:"в…Ј",bg:"purple"},
  {lv:5,n:10,suffix:"в…Ө",bg:"white"},{lv:6,n:100,suffix:"",bg:"crown"},
];
/* зўәе®ҡгҒ—гҒҹжө·еӨ–ж—…иЎҢгҒ®иЎҢгҒҚе…ҲгҒӢгӮүе®ҹеңЁеӣҪгӮ’еҲӨеҲҘгҒ—гҖҒеӣҪгӮігғјгғүеҚҳдҪҚгҒ§иЁӘе•Ҹеӣһж•°гӮ’йӣҶиЁҲ */
function countryVisitCounts(){
  const cnt={};  // code -> {country, ja, visits}
  doneTripDests().forEach(t=>{
    if(t.destKind==="overseas" && t.destination){
      countriesInTrip(t.destination, t.nights).forEach(c=>{
        if(!cnt[c.code]) cnt[c.code]={code:c.code, ja:c.ja, visits:0};
        cnt[c.code].visits++;
      });
    }
  });
  return cnt;
}
/* еӣҪеҲҘгғҗгғғгӮёз”ЁгҒ®зҹӯгҒ„иЎЁзӨәеҗҚ(COUNTRY_LIST гҒ®з•Ҙз§°гҒҢгҒӮгӮҢгҒ°жңҖеҲқгҒ®гӮӮгҒ®гӮ’дҪҝгҒҶ) */
function countryShortName(info){
  const c=COUNTRY_LIST.find(x=>x.code===info.code);
  // жӯЈејҸеҗҚз§°гҒҢгҒҷгҒ§гҒ«зҹӯгҒ„(4ж–Үеӯ—д»ҘдёӢ)гҒӘгӮүгҖҒгҒқгӮҢгӮ’гҒқгҒ®гҒҫгҒҫиЎЁзӨәеҗҚгҒ«гҒҷгӮӢ(дҫӢ:еҸ°ж№ҫгғ»гӮӨгғігғү)
  if(info.ja && info.ja.length<=4) return info.ja;
  if(c && c.al && c.al.length){
    // жңҖгӮӮзҹӯгҒ„з•Ҙз§°(еӣҪеҗҚгӮүгҒ—гҒ„гӮӮгҒ®)гӮ’йҒёгҒ¶
    const al=c.al.filter(a=>a.length>=2).sort((a,b)=>a.length-b.length);
    if(al.length) return al[0];
  }
  return info.ja.replace(/(е…ұе’ҢеӣҪ|зҺӢеӣҪ|йҖЈйӮҰ|е…¬еӣҪ|еӨ§е…¬еӣҪ|йҰ–й•·еӣҪйҖЈйӮҰ|ж°‘дё»е…ұе’ҢеӣҪ|дәәж°‘е…ұе’ҢеӣҪ|зӨҫдјҡдё»зҫ©е…ұе’ҢеӣҪ|гӮӨгӮ№гғ©гғ е…ұе’ҢеӣҪ|еӨҡж°‘ж—ҸеӣҪ|йҖЈеҗҲзҺӢеӣҪ|йҖЈеҗҲ|зӢ¬з«ӢеӣҪ|еёӮеӣҪ|ж°‘еӣҪ|еӣҪ)$/,"")||info.ja;
}
/* зҚІеҫ—жёҲгҒҝгҒ®еӣҪеҲҘгғҗгғғгӮё(еӣҪгҒ”гҒЁгҒ«еҲ°йҒ”гҒ—гҒҹжңҖдёҠдҪҚгғ¬гғҷгғ«гҒ®гҒҝ=дёӢдҪҚгҒҜзҪ®гҒҚжҸӣгӮҸгӮӢ) */
function countryBadges(){
  const cnt=countryVisitCounts(); const out=[];
  Object.values(cnt).forEach(info=>{
    let top=null; COUNTRY_BADGE_LV.forEach(l=>{ if(info.visits>=l.n) top=l; });
    if(top){
      const shortName=countryShortName(info);
      out.push({code:info.code, country:shortName, name:`${shortName}${top.suffix}`, bg:top.bg, visits:info.visits, id:"country_"+info.code});
    }
  });
  return out;
}
/* еҗ„ tier гҒ§йҒ”жҲҗжёҲгҒҝгҒ®жңҖдёҠдҪҚгҒ гҒ‘гӮ’иҝ”гҒҷ(еүҚж®өгҒҜж¶ҲгҒҲгӮӢ) */
function earnedBadges(){
  const byTier={};
  BADGE_DEFS.forEach(b=>{ let ok=false; try{ok=b.need();}catch(e){}
    if(ok){ if(!byTier[b.tier]||b.lv>byTier[b.tier].lv) byTier[b.tier]=b; }});
  return Object.values(byTier).sort((a,b)=>a.tier-b.tier);
}
/* гғҗгғғгӮёгӮўгӮӨгӮігғігҒ®дёӯиә«(EUеӣҪж——гғ»е№ҙеҸ·гғ»зөөж–Үеӯ—) */
function badgeIconInner(b){
  if(b.flag==="eu") return `<img src="${EU_FLAG}" alt="EU" style="width:78%;height:78%;object-fit:cover;border-radius:7px">`;
  if(b.flag==="y2026") return `<span style="font-size:15px;font-weight:900;color:#1b2330">2026</span>`;
  return b.ic||"рҹҸ…";
}
/* еҗ„ tier гҒ®гҖҢж¬ЎгҒ«иЎЁзӨәгҒҷгҒ№гҒҚгғҗгғғгӮёгҖҚ(йҒ”жҲҗжңҖдёҠдҪҚ or жңӘйҒ”жҲҗгҒӘгӮүжңҖдёӢдҪҚ)гҖӮйҡ гҒ—гғҗгғғгӮёгҒҜжңӘзҚІеҫ—гҒӘгӮүйҷӨеӨ– */
function displayBadges(){
  const tiers=[...new Set(BADGE_DEFS.map(b=>b.tier))];
  const out=[];
  tiers.forEach(t=>{
    const inTier=BADGE_DEFS.filter(b=>b.tier===t).sort((a,b)=>a.lv-b.lv);
    let earned=null; inTier.forEach(b=>{ let ok=false; try{ok=b.need();}catch(e){} if(ok)earned=b; });
    const hidden=inTier[0].hidden;
    if(hidden && !earned) return;   // йҡ гҒ—гғҗгғғгӮёгҒҜжңӘзҚІеҫ—гҒӘгӮүиЎЁзӨәгҒ—гҒӘгҒ„
    out.push({badge: earned||inTier[0], got:!!earned});
  });
  return out;
}
function showBadgeInfo(id){

/* ---- гғҗгғғгӮёзҚІеҫ—гғҒгӮ§гғғгӮҜ&йҖҡзҹҘ ---- */
let BADGE_SEEN = {};   // ж—ўгҒ«зҚІеҫ—йҖҡзҹҘжёҲгҒҝгҒ®гғҗгғғгӮёid
function checkBadgeAwards(silent){
  // йҖҡеёёгғҗгғғгӮё:еҗ„tierгҒ®жңҖдёҠдҪҚйҒ”жҲҗ
  BADGE_DEFS.forEach(b=>{

  });

/* д»–дәәгҒ«иҰӢгҒӣгӮӢгғҗгғғгӮёгҒ®иЎЁзӨәON/OFF(жңҖеӨ§8гҒӨ)гҖӮгғҮгғ•гӮ©гғ«гғҲгҒҜе…ЁиЎЁзӨә */
let BADGE_VISIBLE = null;   // null=е…ЁйғЁиЎЁзӨәгҖҒй…ҚеҲ—=иЎЁзӨәгҒҷгӮӢbadge idгҒ®гғӘгӮ№гғҲ
function isBadgeShown(id){ return BADGE_VISIBLE===null ? true : BADGE_VISIBLE.includes(id); }
function shownBadgeCount(){ return BADGE_VISIBLE===null ? earnedBadges().length : BADGE_VISIBLE.length; }
function toggleBadgeVisible(id){
  // зҚІеҫ—жёҲгҒҝгҒ®гҒҝеҜҫиұЎ
  const earned=earnedBadges().map(b=>b.id).concat(countryBadges().map(c=>c.id));
  if(BADGE_VISIBLE===null) BADGE_VISIBLE=earned.slice(); // еҲқеӣһгҒҜе…ЁзҚІеҫ—гӮ’е…ҘгӮҢгӮӢ
  const i=BADGE_VISIBLE.indexOf(id);
  if(i>=0){ BADGE_VISIBLE.splice(i,1); }
  else { if(BADGE_VISIBLE.length>=8){ toast(t("x.badge.max8")); return; } BADGE_VISIBLE.push(id); }
  renderApp();
}

  const ids=(p&&p.badges)||[];

function cycleMyCal(key){
  const cur=MYCAL[key]||null;
  const idx=SLOT_CYCLE.indexOf(cur);
  const next=SLOT_CYCLE[(idx+1)%SLOT_CYCLE.length];
  if(next) MYCAL[key]=next; else delete MYCAL[key];
  drawMyCal();
}

function drawMyCal(){
  const el=$("#myCalTitle"); if(!el)return;
  const y=myCalYear,m=myCalMonth;
  el.textContent=t("date.full",{y,m,mn:monthName(m)});
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  let html="";
  for(let w=0;w<cells.length/7;w++){
    const wk=cells.slice(w*7,w*7+7);
    const validKeys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
    const allFull=validKeys.length>0&&validKeys.every(k=>MYCAL[k]==="full");
    html+=`<div class="calrow"><button class="weekbtn ${allFull?'on':''}" onclick="toggleMyCalWeek(${w})" title="${t('x.title.weekAllDay')}">в–¶</button>`;
    html+=wk.map(d=>{
      if(!d)return `<div class="cell empty"></div>`;
      const key=ymd(y,m,d),dow=new Date(y,m-1,d).getDay(),hol=HOLIDAYS[key];
      const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);const past=dt<today;
      const st=MYCAL[key];
      let cls="cell";
      if(dow===0)cls+=" sun";if(dow===6)cls+=" sat";if(hol)cls+=" hol";if(past)cls+=" past";
      if(dt.getTime()===today.getTime())cls+=" today";
      if(st==="full")cls+=" av-full"; else if(st==="day")cls+=" av-day"; else if(st==="night")cls+=" av-night";
      const slot = st?`<span class="slot">${slotLabel(st)}</span>`:`<span class="slot">&nbsp;</span>`;
      return `<div class="${cls}" ${past?"":`onclick="cycleMyCal('${key}')"`}>
        <span class="d">${d}</span>${slot}</div>`;
    }).join("");
    html+=`</div>`;
    if(w<cells.length/7-1)html+=`<div style="height:5px"></div>`;
  }
  $("#myCalBody").innerHTML=html;
  const cc=$("#myCalCount"); if(cc) cc.textContent=`зҷ»йҢІгҒ—гҒҹз©әгҒҚж—Ҙпјҡ${myCalCount()}ж—Ҙ`;
}
function toggleMyCalWeek(w){
  const y=myCalYear,m=myCalMonth;
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const wk=cells.slice(w*7,w*7+7);
  const today=new Date();today.setHours(0,0,0,0);
  const keys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
  const allFull=keys.length>0&&keys.every(k=>MYCAL[k]==="full");
  keys.forEach(k=>{ if(allFull)delete MYCAL[k]; else MYCAL[k]="full"; });
  drawMyCal();
}
