<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAVI。― 旅の合意形成</title>
<style>
  :root{
    --ink:#1b2330; --ink-soft:#5a6678; --line:#e3e7ee; --bg:#faf3ed; --card:#fff;
    --accent:#EC6800; --accent-deep:#c45500; --warm:#f2994a; --sun:#e2574c; --sat:#EC6800;
    --ok:#2e9e6b; --hold:#c9a227; --no:#d9534f;
    --shadow:0 1px 2px rgba(27,35,48,.06),0 8px 24px rgba(27,35,48,.06); --radius:14px;
    --bar:rgba(255,255,255,.92); --bar-line:#e3e7ee; --field:#fcfdff;
    --skel:#eef1f6; --chip:#eef2fb;
    --map1:#fbdcc2; --map2:#f7bd8c; --map3:#f29a55; --map4:#f07f22; --map5:#EC6800;
  }
  [data-theme="dark"]{
    --ink:#ececec; --ink-soft:#9a9a9a; --line:#2a2a2a; --bg:#000000; --card:#141414;
    --accent:#EC6800; --accent-deep:#c45500; --warm:#f2994a; --sun:#e2574c; --sat:#EC6800;
    --ok:#3fb583; --hold:#d4b13b; --no:#e26b66;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.6); --radius:14px;
    --bar:rgba(10,10,10,.92); --bar-line:#2a2a2a; --field:#1a1a1a;
    --skel:#1c1c1c; --chip:#1f1f1f;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 90px}
  header.app{position:sticky;top:0;z-index:30;background:rgba(246,247,251,.86);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line)}
  .head-inner{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{font-weight:800;letter-spacing:.04em;font-size:18px;display:flex;align-items:baseline;gap:1px;cursor:pointer}
  .logo .lg-en{font-family:"Yu Gothic","游ゴシック",YuGothic,"Yu Gothic Medium",sans-serif;color:var(--accent)}
  .logo .lg-dot{font-family:"HGMinchoB","HG明朝B","Yu Mincho","游明朝",serif;color:var(--accent)}
  .logo span{font-size:11px;color:var(--ink-soft);font-weight:600;letter-spacing:.12em}
  .head-spacer{flex:1}
  .room-pill{font-size:12px;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
    padding:4px 10px;border-radius:999px;white-space:nowrap}
  .steps{display:flex;gap:6px;max-width:760px;margin:0 auto;padding:10px 16px 0}
  .steps .seg{flex:1;height:4px;border-radius:999px;background:var(--line);transition:.3s}
  .steps .seg.done{background:var(--accent)}
  .steps .seg.now{background:var(--accent)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px;margin-top:18px}
  h1{font-size:24px;margin:.2em 0 .1em;letter-spacing:.01em}
  h2{font-size:19px;margin:.1em 0 .5em}
  h3.sub{font-size:15px;margin:18px 0 6px;display:flex;align-items:center;gap:8px}
  h3.sub .badge{background:var(--accent);color:#fff;border-radius:7px;width:22px;height:22px;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .lead{color:var(--ink-soft);margin:.2em 0 1em;font-size:14px}
  .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase}
  label.fld{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--ink)}
  input[type=text],input[type=number],select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;font-family:inherit;color:var(--ink);background:#fcfdff}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:2px solid #c9d8ff;border-color:var(--accent)}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .row{display:flex;gap:10px;flex-wrap:wrap} .row>*{flex:1;min-width:120px}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;
    padding:12px 18px;border-radius:11px;transition:.15s}
  .btn.primary{background:var(--accent);color:#fff} .btn.primary:hover{background:var(--accent-deep)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)} .btn.ghost:hover{border-color:#c7cedb}
  .btn:disabled{opacity:.45;cursor:not-allowed} .btn.block{width:100%}
  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap} .btn-row .btn{flex:1}
  .seg-toggle{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
  .seg-toggle button{flex:1;border:0;background:#fff;padding:12px;font-weight:700;cursor:pointer;
    font-family:inherit;font-size:14px;color:var(--ink-soft)}
  .seg-toggle button.on{background:var(--accent);color:#fff}
  .roster{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  /* ②フォロー中の友達を選んで追加するリスト */
  .friend-pick{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .friend-row{display:flex;align-items:center;gap:10px;width:100%;border:1px solid var(--line);
    background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left}
  .friend-row .fp-ava{font-size:22px;line-height:1;flex:0 0 auto}
  .friend-row .fp-name{flex:1;font-weight:700;color:var(--ink);font-size:14px}
  .friend-row .fp-act{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  .friend-row.on{border-color:var(--accent);background:rgba(var(--accent-rgb),.08)}
  .friend-row.on .fp-act{color:var(--accent)}
  [data-theme="dark"] .friend-row{background:var(--field)}
  [data-theme="dark"][data-accent="mono"] .friend-row.on .fp-act{color:var(--ink)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef2fb;color:var(--accent-deep);
    border-radius:999px;padding:5px 11px;font-size:13px;font-weight:600}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .timer{display:inline-flex;align-items:center;gap:8px;background:#fff5ec;color:#b9651b;
    border:1px solid #ffe2c7;border-radius:999px;padding:6px 13px;font-weight:700;font-size:13px}
  .genre{border:1px solid var(--line);border-radius:12px;margin-top:12px;overflow:hidden}
  .genre>.gh{padding:11px 15px;font-weight:700;background:#fbfcff;border:0;width:100%;
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit;
    font-size:14px;color:var(--ink);text-align:left}
  .genre.open>.gh{border-bottom:1px solid var(--line)}
  .genre .gh-right{display:inline-flex;align-items:center;gap:8px}
  .genre .gh-caret{color:var(--ink-soft);font-size:12px}
  .genre .count{font-size:12px;color:var(--ink-soft);font-weight:600}
  [data-theme="dark"] .genre>.gh{background:var(--field);color:var(--ink)}
  /* ①「もっと見る/閉じる」ボタン */
  .more-genres{display:block;width:100%;margin-top:12px;padding:11px;border:1px dashed var(--line);
    background:transparent;border-radius:12px;font-weight:700;font-size:14px;color:var(--accent);
    cursor:pointer;font-family:inherit}
  .more-genres:hover{border-color:var(--accent)}
  .opts{display:flex;flex-wrap:wrap;gap:8px;padding:13px 15px}
  .opt{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-size:14px;
    cursor:pointer;transition:.12s;user-select:none}
  .opt:hover{border-color:#c7cedb} .opt.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  .place-tabs{display:flex;gap:8px;margin:10px 0}
  .place-tabs button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px;
    font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft)}
  .place-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mapwrap{margin-top:6px;background:#fbfcff;border:1px solid var(--line);border-radius:12px;padding:8px}
  .mapwrap svg{width:100%;height:auto;display:block;touch-action:manipulation}
  .mapwrap svg path{fill:#e9eef7;stroke:#fff;stroke-width:.5;cursor:pointer;transition:.1s}
  .mapwrap svg path:hover{fill:#c3d4f5}
  .mapwrap svg path.sel{fill:var(--accent);stroke:#fff}
  /* 1票でもしっかり色づくよう全体に一段濃く */
  .mapwrap svg path.m1{fill:var(--map1)}.mapwrap svg path.m2{fill:var(--map2)}.mapwrap svg path.m3{fill:var(--map3)}
  .mapwrap svg path.m4{fill:var(--map4)}.mapwrap svg path.m5{fill:var(--map5)}
  .mapwrap svg .okiframe{fill:none;stroke:#9aa6bb;stroke-width:1.1;stroke-dasharray:5 4}
  .selpref{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:8px}
  .selpref .chip{background:#eef2fb}
  /* 海外 国カード(景色背景+国旗) */
  .country-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px}
  .ccard{position:relative;border-radius:11px;overflow:hidden;cursor:pointer;border:2px solid transparent;
    aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.7);transition:.12s}
  .ccard .scene{position:absolute;inset:0;z-index:0}
  .ccard .veil2{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.4))}
  .ccard .cname{position:relative;z-index:2;padding:4px;text-align:center;line-height:1.15;
    display:flex;flex-direction:column;align-items:center;gap:1px}
  .ccard .cname .cn-ja{font-size:11px;font-weight:800;letter-spacing:0;white-space:nowrap}
  .ccard .cname .cn-en{font-size:7px;font-weight:700;letter-spacing:.04em;opacity:.92;white-space:nowrap}
  .ccard.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,110,245,.35)}
  .ccard.sel::after{content:"✓";position:absolute;top:4px;right:6px;z-index:3;font-size:14px}
  .tally{margin-top:8px}
  .tline{display:flex;align-items:center;gap:10px;margin:7px 0}
  .tline .name{flex:0 0 130px;font-size:14px;display:flex;align-items:center;gap:5px}
  .tbar{flex:1;height:22px;background:#faf3ed;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .tbar>i{display:block;height:100%;background:var(--accent);border-radius:7px}
  .tline .num{flex:0 0 54px;text-align:right;font-size:13px;color:var(--ink-soft);font-weight:700}
  /* ③日程調整 記名チップ */
  .avail-names{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px 140px}
  .avail-names .av-chip{font-size:11px;font-weight:700;color:var(--accent);
    background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  /* ③昼のみ/夜のみの注記は名前(アクセント色)と分け、本文色で表示 */
  .avail-names .av-chip .av-slot{color:var(--ink);font-weight:700}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 12px}
  .cal-head button{border:1px solid var(--line);background:#fff;border-radius:9px;width:38px;height:38px;font-size:18px;cursor:pointer}
  .cal-title{font-weight:800;font-size:17px;min-width:128px;text-align:center}
  .cal{max-width:360px;margin:0 auto}
  .calrow{display:grid;grid-template-columns:26px repeat(7,1fr);gap:5px;align-items:center}
  .dow{display:grid;grid-template-columns:26px repeat(7,1fr);gap:5px;text-align:center;font-size:11px;
    color:var(--ink-soft);font-weight:700;margin-bottom:4px}
  .dow .wk{font-size:0}
  .dow span:nth-child(2){color:var(--sun)} .dow span:nth-child(8){color:var(--sat)}
  .weekbtn{width:26px;height:26px;border:1px solid var(--line);background:#fff;border-radius:7px;
    cursor:pointer;font-size:11px;color:var(--accent);font-weight:800;padding:0}
  .weekbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cell{aspect-ratio:1/1.18;border-radius:9px;border:1px solid var(--line);background:#fff;display:flex;
    flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.1s;padding:2px}
  .cell.empty{border:0;background:transparent;cursor:default}
  .cell .d{font-size:13px;font-weight:700} .cell .mini{font-size:9px;color:var(--ink-soft);line-height:1}
  .cell.sun .d{color:var(--sun)} .cell.sat .d{color:var(--sat)}
  .cell.hol{border-color:#f6d3ad} .cell.hol .d{color:var(--warm)}
  .cell.hol::after{content:"祝";position:absolute;top:3px;right:4px;font-size:8px;color:var(--warm);font-weight:700}
  .cell.past{opacity:.32;cursor:not-allowed} .cell.today{box-shadow:0 0 0 2px var(--accent) inset}
  .cell.mine{border-color:var(--accent)}
  .cell.mine::before{content:"";position:absolute;bottom:5px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  /* 範囲選択の途中ハイライト */
  .cell.rangestart{background:#3b6ef5!important;border-color:#3b6ef5}
  .cell.rangestart .d{color:#fff}
  .cell.inrange{background:#cfe0ff}
  .cell.h1{background:#eaf0ff}.cell.h2{background:#cdddff}.cell.h3{background:#a7c4ff}
  .cell.h4{background:#7ba4ff;border-color:#7ba4ff}.cell.h5{background:#4f86ff;border-color:#4f86ff}
  .cell.h4 .d,.cell.h5 .d,.cell.h4 .mini,.cell.h5 .mini{color:#fff}
  .legend{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:11px;color:var(--ink-soft);flex-wrap:wrap}
  .legend i{width:16px;height:11px;border-radius:3px;display:inline-block}
  .modebar{display:flex;gap:8px;margin:8px 0}
  .modebar button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;
    font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .modebar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .summary-box{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:14px;margin-top:14px}
  .summary-box .big{font-size:15px;font-weight:800;color:#16305c}
  /* ①薄青背景の枠はモードで色が変わらないため、枠内の文字は常に濃色に固定する */
  .summary-box,
  .summary-box .muted,
  .summary-box .big,
  .summary-box .final-line .k,
  .summary-box .final-line .v,
  .summary-box .route-stop span,
  .summary-box .ds-row,
  .summary-box .ds-row span,
  .summary-box p,
  .summary-box .hint{color:#16305c !important}
  .summary-box .muted{color:#5a6a86 !important}
  /* 予算 札束(画像) */
  .money-stage{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:16px;margin-top:8px;text-align:center}
  .money-total{font-size:26px;font-weight:800;color:#16305c;margin-bottom:4px}
  /* ①予算ステージも薄青固定背景のため、文字を常に濃色にする */
  .money-stage,.money-stage .muted,.money-stage .money-total{color:#16305c !important}
  .stack-area{position:relative;height:170px;margin:10px auto 4px;max-width:320px}
  .stack-bill{position:absolute;left:50%;width:200px;height:auto;border-radius:4px;
    box-shadow:0 1px 3px rgba(0,0,0,.25);transform:translateX(-50%);transition:.12s;cursor:pointer}
  .band{position:absolute;left:50%;transform:translateX(-50%);
    background:linear-gradient(90deg,#e7d199,#f3e7c8 30%,#fff 50%,#f3e7c8 70%,#e7d199);
    border-left:1px solid #d9c389;border-right:1px solid #d9c389;
    box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer}
  .add-bill-btn{display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--accent);color:var(--accent);
    background:#fff;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-family:inherit;font-size:15px}
  .money-ctrl{display:flex;gap:8px;justify-content:center;margin-top:10px}
  .money-ctrl button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit}
  .opt-budget{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  /* スポット投票 */
  .spot-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .spot{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-size:14px;
    cursor:pointer;transition:.12s;user-select:none}
  .spot:hover{border-color:#c7cedb} .spot.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* スポット順番(ドラッグ) */
  .plan-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .plan-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
    border-radius:11px;padding:11px 12px;cursor:grab;transition:.12s}
  .plan-item.dragging{opacity:.4;border-style:dashed}
  .plan-item.over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,110,245,.2)}
  .plan-item .ord{flex:0 0 26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .plan-item .pname{flex:1;font-size:15px;font-weight:600}
  .plan-item .votes{font-size:12px;color:var(--ink-soft);font-weight:700}
  .plan-item .grip{color:#b8c0cf;font-size:18px;cursor:grab}
  .spot-del{border:0;background:#f1f3f8;color:#9aa6bb;width:24px;height:24px;border-radius:50%;
    cursor:pointer;font-size:12px;font-weight:800;line-height:1;flex:0 0 24px}
  .spot-del:hover{background:#fde0e0;color:var(--no)}
  .plan-route{display:flex;flex-direction:column;gap:0;margin-top:10px}
  .route-stop{display:flex;align-items:center;gap:10px;padding:4px 0}
  .route-stop .pin{flex:0 0 24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .route-line{width:2px;height:14px;background:#cdd6e6;margin-left:11px}
  /* 詳細プラン(1日ごと) */
  .day-tabs{display:flex;gap:6px;margin:6px 0 14px;flex-wrap:wrap}
  .day-tabs button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;
    font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .day-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .plan-row{display:flex;gap:8px;align-items:flex-start;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:10px;margin-bottom:8px}
  .plan-row .time-col{flex:0 0 64px}
  .plan-row .time-col input{padding:7px 6px;font-size:13px;text-align:center}
  .plan-row .body-col{flex:1;display:flex;flex-direction:column;gap:6px}
  .plan-row .kind-row{display:flex;gap:5px;flex-wrap:wrap}
  .kind-chip{border:1px solid var(--line);background:#fbfcff;border-radius:7px;padding:4px 8px;font-size:12px;
    cursor:pointer;font-weight:700;color:var(--ink-soft);user-select:none}
  .kind-chip.on{color:#fff;border-color:transparent}
  .kind-chip.on.k-spot{background:#3b6ef5}.kind-chip.on.k-food{background:#e0742e}
  .kind-chip.on.k-move{background:#2e9e6b}.kind-chip.on.k-stay{background:#7a5cff}
  .kind-chip.on.k-other{background:#5a6678}
  .plan-row .content-in{padding:8px 10px;font-size:14px}
  .plan-row .del-row{flex:0 0 28px;display:flex;align-items:center}
  .plan-row .del-row button{border:0;background:#f1f3f8;color:#9aa6bb;width:26px;height:26px;border-radius:50%;
    cursor:pointer;font-weight:800;font-size:12px}
  .plan-row .del-row button:hover{background:#fde0e0;color:var(--no)}
  .add-row-btn{width:100%;border:1px dashed var(--accent);color:var(--accent);background:#fff;border-radius:10px;
    padding:11px;font-weight:800;cursor:pointer;font-family:inherit;font-size:14px;margin-top:4px}
  .day-summary{background:#f3f7ff;border:1px solid #d8e4ff;border-radius:12px;padding:12px;margin-top:10px}
  .day-summary .ds-row{display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:14px}
  .day-summary .ds-time{flex:0 0 52px;color:var(--ink-soft);font-weight:700;font-size:13px}
  .day-summary .ds-kind{flex:0 0 20px}
  .consent-grid{display:flex;gap:8px;margin-top:6px}
  .consent-grid button{flex:1;border:1px solid var(--line);background:#fff;border-radius:11px;padding:13px 8px;
    font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink-soft)}
  .consent-grid button.on.yes{background:var(--ok);color:#fff;border-color:var(--ok)}
  .consent-grid button.on.hold{background:var(--hold);color:#fff;border-color:var(--hold)}
  .consent-grid button.on.no{background:var(--no);color:#fff;border-color:var(--no)}
  .consent-stat{display:flex;gap:14px;margin-top:12px;font-size:14px;font-weight:700}
  .consent-stat .s-yes{color:var(--ok)} .consent-stat .s-hold{color:var(--hold)} .consent-stat .s-no{color:var(--no)}
  .named{border-left:3px solid var(--line);background:#fafbfd;border-radius:0 10px 10px 0;padding:10px 13px;margin-top:10px}
  .named.yes{border-left-color:var(--ok);background:#f4faf6}
  .named.hold{border-left-color:var(--hold);background:#fdfaef}
  .named.no{border-left-color:var(--no);background:#fdf6f6}
  .named .who{font-weight:700;font-size:13px}
  .named.yes .who{color:var(--ok)} .named.hold .who{color:#a8851a} .named.no .who{color:var(--no)}
  .named .why{font-size:14px;margin-top:2px} .named .cond{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .named .cond b{color:var(--ink)}
  .anon-note{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);
    background:#f4f6fb;border-radius:9px;padding:9px 12px;margin-top:10px}
  .veil{font-style:italic;color:var(--ink-soft)}
  .person-switch{display:flex;align-items:center;gap:8px;background:#1b2330;color:#fff;border-radius:11px;
    padding:9px 13px;font-size:13px;flex-wrap:wrap}
  .person-switch select{width:auto;background:#2b3547;color:#fff;border:1px solid #3c485e;padding:5px 8px;font-size:13px}
  .person-switch .lbl{opacity:.7}
  .divider{height:1px;background:var(--line);margin:18px 0} .center{text-align:center}
  .muted{color:var(--ink-soft);font-size:13px}
  .pill-stat{display:inline-block;background:#eef2fb;color:var(--accent-deep);border-radius:999px;
    padding:3px 10px;font-size:12px;font-weight:700;margin-right:6px}
  .final-line{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .final-line .k{flex:0 0 96px;color:var(--ink-soft);font-size:13px;font-weight:700}
  .final-line .v{font-size:15px;font-weight:700}
  .freelist{margin-top:8px} .freelist .row{margin-bottom:6px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;
    transition:.25s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ①ダークではトースト背景(--ink)が白系になるため、文字を黒にして可読性を確保 */
  [data-theme="dark"] .toast{color:#080001}
  .toast.with-icon{display:inline-flex;align-items:center;gap:7px}
  /* ④見出し行に回答期限チップを右寄せで並べる */
  .head-with-timer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .head-with-timer h2{font-size:20px}
  .head-with-timer .timer{flex:0 0 auto;white-space:nowrap}
  /* ⑥カレンダー右上のヘルプ(?)ボタン */
  .cal-head .cal-help-btn{position:absolute;right:0;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:800;font-size:15px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .cal-head{position:relative}
  [data-theme="dark"] .cal-head .cal-help-btn{background:var(--field);color:#f4ede6}
  /* ⑥ヘルプ表示時は複数行・左寄せ・角丸控えめにする */
  .toast.help{white-space:pre-line;text-align:left;border-radius:14px;max-width:300px;line-height:1.5;
    padding:14px 16px}
  .toast.with-icon .lock-toast{height:16px;width:auto;vertical-align:middle;flex:0 0 auto}
  .hide{display:none!important}

  /* ===== ③モノクロ(白アクセント)×ダーク時、アクセント背景の上の白文字を黒文字にして同化を防ぐ ===== */
  [data-theme="dark"][data-accent="mono"] .btn.primary,
  [data-theme="dark"][data-accent="mono"] .seg-toggle button.on,
  [data-theme="dark"][data-accent="mono"] .opt.sel,
  [data-theme="dark"][data-accent="mono"] .weekbtn.on,
  [data-theme="dark"][data-accent="mono"] .modebar button.on,
  [data-theme="dark"][data-accent="mono"] .plan-item .ord,
  [data-theme="dark"][data-accent="mono"] .route-stop .pin,
  [data-theme="dark"][data-accent="mono"] .day-tabs button.on,
  [data-theme="dark"][data-accent="mono"] .fab,
  [data-theme="dark"][data-accent="mono"] .chat-tabs button.on,
  [data-theme="dark"][data-accent="mono"] .bub.me,
  [data-theme="dark"][data-accent="mono"] .chat-input .send,
  [data-theme="dark"][data-accent="mono"] .seg2 button.on,
  [data-theme="dark"][data-accent="mono"] .mini-btn.solid,
  [data-theme="dark"][data-accent="mono"] .mutual .ava-stack span,
  [data-theme="dark"][data-accent="mono"] h3.sub .badge,
  [data-theme="dark"][data-accent="mono"] .st-badge[style*="--accent"],
  [data-theme="dark"][data-accent="mono"] .pava,
  [data-theme="dark"][data-accent="mono"] .tab-count{color:#080001 !important}
  [data-theme="dark"][data-accent="mono"] .fab svg{color:#080001}

  /* ===== ダークモードでの白背景の打ち消し ===== */
  [data-theme="dark"] header.app{background:rgba(0,0,0,.86)}
  [data-theme="dark"] .room-pill,
  [data-theme="dark"] .btn.ghost,
  [data-theme="dark"] .seg-toggle,
  [data-theme="dark"] .seg-toggle button,
  [data-theme="dark"] .opt,
  [data-theme="dark"] .place-tabs button,
  [data-theme="dark"] .cal-head button,
  [data-theme="dark"] .weekbtn,
  [data-theme="dark"] .cell,
  [data-theme="dark"] .modebar button,
  [data-theme="dark"] .money-ctrl button,
  [data-theme="dark"] .spot,
  [data-theme="dark"] .plan-item,
  [data-theme="dark"] .day-tabs button,
  [data-theme="dark"] .plan-row,
  [data-theme="dark"] .add-row-btn,
  [data-theme="dark"] .consent-grid button{background:var(--field)}
  [data-theme="dark"] .place-tabs button.on{background:var(--ink);color:var(--bg)}
  /* ②カレンダーの月切替矢印をダークモードで白く */
  [data-theme="dark"] .cal-head button{color:#f4ede6}
  /* ①ダーク時、選択中セグメントが--fieldに沈むのを防ぎアクセント背景を維持 */
  [data-theme="dark"] .seg-toggle button.on{background:var(--accent);color:var(--on-accent,#fff)}
  /* ③ダーク時、modebar(単日/範囲・日帰り/宿泊)とopt(上限金額)の選択中もアクセント背景を維持 */
  [data-theme="dark"] .modebar button.on{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  [data-theme="dark"] .opt.sel{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  [data-theme="dark"] input[type=text],
  [data-theme="dark"] input[type=number],
  [data-theme="dark"] select,
  [data-theme="dark"] textarea{background:var(--field)}
  [data-theme="dark"] .mapwrap svg path{stroke:#0e1320}
  [data-theme="dark"] .timer{background:#2a2113;color:#e2b46b}

  /* ===== スマホ表示の最大幅(電話枠) ===== */
  .wrap{max-width:520px}
  header.app .head-inner,.steps{max-width:520px}
  header.app .head-inner{position:relative}
  header.app .logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1}
  header.app .logo .logo-img{height:26px;width:auto;display:block}

  /* ===== SNSヘッダー(検索・通知) ===== */
  .sns-head{position:sticky;top:0;z-index:30;background:var(--bar);
    backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--bar-line)}
  .sns-head-inner{max-width:520px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:10px}
  .sns-head-inner.center{justify-content:space-between}
  .sns-head-inner.center .sns-head-side{flex:1;display:flex;align-items:center}
  .sns-head-inner.center .sns-head-side.left{justify-content:flex-start}
  .sns-head-inner.center .sns-head-side.right{justify-content:flex-end}
  .sns-head-inner.center .sns-logo{flex:0 0 auto}
  .sns-logo{font-weight:900;letter-spacing:.02em;font-size:57px;display:flex;align-items:baseline;gap:1px;color:var(--ink);cursor:pointer;line-height:1}
  .sns-logo .logo-img{height:25.6px;width:auto;display:block}
  .sns-logo .lg-en{font-family:"Yu Gothic","游ゴシック",YuGothic,"Yu Gothic Medium",sans-serif;color:var(--accent)}
  .sns-logo .lg-dot{font-family:"HGMinchoB","HG明朝B","Yu Mincho","游明朝",serif;color:var(--accent)}
  .sns-logo span{font-size:10px;color:var(--ink-soft);font-weight:600;letter-spacing:.12em}
  .sns-head .sp{flex:1}
  .icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative;transition:.12s}
  .icon-btn:active{transform:scale(.92)}
  .icon-btn svg{width:21px;height:21px}
  .icon-btn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--card)}

  /* ===== 検索バー ===== */
  .searchbar{max-width:520px;margin:0 auto;padding:0 16px 11px}
  .searchbar .box{display:flex;align-items:center;gap:9px;background:var(--field);border:1px solid var(--line);
    border-radius:999px;padding:10px 15px;color:var(--ink-soft)}
  .searchbar .box svg{width:18px;height:18px;flex:0 0 18px}
  .searchbar input{border:0!important;background:transparent!important;padding:0!important;font-size:15px}
  .searchbar input:focus{outline:none}

  /* ===== ボトムタブバー ===== */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--bar);
    backdrop-filter:saturate(140%) blur(10px);border-top:1px solid var(--bar-line);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));display:flex}
  .tabbar .tabwrap{max-width:520px;margin:0 auto;width:100%;display:flex;justify-content:space-around}
  .tab{flex:1;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 0;cursor:pointer;color:var(--ink-soft);transition:.12s;font-family:inherit}
  .tab .tab-ic-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;height:30px}
  .tab .tab-ic{width:27px;height:27px;object-fit:contain;display:block;transition:.12s}
  .tab.on .tab-ic{transform:translateY(-1px)}
  .tab .tab-dot{position:absolute;top:-2px;right:-5px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .tab .tab-ava{width:28px;height:28px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:16px;overflow:hidden;border:2px solid transparent;box-sizing:border-box}
  .tab .tab-ava.img{background-size:cover;background-position:center;font-size:0}
  .tab .tab-ava.on{border-color:var(--accent)}
  .tab:active{transform:scale(.9)}
  .tab.post-tab{position:relative}
  .tab.post-tab .plus{width:46px;height:34px;border-radius:12px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(var(--accent-rgb,236,104,0),.4)}
  .tab.post-tab .plus svg{width:24px;height:24px;color:#fff;transform:none}

  /* ===== ホーム:旅グループのフィード ===== */
  .feed{max-width:520px;margin:0 auto;padding:14px 14px 96px}
  .feed-h{display:flex;align-items:baseline;justify-content:space-between;padding:6px 4px 10px}
  .feed-h h2{font-size:20px;margin:0;color:var(--ink)} .feed-h .cnt{font-size:13px;color:var(--ink-soft);font-weight:600}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);margin-bottom:16px;cursor:pointer;transition:.15s}
  .gcard:active{transform:scale(.985)}
  .gcard .cover{position:relative;height:152px;background-size:cover;background-position:center}
  .gcard .cover .card-pin{width:26px;height:26px;border-radius:50%;flex:0 0 auto;
    border:0;background:rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .gcard .cover .card-pin .pin-ic{height:14px;vertical-align:0;opacity:.75}
  .gcard .cover .card-pin.on{background:var(--accent)}
  .gcard .cover .card-pin.on .pin-ic{opacity:1}
  /* ①ダーク×モノクロ(白アクセント)時はピン留めボタンが白背景になるため、その上の白ピンを黒に反転 */
  [data-theme="dark"][data-accent="mono"] .gcard .cover .card-pin.on .pin-ic{filter:invert(1)}
  .gcard .cover::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.5))}
  .gcard .cover .badge-row{position:absolute;left:12px;top:12px;display:flex;gap:6px;align-items:center;z-index:2}
  .gcard .st-badge{background:rgba(255,255,255,.92);color:#1b2330;font-size:11px;font-weight:800;
    padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}
  .gcard .st-badge.live{background:var(--sun);color:#fff}
  .gcard .st-badge.done{background:var(--ok);color:#fff}
  .gcard .cover .ttl{position:absolute;left:14px;bottom:11px;right:14px;z-index:2;color:#fff}
  .gcard .cover .ttl .nm{font-size:19px;font-weight:800;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .gcard .cover .ttl .dest{font-size:13px;font-weight:600;opacity:.92;margin-top:2px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .gcard .body{padding:13px 15px 15px}
  .gcard .meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
  .gcard .meta .ava{display:flex} .gcard .meta .ava span{width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--card);margin-left:-8px}
  .gcard .meta .ava span:first-child{margin-left:0}
  .gcard .progress{margin-top:11px}
  .gcard .progress .bar{height:6px;border-radius:999px;background:#faf3ed;border:1px solid var(--line);overflow:visible;position:relative}
  .gcard .progress .bar i{display:block;height:100%;border-radius:999px;
    background:var(--accent);position:relative}
  /* ①到達点(塗りの右端)に現在地ピン。先端(下)がバー上端に接するよう配置 */
  .gcard .progress .bar i::after{content:"";position:absolute;right:-5px;bottom:1px;
    width:11px;height:19px;background:var(--pin-img) center/contain no-repeat;
    pointer-events:none}
  .gcard .progress .cap{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--ink-soft)}
  .gcard .progress .cap b{color:var(--accent);font-weight:800}
  /* ②カード縦幅: 2/3倍(画像を低く・メンバー省略) */
  .gcard.s-mid .cover{height:100px}
  .gcard.s-mid .cover .ttl .nm{font-size:17px}
  .gcard.s-mid .body{padding:11px 15px 13px}
  /* ②カード縦幅: 1/3倍(画像なしのコンパクト行) */
  .gcard.s-min{padding:0}
  .gcard.s-min .min-row{display:flex;align-items:center;gap:10px;padding:12px 14px}
  .gcard.s-min .min-main{flex:1;min-width:0}
  .gcard.s-min .min-title{font-size:15px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gcard.s-min .min-sub{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .gcard.s-min .min-pct{font-size:13px;font-weight:800;color:var(--accent);flex:0 0 auto}
  .gcard.s-min .min-done{font-size:13px;font-weight:800;color:var(--ok);flex:0 0 auto}
  .gcard.s-min .card-pin{position:static;width:24px;height:24px}
  .gcard.s-min .min-bar{height:5px;border-radius:999px;background:#faf3ed;border:1px solid var(--line);
    margin:0 14px 12px;overflow:hidden}
  .gcard.s-min .min-bar i{display:block;height:100%;border-radius:999px;background:var(--accent)}
  [data-theme="dark"] .gcard.s-min .min-bar{background:var(--field)}
  /* ②「あなたの旅」見出し(タップで表示サイズ切替) */
  .feed-h h2.size-toggle{cursor:pointer;user-select:none}
  .feed-h h2.size-toggle::after{content:"⇕";font-size:13px;color:var(--ink-soft);margin-left:7px;font-weight:600}

  .skel-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:16px}
  .skel-card .sk{background:var(--skel);position:relative;overflow:hidden}
  .skel-card .sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shimmer 1.2s infinite}
  @keyframes shimmer{100%{transform:translateX(100%)}}
  .skel-card .cov{height:152px} .skel-card .ln{height:13px;border-radius:6px;margin:11px 15px}
  .skel-card .ln.w1{width:60%} .skel-card .ln.w2{width:40%}

  .feed-empty{text-align:center;color:var(--ink-soft);padding:60px 20px}
  .feed-empty .ic{font-size:46px;margin-bottom:8px}

  /* 汎用 タブ用ページ */
  .page{max-width:520px;margin:0 auto;padding:16px 16px 96px}
  .page h2.ph{font-size:20px;margin:6px 4px 14px;color:var(--ink)}
  .listcard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    padding:14px 16px;margin-bottom:11px;display:flex;align-items:center;gap:12px}
  .listcard .lic{width:42px;height:42px;border-radius:12px;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:20px;flex:0 0 42px}
  .listcard .lt{flex:1} .listcard .lt .a{font-size:15px;font-weight:700;color:var(--ink)}
  .listcard .lt .b{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .listcard .when{font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
  .notif-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:0 0 9px}

  .prof-top{text-align:center;padding:18px 0 8px}
  .prof-top .pava{width:84px;height:84px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:800;margin:0 auto 10px}
  .prof-top .pn{font-size:20px;font-weight:800;color:var(--ink)} .prof-top .pm{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .lock-ic{height:17px;width:auto;vertical-align:-2px}
  .lock-ic.lock-btn{height:15px;vertical-align:-3px;margin-right:1px}
  .pin-ic{height:14px;width:auto;vertical-align:-2px}
  .pen-ic{height:15px;width:auto;vertical-align:-2px;margin-right:2px}
  .stat-row{display:flex;gap:10px;margin:16px 0}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .stat .num{font-size:22px;font-weight:800;color:var(--ink)} .stat .lab{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .setting{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:6px}
  .setting .item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .setting .item:last-child{border-bottom:0} .setting .item .si{font-size:18px;width:24px;text-align:center}
  .accent-item .accent-swatches{margin-left:auto;display:flex;gap:8px}
  /* ②言語スイッチ(日本語/English) */
  .lang-switch{margin-left:auto;display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .lang-switch .lang-btn{border:0;background:transparent;color:var(--ink-soft);font-size:12.5px;font-weight:700;
    padding:6px 12px;cursor:pointer;white-space:nowrap}
  .lang-switch .lang-btn.on{background:var(--accent);color:var(--on-accent,#fff)}
  .notif-sec.is-hidden{display:none}
  .more-notif-btn{display:block;width:100%;margin:14px 0 4px;padding:11px;border:1px solid var(--line);
    background:var(--card);color:var(--accent);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .more-notif-btn:active{transform:scale(.98)}
  .accent-swatches .swatch{width:24px;height:24px;border-radius:50%;border:2px solid var(--card);
    box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0}
  .accent-swatches .swatch.on{box-shadow:0 0 0 2px var(--ink);transform:scale(1.08)}
  .setting .item .st{flex:1;font-size:15px;font-weight:600;color:var(--ink)}
  .switch{width:46px;height:27px;border-radius:999px;background:var(--line);position:relative;transition:.2s;flex:0 0 46px}
  .switch.on{background:var(--accent)} .switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;
    background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)} .switch.on i{left:22px}

  /* 戻る付き ルームヘッダー */
  .room-back{display:flex;align-items:center;gap:6px;background:none;border:0;color:var(--accent);
    font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;padding:0;margin-bottom:2px}
  .room-back svg{width:18px;height:18px}
  .back-arrow{font-size:22px;font-weight:900;line-height:1;color:var(--accent)}

  /* FAB(新規作成) */
  .fab{position:fixed;right:18px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:35;
    width:56px;height:56px;border-radius:18px;border:0;background:var(--accent);color:#fff;
    box-shadow:0 6px 18px rgba(var(--accent-rgb,236,104,0),.45);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.92)} .fab svg{width:26px;height:26px}

  /* ===== チャット一覧 ===== */
  .chat-tabs{display:flex;gap:8px;max-width:520px;margin:0 auto;padding:4px 16px 12px}
  .chat-tabs button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:10px;
    font-weight:700;font-size:14px;color:var(--ink-soft);cursor:pointer;font-family:inherit}
  .chat-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chatrow{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
  .chatrow:active{background:var(--chip)}
  .chatrow .av{width:48px;height:48px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:24px;flex:0 0 48px;position:relative}
  .chatrow .av .on-dot{position:absolute;right:1px;bottom:1px;width:12px;height:12px;border-radius:50%;
    background:var(--ok);border:2px solid var(--card)}
  .chatrow .av.grp{background:none}
  .av.grp.img{background-size:cover !important;background-position:center !important;color:transparent !important;font-size:0}
  .chatrow .ct{flex:1;min-width:0}
  .chatrow .ct .nm{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px}
  .chatrow .ct .ms{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chatrow .rt{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .chatrow .rt .tm{font-size:11px;color:var(--ink-soft)}
  .chatrow .rt .badge{min-width:18px;height:18px;border-radius:999px;background:var(--sun);color:#fff;
    font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px}

  /* ===== チャット画面(会話) ===== */
  .chat-screen{display:flex;flex-direction:column;height:100dvh;background:var(--bg)}
  .chat-head{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;padding:11px 14px;
    background:var(--bar);backdrop-filter:blur(10px);border-bottom:1px solid var(--bar-line)}
  .chat-head .bk{background:none;border:0;color:var(--accent);cursor:pointer;display:flex;padding:0}
  .chat-head .bk svg{width:24px;height:24px}
  .chat-head .av{width:38px;height:38px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:19px;flex:0 0 38px}
  .chat-head .ti{flex:1;min-width:0}
  .chat-head .ti .nm{font-size:15px;font-weight:800;color:var(--ink)}
  .chat-head .ti .sub{font-size:11.5px;color:var(--ink-soft)}
  .chat-head .ic{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink)}
  .chat-head .ic svg{width:19px;height:19px}
  .chat-body{flex:1;overflow-y:auto;padding:16px 14px 12px;display:flex;flex-direction:column;gap:8px}
  .daydiv{align-self:center;font-size:11px;color:var(--ink-soft);background:var(--chip);
    padding:4px 12px;border-radius:999px;margin:4px 0}
  .bub{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.5;word-break:break-word}
  .bub.them{align-self:flex-start;background:var(--card);border:1px solid var(--line);
    border-bottom-left-radius:5px;color:var(--ink)}
  .bub.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
  .bub-wrap{display:flex;flex-direction:column;max-width:100%}
  .bub-wrap.me{align-items:flex-end} .bub-wrap.them{align-items:flex-start}
  .bub-name{font-size:11px;color:var(--ink-soft);margin:0 6px 2px}
  .bub-time{font-size:10px;color:var(--ink-soft);margin:2px 6px 0}
  .typing{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-radius:16px;
    border-bottom-left-radius:5px;padding:11px 15px;display:flex;gap:4px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .chat-input{position:sticky;bottom:0;display:flex;align-items:flex-end;gap:9px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:var(--bar);backdrop-filter:blur(10px);border-top:1px solid var(--bar-line)}
  .mention-pop{position:absolute;left:12px;right:12px;bottom:calc(100% + 6px);max-width:496px;margin:0 auto;
    background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    overflow:hidden;z-index:50;max-height:240px;overflow-y:auto}
  .mention-pop .mc-item{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;
    padding:9px 12px;cursor:pointer;text-align:left}
  .mention-pop .mc-item:hover{background:var(--chip)}
  .mention-pop .mc-av{width:34px;height:34px;border-radius:50%;flex:0 0 auto;background-size:cover;background-position:center;
    background-color:var(--chip);display:flex;align-items:center;justify-content:center;font-size:18px}
  .mention-pop .mc-av.emoji{background-color:var(--chip)}
  .mention-pop .mc-body{min-width:0}
  .mention-pop .mc-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mention-pop .mc-id{font-size:12px;color:var(--accent)}
  .chat-input textarea{flex:1;border:1px solid var(--line);border-radius:20px;padding:10px 15px;font-size:15px;
    font-family:inherit;background:var(--field);color:var(--ink);max-height:120px;min-height:42px;resize:none}
  .chat-input .send{width:42px;height:42px;border-radius:50%;border:0;background:var(--accent);color:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 42px}
  .chat-input .send:active{transform:scale(.9)} .chat-input .send svg{width:20px;height:20px}

  /* ===== 友達追加(ID/QR) ===== */
  .qr-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;box-shadow:var(--shadow)}
  .qr-box{width:184px;height:184px;margin:6px auto 12px;background:#fff;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:center}
  .qr-box svg{width:100%;height:100%}
  .myid{display:inline-flex;align-items:center;gap:8px;background:var(--chip);border-radius:999px;padding:7px 14px;
    font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}
  .seg2{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card);margin-bottom:14px}
  .seg2 button{flex:1;border:0;background:var(--card);padding:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);font-family:inherit}
  .seg2 button.on{background:var(--accent);color:#fff}
  .friend-li{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:12px 14px;margin-bottom:10px}
  .friend-li .av{width:44px;height:44px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:22px;flex:0 0 44px;position:relative}
  .friend-li .av .on-dot{position:absolute;right:0;bottom:0;width:11px;height:11px;border-radius:50%;background:var(--ok);border:2px solid var(--card)}
  .friend-li .fi{flex:1} .friend-li .fi .nm{font-size:15px;font-weight:700;color:var(--ink)}
  .friend-li .fi .id{font-size:12px;color:var(--ink-soft)}
  .mini-btn{border:1px solid var(--accent);color:var(--accent);background:var(--card);border-radius:999px;
    padding:7px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .mini-btn.solid{background:var(--accent);color:#fff}
  .mini-btn.danger{border-color:var(--no);color:var(--no)}
  .mini-btn:active{transform:scale(.94)}

  /* グループ内ヘッダーのチャットボタン */
  .room-chat-btn{display:flex;align-items:center;gap:5px;background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
  .room-chat-btn svg{width:15px;height:15px}
  .leave-btn{width:100%;border:1px solid var(--no);color:var(--no);background:transparent;border-radius:12px;
    padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:8px}
  .leave-btn:active{background:rgba(217,83,79,.08)}

  /* ===== マイカレンダー ===== */
  .cal-legend2{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 4px;font-size:12px;color:var(--ink-soft)}
  .cal-legend2 .lg{display:inline-flex;align-items:center;gap:5px}
  .cal-legend2 .sw{width:15px;height:15px;border-radius:4px;border:1px solid var(--line)}
  .sw.full{background:#4f86ff} .sw.day{background:#ffd16b} .sw.night{background:#7c6cf0} .sw.none{background:var(--field)}
  /* マイカレンダーのセル状態 */
  .cell.av-full{background:#4f86ff !important;color:#fff}
  .cell.av-day{background:linear-gradient(135deg,#ffd16b 50%,var(--field) 50%) !important}
  .cell.av-night{background:linear-gradient(135deg,var(--field) 50%,#7c6cf0 50%) !important;color:#fff}
  .cell .slot{font-size:8.5px;font-weight:700;line-height:1}
  /* ③昼/Dayの文字を最前面にし読めるようにする。終日・夜は濃い背景なので白、昼は背景が黄のため可読色を分ける */
  .cell.av-day .slot,.cell.av-full .slot,.cell.av-night .slot{position:relative;z-index:3}
  .cell.av-full .slot,.cell.av-night .slot{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.55)}
  /* ②昼はライトモードでは黒字 */
  .cell.av-day .slot{color:#1b2330;text-shadow:none}
  /* ②昼はダークモードでは白字(暗い右半分にも乗るため影を付ける) */
  [data-theme="dark"] .cell.av-day .slot{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  [data-theme="dark"] .cell.av-day{color:#1b2330}
  .mycal-help{background:var(--chip);border-radius:11px;padding:11px 14px;font-size:13px;color:var(--ink-soft);margin:6px 0 12px;line-height:1.6}
  .mycal-help b{color:var(--ink)}

  /* ===== プロフィール拡張 ===== */
  .pava.img{background-size:cover;background-position:center;font-size:0}
  .pava-edit{position:relative;width:84px;height:84px;margin:0 auto 10px;cursor:pointer}
  .pava-edit .cam{position:absolute;right:-2px;bottom:-2px;width:28px;height:28px;border-radius:50%;
    background:var(--accent);border:2px solid var(--card);display:flex;align-items:center;justify-content:center;color:#fff}
  .pava-edit .cam svg{width:14px;height:14px}
  .prof-bio{text-align:center;font-size:14px;color:var(--ink);margin:8px 18px 2px;line-height:1.5}
  .follow-line{text-align:center;font-size:13.5px;color:var(--ink-soft);margin:8px 18px 2px}
  .follow-line b{color:var(--ink);font-weight:700}
  .follow-line .fl-link{cursor:pointer}
  .follow-line .fl-link:active{opacity:.6}
  .follow-tabs{display:flex;gap:8px;margin:4px 0 12px}
  .follow-tabs .ft{flex:1;border:1px solid var(--line);background:var(--card);border-radius:11px;
    padding:10px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit}
  .follow-tabs .ft.on{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  .fsort-row{display:flex;gap:8px;margin-bottom:10px}
  .fsort-row .fsort{border:1px solid var(--line);background:var(--card);border-radius:999px;
    padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:inherit}
  .fsort-row .fsort.on{background:var(--accent);color:var(--on-accent,#fff);border-color:var(--accent)}
  .fl-sub{margin-left:auto;font-size:11.5px;color:var(--ink-soft)}
  .prof-meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 4px}
  .prof-meta .mi{display:inline-flex;align-items:center;gap:5px;background:var(--chip);border-radius:999px;
    padding:6px 13px;font-size:12.5px;color:var(--ink);font-weight:600}
  .edit-prof-btn{display:block;margin:14px auto 6px;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:9px 22px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
  .edit-prof-btn:active{transform:scale(.96)}
  .field-label{font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 4px 6px;display:block}
  .char-count{font-size:11px;color:var(--ink-soft);text-align:right;margin:3px 4px 0}
  .char-count.over{color:var(--no)}

  /* 他人プロフィールのヘッダー */
  .other-cover{height:96px;border-radius:0 0 0 0;background:linear-gradient(135deg,var(--accent),#9bb6ff);margin:-16px -16px 0}
  .other-ava{width:88px;height:88px;border-radius:50%;border:4px solid var(--card);margin:-44px auto 0;
    background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:42px;
    background-size:cover;background-position:center;position:relative;z-index:2}
  .mutual{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-top:14px}
  .mutual .ava-stack{display:flex}
  .mutual .ava-stack span{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);
    margin-left:-10px;background-size:cover;background-position:center}
  .mutual .ava-stack span:first-child{margin-left:0}
  .mutual .mt{flex:1;font-size:13.5px;color:var(--ink)} .mutual .mt b{color:var(--accent)}

  /* チャット内の画像メッセージ */
  .bub.img-bub{padding:4px;background:transparent;border:0;max-width:62%}
  .bub.img-bub img{width:100%;border-radius:13px;display:block}
  .chat-attach{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 42px;color:var(--ink)}
  .chat-attach:active{transform:scale(.9)} .chat-attach svg{width:21px;height:21px}

  /* ===== プロフィールの操作メニュー ===== */
  .prof-menu{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--card)}
  .prof-menu summary{padding:13px 16px;font-size:14px;font-weight:700;color:var(--ink-soft);cursor:pointer;list-style:none;text-align:center}
  .prof-menu summary::-webkit-details-marker{display:none}
  .prof-menu[open] summary{border-bottom:1px solid var(--line)}
  .prof-menu-body{display:flex;flex-direction:column}
  .menu-item{border:0;background:var(--card);padding:14px 16px;font-size:14.5px;font-weight:600;color:var(--ink);
    cursor:pointer;text-align:left;font-family:inherit;border-bottom:1px solid var(--line)}
  .menu-item:last-child{border-bottom:0}
  .menu-item:active{background:var(--chip)}
  .menu-item.danger{color:var(--no)}

  /* ===== グループ情報画面 ===== */
  .gi-cover{height:120px;margin:-16px -16px 0;background-size:cover;background-position:center;position:relative}
  .gi-cover .gi-cover-cam{position:absolute;right:12px;bottom:12px;z-index:3;width:36px;height:36px;border-radius:50%;
    background:rgba(0,0,0,.45);border:0;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
  .gi-cover .gi-cover-cam svg{width:18px;height:18px}
  .gi-cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.45))}
  .gi-title{position:absolute;left:16px;bottom:12px;right:16px;z-index:2;color:#fff}
  .gi-title .nm{font-size:21px;font-weight:800;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .gi-title .dest{font-size:13px;opacity:.92;margin-top:2px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .gi-prog{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:14px}
  .gi-prog .bar{height:8px;border-radius:999px;background:#faf3ed;border:1px solid var(--line);overflow:visible;margin-top:8px;position:relative}
  .gi-prog .bar i{display:block;height:100%;border-radius:999px;background:var(--accent);position:relative}
  .gi-prog .bar i::after{content:"";position:absolute;right:-5px;bottom:1px;
    width:12px;height:21px;background:var(--pin-img) center/contain no-repeat;
    pointer-events:none}
  .gi-mem{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .gi-mem:last-child{border-bottom:0}
  .gi-mem .av{width:44px;height:44px;border-radius:50%;background:var(--chip);display:flex;align-items:center;
    justify-content:center;font-size:21px;flex:0 0 44px;background-size:cover;background-position:center}
  .gi-mem .mi2{flex:1}.gi-mem .mi2 .nm{font-size:15px;font-weight:700;color:var(--ink)}
  .gi-mem .mi2 .b{font-size:12px;color:var(--ink-soft);margin-top:1px}
  .gi-mem .badge2{font-size:11px;font-weight:700;color:var(--accent);background:var(--chip);padding:3px 9px;border-radius:999px}

  /* ===== チャットのリアクション・既読 ===== */
  .bub-line{display:flex;align-items:center;gap:6px}
  .bub-line.me{flex-direction:row;justify-content:flex-end}
  .rx-add{border:0;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:15px;opacity:.45;
    width:24px;height:24px;border-radius:50%;flex:0 0 24px;padding:0}
  .rx-add:hover{opacity:1;background:var(--chip)}
  .rx-row{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
  .rx-row.me{justify-content:flex-end}
  .rx-chip{font-size:12px;background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:2px 8px;cursor:pointer;font-weight:700;color:var(--ink)}
  .rx-chip.mine{background:rgba(59,110,245,.14);border-color:var(--accent);color:var(--accent)}
  .read-mark{font-size:10px;color:var(--ink-soft);margin-right:6px;padding-right:6px;border-right:1px solid var(--line)}
  .msg-clock{font-size:10px;color:var(--ink-soft)}
  .rx-picker{position:sticky;bottom:6px;display:none;flex-wrap:wrap;gap:4px;justify-content:center;
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px;margin:8px auto 0;
    max-width:300px;box-shadow:var(--shadow);z-index:5}
  .rx-picker.show{display:flex}
  .rx-picker button{border:0;background:transparent;font-size:24px;cursor:pointer;width:38px;height:38px;border-radius:10px}
  .rx-picker button:active{background:var(--chip)}

  /* ===== アルバム ===== */
  .album-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .album-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow)}
  .album-card:active{transform:scale(.98)}
  .album-card .cov{height:104px;background:var(--chip);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--ink-soft)}
  .album-card .info{padding:9px 11px}
  .album-card .info .t{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .album-card .info .c{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .album-new{border:2px dashed var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:6px;height:100%;min-height:150px;cursor:pointer;color:var(--ink-soft);font-weight:700;font-size:14px}
  .album-new:active{background:var(--chip)}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
  .photo-grid .ph{aspect-ratio:1/1;border-radius:9px;overflow:hidden;background:var(--chip)}
  .photo-grid .ph img,.photo-grid .ph video{width:100%;height:100%;object-fit:cover;display:block}
  .album-add-tile{aspect-ratio:1/1;border:2px dashed var(--line);border-radius:9px;display:flex;align-items:center;
    justify-content:center;font-size:28px;color:var(--ink-soft);cursor:pointer}
  .album-add-tile:active{background:var(--chip)}

  /* ===== 実績バッジ ===== */
  .badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
  .badge-item{text-align:center}
  .badge-ic{width:58px;height:58px;border-radius:16px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;
    font-size:28px;background:linear-gradient(135deg,var(--accent),#9bb6ff);color:#fff;box-shadow:0 4px 10px rgba(var(--accent-rgb,236,104,0),.3)}
  .badge-item.locked .badge-ic{background:var(--chip);color:var(--ink-soft);box-shadow:none;filter:grayscale(1);opacity:.6}
  .badge-item .bn{font-size:10.5px;font-weight:700;color:var(--ink);line-height:1.25}
  .badge-item.locked .bn{color:var(--ink-soft)}
  .badge-row-prof{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:6px 0 2px}
  .badge-mini{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;
    background:linear-gradient(135deg,var(--accent),#9bb6ff);color:#fff}

  /* ピン/アーカイブ */
  .pin-tag{font-size:10px;font-weight:800;color:var(--accent);background:rgba(59,110,245,.12);padding:2px 7px;border-radius:6px;margin-left:6px}
  .swipe-actions{display:flex;gap:6px}
  .chat-sect-h{font-size:12px;font-weight:800;color:var(--ink-soft);letter-spacing:.04em;margin:10px 16px 2px}  /* ===== システムメッセージ(LINE風・中央寄せ・半透明枠・白字) ===== */
  .sys-msg{display:flex;justify-content:center;margin:10px 0}
  .sys-msg span{display:inline-block;max-width:80%;text-align:center;font-size:11.5px;color:#fff;
    background:rgba(60,68,86,.55);border-radius:999px;padding:5px 14px;line-height:1.5;backdrop-filter:blur(2px)}
  .sys-msg.unsent span{background:rgba(120,128,146,.4);font-style:italic}

  /* ===== ⑤メンション(青色) ===== */
  .bub .mention{color:var(--accent);font-weight:700}
  .bub.me .mention{color:#dbe6ff}

  /* ===== ③返信(引用リプライ)の表示 ===== */
  .reply-quote{max-width:74%;margin:2px 0 0;padding:5px 10px;border-left:3px solid var(--accent);
    background:var(--card-soft,rgba(120,140,200,.1));border-radius:8px;font-size:12px;line-height:1.4}
  .reply-quote.me{align-self:flex-end;margin-left:auto}
  .reply-quote .rq-name{display:block;font-weight:700;color:var(--accent);font-size:11px}
  .reply-quote .rq-text{color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}

  /* ===== ③返信プレビューバー(入力欄の上) ===== */
  .reply-bar{display:flex;align-items:center;gap:8px;max-width:520px;margin:0 auto;
    padding:8px 12px;background:var(--card,#fff);border-top:1px solid var(--line,#e6e9f0)}
  .reply-bar .rb-line{width:3px;align-self:stretch;background:var(--accent);border-radius:2px}
  .reply-bar .rb-body{flex:1;min-width:0}
  .reply-bar .rb-name{font-size:11px;font-weight:700;color:var(--accent)}
  .reply-bar .rb-text{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .reply-bar .rb-x{border:none;background:transparent;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:4px 6px}

  /* ===== ②③操作メニュー(長押し/右クリック) ===== */
  .msg-menu{position:fixed;z-index:9999;min-width:170px;background:var(--card,#fff);
    border:1px solid var(--line,#e6e9f0);border-radius:12px;box-shadow:0 8px 28px rgba(20,28,50,.22);
    padding:6px;display:flex;flex-direction:column;overflow:hidden}
  .msg-menu button{border:none;background:transparent;text-align:left;font-size:14px;color:var(--ink);
    padding:10px 12px;border-radius:8px;cursor:pointer;width:100%}
  .msg-menu button:hover{background:var(--card-soft,rgba(120,140,200,.12))}
  .msg-menu button.danger{color:var(--sun,#e2574c)}
  .bub{user-select:none;-webkit-user-select:none}

  /* ===== ⑧ダークモードでも白背景の要素は文字を黒にする ===== */
  [data-theme="dark"] .badge-item .badge-ic[style*="#f4f6fb"],
  [data-theme="dark"] .badge-item .badge-ic[style*="#fff7e0"]{color:#1b2330}
  [data-theme="dark"] .badge-mini[style*="#f4f6fb"],
  [data-theme="dark"] .badge-mini[style*="#fff7e0"]{color:#1b2330}
  /* 白背景バッジの年号テキスト等は明示的に黒 */
  [data-theme="dark"] .badge-ic span{color:#1b2330}
</style>

function curLang(){ return (typeof S!=="undefined" && S.lang) ? S.lang : "ja"; }
function t(key, vars){
  const lang=curLang();
  let s=(I18N[lang] && I18N[lang][key]) || (I18N.ja[key]) || key;
  if(vars){ Object.keys(vars).forEach(k=>{ s=s.replace(new RegExp("\\{"+k+"\\}","g"), vars[k]); }); }
  return s;
}
function setLang(lang){ S.lang=lang; document.documentElement.setAttribute("lang", lang); renderApp(); }
/* ②i18n 日付・曜日・複数形ヘルパー */
const EN_MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function dowLabel(idx){ return t("dow."+idx); }
function monthName(m){ return curLang()==="en" ? EN_MONTHS[(+m)-1] : (m+"月"); }
// 日付キー(yyyy-mm-dd)を「曜日つき月日」に整形(言語追従)
function dateMD(key){
  const d=new Date(key); const dow=dowLabel(d.getDay());
  const [Y,M,D]=key.split("-");
  return t("date.md",{m:+M,d:+D,dow});
}
// 英語の単複(1なら単数形)
function plural(n,singular,pluralForm){ return (+n===1)?singular:pluralForm; }
// 空き状況スロットのラベル(言語追従)
function slotLabel(v){ return v?t("slot."+v):t("slot.full"); }
// 祝日名(日本語はそのまま、英語は汎用Holiday)。なければ空
function holName(k){ if(!HOLIDAYS[k]) return ""; return curLang()==="en"?t("date.holiday"):HOLIDAYS[k]; }
function holMark(k){ return HOLIDAYS[k]?t("date.holiday"):""; }
// 予算選択肢ラベル(日本語はそのまま、英語は「Up to ¥xx,xxx」/「No preference」に変換)
function budgetOptLabel(label){
  if(curLang()!=="en") return label;
  if(label.indexOf("希望なし")>=0) return t("s5.noWish");
  const m=label.match(/(\d+)万/); if(m) return "up to ¥"+(parseInt(m[1])*10000).toLocaleString();
  const k=label.match(/(\d+)千/); if(k) return "up to ¥"+(parseInt(k[1])*1000).toLocaleString();

/* 選べるアクセント色(既定オレンジ＋4色) */
const ACCENTS = [
  {key:"#EC6800", name:"オレンジ"},
  {key:"#ad00ec", name:"パープル"},
  {key:"#0086ec", name:"ブルー"},

/* モノクロ時の実際の色(テーマ依存):ライト=黒, ダーク=白系 */
function accentColor(key){
  if(key==="mono") return (document.documentElement.getAttribute("data-theme")==="dark") ? "#faf3ed" : "#080001";
  return key;
}
/* HEX→{r,g,b} */
function hex2rgb(h){ h=h.replace("#",""); return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)}; }
function rgb2hex(r,g,b){ const f=x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,"0"); return "#"+f(r)+f(g)+f(b); }
/* baseを白側(t=0)〜base(t=1)で混ぜる(地図の薄い段階用) */
function mixWhite(hex,t){ const c=hex2rgb(hex); return rgb2hex(255+(c.r-255)*t, 255+(c.g-255)*t, 255+(c.b-255)*t); }
/* baseを黒側に寄せる(濃色 accent-deep 用) */
function darken(hex,t){ const c=hex2rgb(hex); return rgb2hex(c.r*(1-t), c.g*(1-t), c.b*(1-t)); }
/* アクセントを適用:--accent等と地図5段階を書き換える。keyは色HEXまたは"mono" */
function applyAccent(key){
  S.accent=key;
  const hex=accentColor(key);
  const root=document.documentElement.style;
  root.setProperty("--accent", hex);
  root.setProperty("--accent-deep", darken(hex,0.22));
  root.setProperty("--sat", hex);
  // 地図5段階(薄→濃)
  root.setProperty("--map1", mixWhite(hex,0.22));
  root.setProperty("--map2", mixWhite(hex,0.42));
  root.setProperty("--map3", mixWhite(hex,0.62));
  root.setProperty("--map4", mixWhite(hex,0.82));
  root.setProperty("--map5", hex);
  // ⑩FAB等の影をアクセント色に連動
  const c=hex2rgb(hex);
  root.setProperty("--accent-rgb", `${c.r},${c.g},${c.b}`);
  // ③アクセント背景の上に乗る文字色。通常は白、モノクロのダーク(白アクセント)では黒にして同化を防ぐ
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const onAccent=(key==="mono"&&dark)?"#080001":"#fff";
  root.setProperty("--on-accent", onAccent);
  document.documentElement.setAttribute("data-accent", key==="mono"?"mono":"color");
  // ①進捗バー到達点の現在地ピン画像(テーマ・アクセントで色が変わる)
  const pin = dark ? (key==="mono"?UI_IMG.pin_white:UI_IMG.pin_red) : (key==="mono"?UI_IMG.pin_black:UI_IMG.pin_red);
  root.setProperty("--pin-img", `url('${pin}')`);
}

/* ①②未入手バッジ用のトースト。先頭に鍵画像を出し、モノクロ×ダーク時は文字を黒にして同化を防ぐ */
function badgeToast(html, ms, withKey){
  const t=$("#toast"); if(!t)return;
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  // トーストの背景は --ink(ライト=暗い/ダーク=明るい)。読みやすいよう、ダークは黒文字、ライトは白文字にする。
  // これにより「ダーク×アクセント白で文字が同化する」問題も解消される。獲得済み(withKey=false)も同じ配色にそろえる。
  const black=dark;
  const keyHtml = withKey ? `<img src="${black?UI_IMG.lock_black:UI_IMG.lock_white}" class="lock-ic lock-toast" alt="鍵">` : "";
  t.innerHTML = `${keyHtml}<span>${html}</span>`;
  t.style.color = black ? "#080001" : "#fff";
  t.classList.add("show","with-icon");
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>{ t.classList.remove("show","with-icon"); t.style.color=""; t.textContent=""; }, ms||1600);
}
/* 現在時刻を HH:MM 形式で返す(チャットの送信時刻表示用) */
function nowTime(){ const d=new Date(); return `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`; }
/* メッセージ用の一意ID。送信・自動返信のどちらにも付与し、返信/削除/取り消しの目印にする */
let _msgSeq=0;
function newMsgId(){ return "m"+(Date.now().toString(36))+(_msgSeq++).toString(36); }
/* 既存メッセージにidとtsが無ければ補完する(リロード初期データ向け) */
function ensureMsgId(m){ if(m&&!m.id) m.id=newMsgId(); if(m&&m.ts==null) m.ts=Date.now(); return m; }
/* 送信から24時間(1日)以内なら取り消し可能 */
function canUnsend(m){ return m && m.mine && !m.unsent && (m.ts!=null) && (Date.now()-m.ts < 86400000); }
/* 本文から @ID と @All を青色装飾するHTMLを返す(escはこの中で行う) */
function decorateMentions(text){
  const safe=esc(text||"");
  // @All(@all/＠All)と @英数字._ を青色spanに。記号は全角＠も許容
  return safe.replace(/[@＠](All|all|[A-Za-z0-9._]+)/g, (m0,p1)=>{
    const isAll=/^all$/i.test(p1);
    return `<span class="mention">@${isAll?"All":esc(p1)}</span>`;
  });
}
/* 本文中にあるメンション対象IDの配列を返す。@Allは "*" を含める */
function extractMentions(text){
  const out=[]; const re=/[@＠](All|all|[A-Za-z0-9._]+)/g; let mm;
  while((mm=re.exec(text||""))){ out.push(/^all$/i.test(mm[1])?"*":mm[1]); }
  return out;
}

/* 返信ドラフト:いま返信しようとしている元メッセージの要約。送信時にmsgへ取り込む */
let replyDraft=null;

/* 返信プレビューを入力欄の上に出す */
function renderReplyBar(){
  const old=document.getElementById("replyBar"); if(old)old.remove();
  if(!replyDraft)return;
  const inp=document.querySelector(".chat-input"); if(!inp)return;
  const preview = replyDraft.img ? "写真" : (replyDraft.t||"");
  const bar=document.createElement("div");
  bar.id="replyBar"; bar.className="reply-bar";
  bar.innerHTML=`<div class="rb-line"></div>
    <div class="rb-body"><div class="rb-name">${esc(replyDraft.who||"")} に返信</div>
    <div class="rb-text">${esc(preview).slice(0,60)}</div></div>
    <button class="rb-x" onclick="clearReplyDraft()" aria-label="返信をやめる">✕</button>`;
  inp.parentNode.insertBefore(bar, inp);
}

  if(scope==="dm") return DM[activeChatId]||[];
  const g=GROUPS.find(x=>x.id===activeGid); return g?g.chat:[];
}
function findMsgById(scope,id){ return curMsgLog(scope).find(m=>m.id===id); }
/* メッセージ操作メニュー(長押し/右クリックで開く) */
let msgMenu={scope:null,id:null};
function openMsgMenu(scope,id,clientX,clientY){
  const m=findMsgById(scope,id); if(!m||m.sys)return;
  closeMsgMenu();
  msgMenu={scope,id};
  const items=[];
  // 返信:全メッセージ可
  items.push(`<button onclick="startReply('${scope}','${id}')">↩️ 返信</button>`);
  // コピー:テキストがあるとき
  if(m.t && !m.img) items.push(`<button onclick="copyMsg('${scope}','${id}')">📋 コピー</button>`);
  // 自分の送信:24時間以内なら「送信取り消し」、いつでも「自分の画面から削除」
  if(m.mine){
    if(canUnsend(m)) items.push(`<button onclick="unsendMsg('${scope}','${id}')">↺ 送信取り消し</button>`);
    items.push(`<button class="danger" onclick="deleteMsgLocal('${scope}','${id}')">🗑️ 削除（自分の画面）</button>`);
  } else {
    // 相手の送信:自分の画面からのみ削除
    items.push(`<button class="danger" onclick="deleteMsgLocal('${scope}','${id}')">🗑️ 削除（自分の画面）</button>`);
  }
  const menu=document.createElement("div");
  menu.id="msgMenu"; menu.className="msg-menu"; menu.innerHTML=items.join("");
  document.body.appendChild(menu);
  // 位置調整:画面内に収める
  const mw=190, mh=menu.offsetHeight||44*items.length;
  let x=Math.min(clientX, window.innerWidth-mw-8);
  let y=Math.min(clientY, window.innerHeight-mh-8);
  menu.style.left=Math.max(8,x)+"px"; menu.style.top=Math.max(8,y)+"px";
  setTimeout(()=>document.addEventListener("click",closeMsgMenuOnce,{once:true}),0);
}
function closeMsgMenuOnce(){ closeMsgMenu(); }

/* メンション通知:@ID該当者・@Allのとき全員へお知らせを送る(自動返信の相手向けの擬似挙動) */
function notifyMentions(g, txt){
  const ids=extractMentions(txt); if(!ids.length)return;
  const all=ids.includes("*");
  const names=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
  let hit=false;
  if(all){ hit=names.length>0; }
  else {
    // @IDがメンバーのいずれかに一致するか(PEOPLEのidか名前で判定)
    hit=ids.some(idv=>{
      const p=PEOPLE.find(x=>x.id===idv||x.name===idv);
      return p && names.includes(p.name);
    });
  }
  if(hit){
    pushNotif({ic:"📣", a:`「${g.name}」であなたがメンションされました`, b:txt.slice(0,40),
      when:"たった今", unread:true, target:{type:"groupchat", gid:g.id}});

}

/* ===== ①メンション候補(サジェスト) ===== */
/* 現在開いているグループのメンバー候補を返す。Tomato(自分)は除く */
function mentionCandidates(){
  const g=GROUPS.find(x=>x.id===activeGid); if(!g)return [];
  const names=(g.room.members||[]).map(m=>m.name).filter(n=>n!=="Tomato");
  return names.map(nm=>{
    const p=PEOPLE.find(x=>x.name===nm);
    return p ? {id:p.id, name:p.name, photo:p.photo||"", avatar:p.avatar||"🙂"}
             : {id:nm, name:nm, photo:"", avatar:"🙂"};
  });
}
/* textareaの入力を監視し、カーソル直前が @語 ならサジェストを出す */
let _mentionStart=-1;
function mentionInput(ta){
  const pos=ta.selectionStart;
  const left=ta.value.slice(0,pos);
  // 直近の @/＠ を探し、その後に空白が無ければサジェスト対象
  const m=left.match(/[@＠]([A-Za-z0-9._ぁ-んァ-ヶ一-龠ー]*)$/);
  if(!m){ hideMentionPop(); return; }
  _mentionStart=pos-m[0].length;   // @の位置
  const q=m[1].toLowerCase();
  let cands=mentionCandidates();
  // @All を先頭候補に(クエリが空かallに前方一致)
  const list=[];
  if(!q || "all".startsWith(q)) list.push({id:"All", name:"全員にメンション", photo:"", avatar:"📣", isAll:true});
  cands.forEach(c=>{
    if(!q || c.id.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)) list.push(c);
  });
  if(!list.length){ hideMentionPop(); return; }
  showMentionPop(list);
}
function showMentionPop(list){
  const pop=document.getElementById("mentionPop"); if(!pop)return;
  pop.innerHTML=list.slice(0,6).map(c=>{
    const av = c.photo
      ? `<div class="mc-av" style="background-image:url('${c.photo}')"></div>`
      : `<div class="mc-av emoji">${esc(c.avatar||"🙂")}</div>`;
    const sub = c.isAll ? "グループ全員へ" : `@${esc(c.id)}`;
    return `<button class="mc-item" onmousedown="event.preventDefault()" onclick="pickMention('${esc(c.id)}')">
      ${av}<div class="mc-body"><div class="mc-name">${esc(c.name)}</div><div class="mc-id">${sub}</div></div></button>`;
  }).join("");
  pop.style.display="block";
}
function hideMentionPop(){ const pop=document.getElementById("mentionPop"); if(pop){pop.style.display="none";pop.innerHTML="";} _mentionStart=-1; }
/* 候補を選んだら @ID を本文へ挿入 */
function pickMention(id){
  const ta=document.getElementById("chatInput"); if(!ta||_mentionStart<0)return;
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,_mentionStart);
  const after=ta.value.slice(pos);
  const insert="@"+id+" ";
  ta.value=before+insert+after;
  const caret=(before+insert).length;
  ta.setSelectionRange(caret,caret);
  hideMentionPop(); autoGrow(ta); ta.focus();
}

  const out=[];

function drawCalendar(){
  const y=S.calYear,m=S.calMonth;
  $("#calTitle").textContent=t("date.full",{y,m,mn:monthName(m)});
  const first=new Date(y,m-1,1).getDay(),days=new Date(y,m,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const mine=S.avail[S.me]||{};
  let cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  let html="";
  for(let w=0;w<cells.length/7;w++){
    const wk=cells.slice(w*7,w*7+7);
    const validKeys=wk.filter(d=>d).map(d=>ymd(y,m,d)).filter(k=>{const dt=new Date(k);dt.setHours(0,0,0,0);return dt>=today;});
    const allSel=validKeys.length>0&&validKeys.every(k=>mine[k]);
    html+=`<div class="calrow"><button class="weekbtn ${allSel?'on':''}" onclick="toggleWeek(${w})" title="この週を一括選択／解除">▶</button>`;
    html+=wk.map(d=>{
      if(!d)return `<div class="cell empty"></div>`;
      const key=ymd(y,m,d),dow=new Date(y,m-1,d).getDay(),hol=HOLIDAYS[key];
      const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);const past=dt<today;
      const n=overlapForDate(key);let cls="cell "+heatClass(n);
      if(dow===0)cls+=" sun";if(dow===6)cls+=" sat";if(hol)cls+=" hol";if(past)cls+=" past";
      if(dt.getTime()===today.getTime())cls+=" today";
      const myv=mine[key];
      if(myv==="full")cls+=" av-full"; else if(myv==="day")cls+=" av-day"; else if(myv==="night")cls+=" av-night"; else if(myv)cls+=" av-full";
      if(S.dateMode==='range'&&S.rangeStart===key)cls+=" rangestart";
      const slot = myv?`<span class="slot">${slotLabel(myv)}</span>`:(n>0?`<span class="mini">${t("people.count",{n})}</span>`:`<span class="mini">&nbsp;</span>`);
      return `<div class="${cls}" ${past?"":`onclick="onDateClick('${key}')"`}>
        <span class="d">${d}</span>${slot}</div>`;
    }).join("");
    html+=`</div>`;
    if(w<cells.length/7-1)html+=`<div style="height:5px"></div>`;
  }
  $("#calBody").innerHTML=html; drawDateSummary();
}
function onDateClick(key){
  const mine=S.avail[S.me]||(S.avail[S.me]={});
  if(S.dateMode==='single'){
    // 終日 → 昼 → 夜 → なし の巡回(マイカレンダーと同じ操作感)
    const cur=mine[key]||null;
    const idx=SLOT_CYCLE.indexOf(cur);
    const next=SLOT_CYCLE[(idx+1)%SLOT_CYCLE.length];
    if(next)mine[key]=next; else delete mine[key];
    drawCalendar(); return;
  }
  // range は終日で塗る
  if(!S.rangeStart){ S.rangeStart=key; drawCalendar(); return; }
  if(S.rangeStart===key){ S.rangeStart=null; drawCalendar(); return; }
  let a=S.rangeStart,b=key; if(a>b){const t=a;a=b;b=t;}
  const today=new Date();today.setHours(0,0,0,0);
  let cur=new Date(a);
  const end=new Date(b);
  while(cur<=end){
    const k=ymd(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
    const dd=new Date(k);dd.setHours(0,0,0,0);
    if(dd>=today)mine[k]="full";
    cur.setDate(cur.getDate()+1);
  }
  S.rangeStart=null; drawCalendar();
  toast(t("toast.rangeSel"));
}

      <button class="btn primary" onclick="confirmDate()">${t("dt.confirm")}</button>
    </div>
  </div>`;
  if(S.confirmKind==='stay') updateEndOptions();
}
function updateEndOptions(){
  const s=$("#dateStart"),e=$("#dateEnd");if(!s||!e)return;
  const all={};S.members.forEach(m=>Object.keys(S.avail[m.id]||{}).forEach(k=>all[k]=(all[k]||0)+1));
  const byDate=Object.keys(all).sort();
  const start=s.value;
  // 開始日より後の候補のみ(同日は宿泊にならないため除外)
  const opts=byDate.filter(k=>k>start);
  if(!opts.length){
    e.innerHTML=`<option value="">${t("dt.noLater")}</option>`;
    return;
  }
  e.innerHTML=opts.map(k=>{
    const dow=dowLabel(new Date(k).getDay());const[Y,M,D]=k.split("-");
    return `<option value="${k}">${t("dt.optFrac",{dow,m:+M,d:+D,c:all[k],total:S.members.length})}</option>`;
  }).join("");
}
function fmtDate(k){const dow=dowLabel(new Date(k).getDay());const[Y,M,D]=k.split("-");return curLang()==="en"?`${dow}, ${+M}/${+D}`:`${+M}月${+D}日(${dow})`;}
function confirmDate(){
  if(S.confirmKind==='stay'){
    const s=$("#dateStart"),e=$("#dateEnd");
    if(!s||!e||!s.value){toast(t("toast.noCand"));return;}
    if(!e.value){toast(t("toast.needLater"));return;}
    let a=s.value,b=e.value; if(a>b){const t=a;a=b;b=t;}
    if(a===b){S.chosenDate=fmtDate(a);setTripDays([a]);}
    else {
      const nights=Math.round((new Date(b)-new Date(a))/86400000);
      S.chosenDate=t("date.range",{a:fmtDate(a),b:fmtDate(b),nights:nights,days:nights+1,nightWord:plural(nights,"night","nights"),dayWord:plural(nights+1,"day","days")});
      // a〜bの各日ラベルを作る
      const labels=[];let cur=new Date(a);const end=new Date(b);
      while(cur<=end){labels.push(ymd(cur.getFullYear(),cur.getMonth()+1,cur.getDate()));cur.setDate(cur.getDate()+1);}
      setTripDays(labels);
    }
    S.step=5;render();return;
  }
  const sel=$("#dateChoose");if(!sel||!sel.value){toast(t("toast.noCand"));return;}
  S.chosenDate=fmtDate(sel.value);setTripDays([sel.value]);S.step=5;render();
}
function setTripDays(dateKeys){
  S.tripDays=dateKeys.length;
  S.dayLabels=dateKeys.map(fmtDate);
  // 日程が変わったら予定をリセット(日数ぶんの空配列)
  S.dayPlan=dateKeys.map(()=>[]);
  // ⑧計画された旅行日程の初日(ISO形式)を保持し、グループの旅行日付に使う
  S.tripStartKey = (dateKeys && dateKeys.length) ? dateKeys[0] : "";
  // ④範囲(宿泊)のとき最終日(ISO)も保持。単日なら初日と同じ
  S.tripEndKey = (dateKeys && dateKeys.length) ? dateKeys[dateKeys.length-1] : "";
}
